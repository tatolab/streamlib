# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Rust runner sub-package. Declares the sibling cyberpunk Python
# sub-package via a `patch:` `path:` override — `Runner::load_project(".")`
# walks this manifest, resolves the Python sub-package against
# `../python`, and registers its declared processors + schemas. The
# runner additionally declares its own Rust-backed processors below
# (`CrtFilmGrain`, `BlendingCompositor`), which the runner's `main.rs`
# wires via `ProcessorSpec::new(schema_ident!(...))` directly.

package:
  org: tatolab
  name: camera-python-display
  version: 0.1.0
  description: "Camera + Python processor + Display example with CRT/film-grain, CUDA copy, and blending compositor processors"

dependencies:
  "@tatolab/core": "^1.0.0"
  "@tatolab/cyberpunk-processor": "^0.1.0"

patch:
  "@tatolab/core":
    path: ../../../packages/core
  "@tatolab/cyberpunk-processor":
    path: ../python

schemas:
  # Wire types imported from @tatolab/core.
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: CrtFilmGrain
    version: 1.0.0
    description: "CRT display + 80s film grain effect"
    execution: reactive
    runtime:
      options:
        unsafe_send: true
    inputs:
      - name: video_in
        schema: VideoFrame
        description: "Video frames to process"
    outputs:
      - name: video_out
        schema: VideoFrame
        description: "Processed video frames"

  # `CameraToCudaCopy` lives in `@tatolab/camera` so any consumer of
  # the camera package picks it up without re-deriving the cuda
  # VkBuffer / timeline / surface-share wiring. The example loads it
  # via `load_workspace_packages(["@tatolab/camera", ...])` and wires
  # it via `ProcessorSpec` against `@tatolab/camera/CameraToCudaCopy@1.0.0`.

  - name: BlendingCompositor
    version: 1.0.0
    description: "Multi-layer alpha blending compositor with PiP support"
    execution: manual
    scheduling:
      priority: realtime
    runtime:
      options:
        unsafe_send: true
    inputs:
      - name: video_in
        schema: VideoFrame
        description: "Video frames (base layer)"
      - name: lower_third_in
        schema: VideoFrame
        description: "Lower third overlay (RGBA with transparency)"
      - name: watermark_in
        schema: VideoFrame
        description: "Watermark overlay (RGBA with transparency)"
      - name: pip_in
        schema: VideoFrame
        description: "PiP overlay (avatar character with transparent background)"
    outputs:
      - name: video_out
        schema: VideoFrame
        description: "Composited video frames"
