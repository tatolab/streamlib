# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: cyberpunk-processor
  version: "0.1.0"
  description: "Cyberpunk video overlay processors using isolated subprocess architecture"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: AvatarCharacter
    version: "1.0.0"
    description: "MediaPipe pose detection + stylized 3D character as PiP overlay"
    runtime: python
    execution: reactive
    entrypoint: "avatar_character:AvatarCharacter"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: CyberpunkLowerThird
    version: "1.0.0"
    description: "Cyberpunk animated lower third overlay — continuous RGBA generator"
    runtime: python
    execution:
      type: continuous
      interval_ms: 16
    entrypoint: "cyberpunk_lower_third:CyberpunkLowerThird"
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: CyberpunkWatermark
    version: "1.0.0"
    description: "Spray paint style watermark overlay — continuous RGBA generator"
    runtime: python
    execution:
      type: continuous
      interval_ms: 16
    entrypoint: "cyberpunk_watermark:CyberpunkWatermark"
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: CyberpunkGlitch
    version: "1.0.0"
    description: "Glitch post-processing — RGB separation, scanlines, slice displacement"
    runtime: python
    execution: reactive
    entrypoint: "cyberpunk_glitch:CyberpunkGlitch"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: CyberpunkProcessor
    version: "1.0.0"
    description: "Cyberpunk overlay with Skia GPU rendering — reference @processor adopter"
    runtime: python
    execution: reactive
    entrypoint: "cyberpunk_processor:CyberpunkProcessor"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame
