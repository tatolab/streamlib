[project]
name = "cyberpunk-processor"
version = "0.1.0"
description = "Cyberpunk video overlay processors using isolated subprocess architecture"
requires-python = ">=3.10"
dependencies = [
    # Cross-platform basics shared by all processors.
    "numpy>=1.24.0",
    "moderngl>=5.8.0",
    "pillow>=10.0.0",
    "msgpack>=1.0",
    # Skia GPU canvas — `streamlib.adapters.skia.SkiaContext` (#485)
    # composes on `streamlib.adapters.opengl` and brings up Skia via
    # `skia.GrDirectContext.MakeGL(MakeEGL())`. Used by LowerThird and
    # Watermark.
    "skia-python>=87.0",

    # YOLOv8 pose detection on CUDA via streamlib-adapter-cuda DLPack
    # zero-copy. ultralytics pulls torch + torchvision + opencv-python
    # transitively. The torch wheel must be the CUDA-capable build matching
    # the local NVIDIA driver — we route through PyTorch's cu128 index below
    # (PyPI's default torch ships cu130 which mismatches a CUDA 12.8 driver).
    "ultralytics>=8.3",
    "torch>=2.4",
    "torchvision>=0.19",
    "opencv-python-headless>=4.8",
]

# Route torch/torchvision through PyTorch's cu128 wheel index so uv
# resolves a CUDA-12.8-built wheel instead of the PyPI default cu130.
# `explicit = true` keeps the index out of the resolver for any package
# not in `tool.uv.sources`.
[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]
torchvision = [
    { index = "pytorch-cu128" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
