# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Sibling Rust-impl package carrying camera-python-display's
# Rust-backed effect processors (CrtFilmGrain + BlendingCompositor)
# and the schemas they read/write. The runner loads this package via
# `runtime.add_module_with(..., Strategy::Path)`
# pointed at this directory; the cdylib's `STREAMLIB_PLUGIN` callback
# registers both processors with the host registry.

package:
  org: tatolab
  name: camera-python-display-effects
  version: 0.1.0
  description: "Camera + Python + Display example — Rust-backed CRT/film-grain + blending compositor processors"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core.
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: CrtFilmGrain
    version: 1.0.0
    description: "CRT display + 80s film grain effect"
    execution: reactive
    runtime:
      options:
        unsafe_send: true
    inputs:
      - name: video_in
        schema: VideoFrame
        description: "Video frames to process"
    outputs:
      - name: video_out
        schema: VideoFrame
        description: "Processed video frames"

  - name: BlendingCompositor
    version: 1.0.0
    description: "Multi-layer alpha blending compositor with PiP support"
    execution: manual
    scheduling:
      priority: realtime
    runtime:
      options:
        unsafe_send: true
    inputs:
      - name: video_in
        schema: VideoFrame
        description: "Video frames (base layer)"
      - name: lower_third_in
        schema: VideoFrame
        description: "Lower third overlay (RGBA with transparency)"
      - name: watermark_in
        schema: VideoFrame
        description: "Watermark overlay (RGBA with transparency)"
      - name: pip_in
        schema: VideoFrame
        description: "PiP overlay (avatar character with transparent background)"
    outputs:
      - name: video_out
        schema: VideoFrame
        description: "Composited video frames"
