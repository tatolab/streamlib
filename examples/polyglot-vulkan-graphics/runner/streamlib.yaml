# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Rust runner sub-package. The polyglot processor lives in the sibling
# `../python/` (Python runtime) and `../deno/` (Deno runtime) sub-packages;
# the runner picks which one to load at startup based on `--runtime`.

package:
  org: tatolab
  name: polyglot-vulkan-graphics-runner
  version: "0.1.0"
  description: "Rust runner sub-package — host pre-registers a render-target DMA-BUF VkImage and wires the polyglot pipeline that draws a triangle via vertex/fragment graphics kernel against it from a Python or Deno subprocess"

dependencies:
  "@tatolab/core": "^1.0.0"

patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
