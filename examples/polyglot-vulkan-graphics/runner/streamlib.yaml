# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Rust runner sub-package. Declares deps on the sibling Python and Deno
# sub-packages via `patch:` `path:` overrides — `Runner::load_project(".")`
# walks this manifest, resolves the declared sub-packages against their
# local paths, and registers every declared processor + schema. The
# runner picks which sibling's processor to instantiate at startup based
# on `--runtime`.

package:
  org: tatolab
  name: polyglot-vulkan-graphics-runner
  version: "0.1.0"
  description: "Rust runner sub-package — host pre-registers a render-target DMA-BUF VkImage and wires the polyglot pipeline that draws a triangle via vertex/fragment graphics kernel against it from a Python or Deno subprocess"

dependencies:
  "@tatolab/core": "^1.0.0"
  "@tatolab/polyglot-vulkan-graphics": "^0.1.0"
  "@tatolab/polyglot-vulkan-graphics-deno": "^0.1.0"

patch:
  "@tatolab/core":
    path: ../../../packages/core
  "@tatolab/polyglot-vulkan-graphics":
    path: ../python
  "@tatolab/polyglot-vulkan-graphics-deno":
    path: ../deno

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
