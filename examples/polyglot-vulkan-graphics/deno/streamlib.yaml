# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-vulkan-graphics-deno
  version: "0.1.0"
  description: "Polyglot Vulkan adapter scenario (#656) — Deno triangle vertex/fragment graphics kernel rendered into a host DMA-BUF VkImage"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: VulkanGraphicsProcessor
    version: "1.0.0"
    description: "Acquires a host-pre-registered render-target DMA-BUF surface as a VkImage, draws a triangle via the host's VulkanGraphicsKernel, releases"
    runtime: deno
    execution: reactive
    entrypoint: "vulkan_graphics.ts:default"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
