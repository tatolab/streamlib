# Standalone example (headed to its own repo). The `streamlib` SDK resolves by
# version, and the empty `[workspace]` table makes this its own workspace root so
# it builds off-tree. The processor packages (`@tatolab/camera`,
# `@tatolab/display`, `@tatolab/h264`, `@tatolab/h265`) are NOT Cargo deps — they
# live in this app's `streamlib_modules/` folder (run `./setup.sh` once) and the
# runtime lazily discovers + loads them. See README.md.
[package]
name = "vulkan-video-roundtrip"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
# SDK by version; not published to crates.io yet, so `./setup.sh` runs
# `streamlib link --engine <checkout>` to point it at the in-repo SDK.
streamlib = { version = "0.7.44" }
serde_json = "1"
anyhow = "1.0.100"

[workspace]
