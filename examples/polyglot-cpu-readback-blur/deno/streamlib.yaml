# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-cpu-readback-blur-deno
  version: "0.1.0"
  description: "Polyglot cpu-readback adapter blur (#529) — Deno twin with hand-rolled separable Gaussian"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
schemas:
  # Wire types imported from @tatolab/core (#767).
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: CpuReadbackBlurProcessor
    version: "1.0.0"
    description: "Acquires a host-pre-registered cpu-readback surface, applies a separable Gaussian blur, releases"
    runtime: deno
    execution: reactive
    entrypoint: "cpu_readback_blur.ts:default"
    inputs:
      - name: video_in
        schema: VideoFrame
