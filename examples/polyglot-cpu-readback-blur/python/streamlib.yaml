# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-cpu-readback-blur
  version: "0.1.0"
  description: "Polyglot cpu-readback adapter blur (#529) — Python cv2.GaussianBlur with numpy fallback"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: CpuReadbackBlur
    version: "1.0.0"
    description: "Acquires a host-pre-registered cpu-readback surface, applies a Gaussian blur, releases"
    runtime: python
    execution: reactive
    entrypoint: "cpu_readback_blur:CpuReadbackBlurProcessor"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
