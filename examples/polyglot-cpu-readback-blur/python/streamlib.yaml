# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-cpu-readback-blur
  version: "0.1.0"
  description: "Polyglot cpu-readback adapter blur (#529) — Python cv2.GaussianBlur with numpy fallback"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: CpuReadbackBlur
    version: "1.0.0"
    description: "Acquires a host-pre-registered cpu-readback surface, applies a Gaussian blur, releases"
    runtime: python
    execution: reactive
    entrypoint: "cpu_readback_blur:CpuReadbackBlurProcessor"
    inputs:
      - name: video_in
        schema: VideoFrame
