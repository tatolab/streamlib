# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: camera-audio-recorder
  version: 0.1.0
  description: "Camera + audio MP4 recorder example"

dependencies:
  "@tatolab/core": "^1.0.0"
  "@tatolab/audio": "^1.0.0"
  "@tatolab/camera": "^1.0.0"
  "@tatolab/mp4": "^1.0.0"

patch:
  "@tatolab/core":
    path: ../../packages/core
  "@tatolab/audio":
    path: ../../packages/audio
  "@tatolab/camera":
    path: ../../packages/camera
  "@tatolab/mp4":
    path: ../../packages/mp4

schemas:
  AudioFrame:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
  AudioCaptureConfig:
    package: "@tatolab/audio"
  AudioResamplerConfig:
    package: "@tatolab/audio"
  AudioChannelConverterConfig:
    package: "@tatolab/audio"
  CameraConfig:
    package: "@tatolab/camera"
