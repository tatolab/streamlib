# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: camera-deno-subprocess
  version: "0.1.0"
  description: "TypeScript/Deno video processors using subprocess architecture"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: GrayscaleProcessor
    version: "1.0.0"
    description: "Grayscale processor — TypeScript/Deno"
    runtime: deno
    execution: reactive
    entrypoint: "grayscale_processor.ts:default"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }

  - name: HalftoneProcessor
    version: "1.0.0"
    description: "Halftone dot pattern via TypeGPU/WebGPU compute shader"
    runtime: deno
    execution: reactive
    entrypoint: "halftone_processor.ts:default"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
