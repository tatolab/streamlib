# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: camera-deno-subprocess
  version: "0.1.0"
  description: "TypeScript/Deno video processors using subprocess architecture"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: GrayscaleProcessor
    version: "1.0.0"
    description: "Grayscale processor — TypeScript/Deno"
    runtime: deno
    execution: reactive
    entrypoint: "grayscale_processor.ts:default"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: HalftoneProcessor
    version: "1.0.0"
    description: "Halftone dot pattern via TypeGPU/WebGPU compute shader"
    runtime: deno
    execution: reactive
    entrypoint: "halftone_processor.ts:default"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame
