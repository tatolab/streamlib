# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: camera-python-subprocess
  version: "0.1.0"
  description: "Grayscale processor — converts video frames to grayscale via Python subprocess"

dependencies:
  "@tatolab/core": "^1.0.0"

schemas:
  # Wire types imported from @tatolab/core (#767).
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: Grayscale
    version: "1.0.0"
    description: "Grayscale processor — converts video frames to grayscale via Python subprocess"
    runtime: python
    execution: reactive
    entrypoint: "grayscale_processor:GrayscaleProcessor"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame
