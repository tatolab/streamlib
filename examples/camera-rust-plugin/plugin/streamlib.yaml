# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: camera-rust-plugin
  version: 0.1.0
  description: "Grayscale video effect as Rust dylib plugin"

dependencies:
  "@tatolab/core": "^1.0.0"

schemas:
  # Wire types imported from @tatolab/core.
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: GrayscaleRust
    description: "Grayscale video effect (Rust dylib plugin)"
    runtime: rust
    execution: reactive
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame
