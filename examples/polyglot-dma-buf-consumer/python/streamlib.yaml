# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-dma-buf-consumer
  version: "0.1.0"
  description: "Linux DMA-BUF consumer — resolves host camera surfaces via the surface-share service"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: DmaBufConsumer
    version: "1.0.0"
    description: "Resolves an upstream surface_id to a DMA-BUF, locks/reads it, and forwards the frame downstream"
    runtime: python
    execution: reactive
    entrypoint: "dma_buf_consumer:DmaBufConsumer"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
