# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-dma-buf-consumer-deno
  version: "0.1.0"
  description: "Linux DMA-BUF consumer — Deno twin of the Python polyglot E2E"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: DmaBufConsumer
    version: "1.0.0"
    description: "Resolves an upstream surface_id to a DMA-BUF, locks/reads it, and forwards the frame downstream"
    runtime: deno
    execution: reactive
    entrypoint: "dma_buf_consumer.ts:default"
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame
