#
# vulkan-video-psnr example. Declares `@tatolab/core` so the runtime
# registers the wire-vocabulary schemas (VideoFrame, EncodedVideoFrame,
# …) — via the recursive dep walker that runs when each
# `runtime.add_module(...)` in `src/main.rs` follows its package's
# transitive deps. Required so iceoryx2 publishers prime from each
# schema's declared `expected_payload_bytes` hint instead of the 64 KiB
# default — the publisher grows its PowerOfTwo segment for a larger first
# IDR, and the hint just avoids a first-frame regrow.

package:
  org: tatolab
  name: vulkan-video-psnr
  version: "0.1.0"
  description: "PSNR fixture rig — BgraFileSource → encoder → decoder → display, paired by input-frame index"

dependencies:
  "@tatolab/core": "^1.0.0"

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  EncodedVideoFrame:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
