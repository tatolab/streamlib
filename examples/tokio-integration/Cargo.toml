[package]
name = "tokio-integration"
version = "0.1.0"
edition = "2024"
publish = false

# Standalone, registry-only example (headed to its own repo). The empty
# `[workspace]` makes this its own workspace root so it builds off-tree, and
# `streamlib` resolves from the static registry by version.
[dependencies]
streamlib = { version = "0.4.33-dev.2" }
tokio = { version = "1", features = ["full"] }

