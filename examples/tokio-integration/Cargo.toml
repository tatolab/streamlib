[package]
name = "tokio-integration"
version = "0.1.0"
edition = "2024"
publish = false

# Standalone example (headed to its own repo). The empty `[workspace]` makes this
# its own workspace root so it builds off-tree, and the `streamlib` SDK resolves
# by version. This demo drives `Runner` directly and loads no processor
# packages — so `./setup.sh` only links the SDK.
[dependencies]
# The SDK is resolved by version. `./setup.sh` runs
# `streamlib link --engine <checkout>` to point this dep at the in-repo SDK
# checkout (the static file tree / linked checkout is the package source; there
# is no central package registry). Reverse with `streamlib unlink --engine`.
streamlib = { version = "0.7.45" }
tokio = { version = "1", features = ["full"] }

[workspace]
