[project]
name = "polyglot-venv-isolation-pkg-a"
version = "0.1.0"
description = "Per-package venv isolation proof — package A pins numpy==1.26.4"
requires-python = ">=3.10"
dependencies = [
    "streamlib>=0.4,<0.5",
    "iceoryx2>=0.8.1",
    "msgpack>=1.0",
    # The whole point of the example: a conflicting numpy pin that the
    # sibling package B (numpy==2.1.3) could never co-resolve in a shared
    # environment. Each package's own venv resolves its own pin.
    "numpy==1.26.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
