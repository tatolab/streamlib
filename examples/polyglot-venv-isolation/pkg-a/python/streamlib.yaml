package:
  org: tatolab
  name: polyglot-venv-isolation-pkg-a
  version: "0.1.0"
  description: "Per-package venv isolation proof — package A pins numpy==1.26.4 (NumPy 1.x ABI)"

processors:
  - name: NumpyVersionReporter
    version: "1.0.0"
    description: "Continuous processor: imports numpy and writes numpy.__version__ to a host-visible output file. Package A's pyproject pins numpy==1.26.4, so a correctly-isolated per-package venv must yield exactly 1.26.4."
    runtime: python
    execution:
      type: continuous
      interval_ms: 16
    entrypoint: "numpy_version_reporter:NumpyVersionReporter"
