# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-skia-canvas
  version: "0.1.0"
  description: "Polyglot Skia adapter scenario (#577) — Python Skia processor (composed on the OpenGL adapter via skia-python's GrDirectContext.MakeGL) draws a canvas into a host DMA-BUF VkImage via streamlib.adapters.skia.SkiaContext"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: SkiaCanvas
    version: "1.0.0"
    description: "Acquires a host-pre-registered render-target DMA-BUF surface as a skia.Surface, draws a known shape, releases"
    runtime: python
    execution: reactive
    entrypoint: "skia_canvas:SkiaCanvasProcessor"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
