# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-skia-canvas
  version: "0.1.0"
  description: "Polyglot Skia adapter scenario (#577) — Python Skia processor (composed on the OpenGL adapter via skia-python's GrDirectContext.MakeGL) draws a canvas into a host DMA-BUF VkImage via streamlib.adapters.skia.SkiaContext"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: SkiaCanvas
    version: "1.0.0"
    description: "Acquires a host-pre-registered render-target DMA-BUF surface as a skia.Surface, draws a known shape, releases"
    runtime: python
    execution: reactive
    entrypoint: "skia_canvas:SkiaCanvasProcessor"
    inputs:
      - name: video_in
        schema: VideoFrame
