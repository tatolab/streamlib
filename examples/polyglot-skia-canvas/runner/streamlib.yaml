# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Rust runner sub-package. Declares a dep on the sibling Python
# sub-package via a `patch:` `path:` override — `Runner::load_project(".")`
# walks this manifest, resolves the sub-package against its local path,
# and registers its declared processor + schemas. Python is the only
# runtime today (skia-python wraps the Skia C API).

package:
  org: tatolab
  name: polyglot-skia-canvas-runner
  version: "0.1.0"
  description: "Rust runner sub-package — host pre-registers a render-target DMA-BUF VkImage and wires the polyglot pipeline that draws a skia-python canvas scene against it from a Python subprocess (composes on the Vulkan adapter)"

dependencies:
  "@tatolab/core": "^1.0.0"
  "@tatolab/polyglot-skia-canvas": "^0.1.0"

patch:
  "@tatolab/core":
    path: ../../../packages/core
  "@tatolab/polyglot-skia-canvas":
    path: ../python

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
