[package]
name = "polyglot-skia-canvas-scenario"
version = "0.1.0"
edition = "2024"
publish = false

# The `streamlib*` SDK crates resolve by version. `./setup.sh` runs
# `streamlib link --engine <checkout>` to point them at the in-repo SDK
# checkout (the linked checkout is the package source; there is no central
# package registry).
[dependencies]
streamlib = { version = "0.8.0" }
streamlib-adapter-abi = { version = "0.8.0" }
serde_json = "1.0"
png = "0.17"

[target.'cfg(target_os = "linux")'.dependencies]
streamlib-adapter-vulkan = { version = "0.8.0" }

[workspace]
