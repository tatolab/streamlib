# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
#
# Rust runner sub-package. Declares deps on the sibling Python and Deno
# sub-packages via `patch:` `path:` overrides — `Runner::load_project(".")`
# walks this manifest, resolves the declared sub-packages against their
# local paths, and registers every declared processor + schema. The
# runner picks which sibling's processor to instantiate at startup based
# on `--runtime`.

package:
  org: tatolab
  name: polyglot-continuous-processor-runner
  version: "0.1.0"
  description: "Rust runner sub-package — wires a polyglot continuous-processor pipeline (Python or Deno process() driven by a monotonic-clock timerfd)"

dependencies:
  "@tatolab/core": "^1.0.0"
  "@tatolab/polyglot-continuous-processor": "^0.1.0"
  "@tatolab/polyglot-continuous-processor-deno": "^0.1.0"

patch:
  "@tatolab/core":
    path: ../../../packages/core
  "@tatolab/polyglot-continuous-processor":
    path: ../python
  "@tatolab/polyglot-continuous-processor-deno":
    path: ../deno

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
