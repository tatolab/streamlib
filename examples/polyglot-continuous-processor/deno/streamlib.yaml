# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-continuous-processor-deno
  version: "0.1.0"
  description: "Polyglot continuous processor (#542) — Deno process() driven by monotonic-clock timerfd"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: PolyglotContinuousProcessor
    version: "1.0.0"
    description: "Continuous processor: process() called by the runner at interval_ms cadence (now timerfd-paced); each call writes the tick count + a monotonic timestamp into the host cpu-readback surface. Reference example for the no-setTimeout pacing contract."
    runtime: deno
    execution:
      type: continuous
      interval_ms: 16
    entrypoint: "continuous_processor.ts:default"
