# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-vulkan-compute-deno
  version: "0.1.0"
  description: "Polyglot Vulkan adapter scenario (#531) — Deno Mandelbrot compute kernel dispatched against a host DMA-BUF VkImage"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../../packages/core

schemas:
  # Wire types imported from @tatolab/core (#767).
  VideoFrame:
    package: "@tatolab/core"

processors:
  - name: VulkanComputeProcessor
    version: "1.0.0"
    description: "Acquires a host-pre-registered render-target DMA-BUF surface as a VkImage, dispatches a Mandelbrot compute shader, releases"
    runtime: deno
    execution: reactive
    entrypoint: "vulkan_compute.ts:default"
    inputs:
      - name: video_in
        schema: VideoFrame
