# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-cuda-inference-deno
  version: "0.1.0"
  description: "Polyglot CUDA adapter inference (#591) — Deno DLPack-capsule structural validation against host OPAQUE_FD VkBuffer"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: CudaInferenceProcessor
    version: "1.0.0"
    description: "Acquires a host-pre-registered cuda OPAQUE_FD surface, validates the DLPack capsule shape, logs VALIDATION_PASSED / VALIDATION_FAILED to stderr"
    runtime: deno
    execution: reactive
    entrypoint: "cuda_inference.ts:default"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
