[package]
name = "polyglot-cuda-inference-scenario"
version = "0.1.0"
edition = "2024"
publish = false

# The `streamlib*` SDK crates resolve by version. `./setup.sh` runs
# `streamlib link --engine <checkout>` to point them at the in-repo SDK
# checkout (no hosted registry; the linked checkout is the source).
[dependencies]
streamlib = { version = "0.7.45" }
streamlib-adapter-abi = { version = "0.7.45" }
streamlib-adapter-cuda = { version = "0.7.45" }
serde_json = "1.0"

[workspace]
