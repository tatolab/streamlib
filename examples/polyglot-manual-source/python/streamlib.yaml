# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-manual-source
  version: "0.1.0"
  description: "Polyglot manual source (#542 / #604) — Python worker thread paced by MonotonicTimer publishes Videoframes via iceoryx2"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: PolyglotManualSource
    version: "1.0.0"
    description: "Manual source: spawns a worker thread in start() that publishes Videoframes on the frame_out port at MonotonicTimer cadence. Reference example for the start()-must-return-promptly contract and #604's worker-thread iceoryx2 publish path."
    runtime: python
    execution: manual
    entrypoint: "manual_source:PolyglotManualSource"
    outputs:
      - name: frame_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
