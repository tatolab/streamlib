[project]
name = "polyglot-manual-source"
version = "0.1.0"
description = "Polyglot manual source — Python worker-thread reference example"
requires-python = ">=3.10"
dependencies = [
    "iceoryx2>=0.8.1",
    "msgpack>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
