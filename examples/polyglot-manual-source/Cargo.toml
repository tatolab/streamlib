# Standalone, registry-only example (headed to its own repo). Every dependency
# resolves from the static registry by version. This crate is its own workspace
# root and includes the sibling `plugin/` cdylib (the counting-sink Rust
# plugin) as a member so `cargo build -p polyglot-manual-source-counting-sink-plugin`
# builds it for the example to stage. All three polyglot packages
# (counting-sink plugin, python source, deno source) load at runtime via
# `Strategy::Path` (example-local); the Python SDK resolves from the static registry
# pypi index and the Deno SDK (`@tatolab/streamlib-deno`) from the static registry npm
# registry.
[package]
name = "polyglot-manual-source-scenario"
version = "0.4.33-dev.5"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
license = "BUSL-1.1"
publish = false

[dependencies]
streamlib = { workspace = true }
serde_json = { workspace = true }

[workspace]
members = ["plugin"]

[workspace.package]
version = "0.4.33-dev.5"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
license = "BUSL-1.1"

[workspace.dependencies]
streamlib = { version = "0.4.33-dev.5" }
streamlib-jtd-codegen = { version = "0.4.33-dev.5" }
streamlib-plugin-abi = { version = "0.4.33-dev.5" }
tracing = { version = "0.1.41", features = ["release_max_level_debug"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
