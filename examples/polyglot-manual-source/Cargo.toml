# Standalone example (headed to its own repo). The `streamlib*` SDK crates
# resolve by version; they aren't published to crates.io yet, so `./setup.sh`
# runs `streamlib link --engine <checkout>` to point them at the in-repo SDK.
# This crate is its own workspace root and includes the sibling `plugin/`
# cdylib (the counting-sink Rust plugin) as a member. The polyglot packages it
# uses (the counting-sink plugin, `./python` source, `./deno` source) are NOT
# Cargo deps — `./setup.sh` links them into this app's `streamlib_modules/`
# folder and the runtime lazily discovers + loads them at runtime.
[package]
name = "polyglot-manual-source-scenario"
version = "0.1.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
license = "BUSL-1.1"
publish = false

[dependencies]
streamlib = { workspace = true }
serde_json = { workspace = true }

[workspace]
members = ["plugin"]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
license = "BUSL-1.1"

[workspace.dependencies]
# Engine facade — used ONLY by the runner (the host app), never the plugin.
streamlib = { version = "0.7.21" }
# Engine-free authoring SDK chain — used by the plugin cdylib.
streamlib-plugin-sdk = { version = "0.7.21" }
streamlib-macros = { version = "0.7.21" }
streamlib-jtd-codegen = { version = "0.7.21" }
streamlib-plugin-abi = { version = "0.7.21" }
tracing = { version = "0.1.41", features = ["release_max_level_debug"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
