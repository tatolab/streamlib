# Standalone example (headed to its own repo). The `streamlib` SDK resolves by
# version, and the empty `[workspace]` table makes this its own workspace root so
# it builds off-tree. It renders ray-traced frames directly through the SDK's
# `VulkanRayTracingKernel` RHI and loads no processor packages — so `./setup.sh`
# only links the SDK.
[package]
name = "raytracing-showcase"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
# The SDK is resolved by version. `./setup.sh` runs
# `streamlib link --engine <checkout>` to point this dep at the in-repo SDK
# checkout (the static file tree / linked checkout is the package source; there
# is no central package registry). Reverse with `streamlib unlink --engine`.
streamlib = { version = "0.7.45" }
anyhow = "1.0.100"

[workspace]
