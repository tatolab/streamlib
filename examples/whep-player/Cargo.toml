# Standalone example (headed to its own repo). The `streamlib` SDK resolves by
# version and the empty `[workspace]` table makes this its own workspace root so
# it builds off-tree.
#
# DEFERRED, not in scope: this example is a no-op at HEAD. The WHEP player
# decodes received H.264 with VideoToolbox (macOS hardware decode) and is
# macOS-only as written; it also uses the deprecated compile-time typed-struct
# API. A Linux version would rewire WHEP → `@tatolab/h264` (Vulkan) decoder →
# display via the runtime graph API, which is future work. The real pipeline
# lives in git history; see `src/main.rs` for the deferral note. It loads no
# processor packages today, so `./setup.sh` only links the SDK.
[package]
name = "whep-player"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
# The SDK is resolved by version. It is not published to crates.io yet, so for
# local development `./setup.sh` runs `streamlib link --engine <checkout>` to
# point this dep at the in-repo SDK. Once the SDK publishes, the bare version
# resolves with no link step.
streamlib = { version = "0.7.37" }

[workspace]
