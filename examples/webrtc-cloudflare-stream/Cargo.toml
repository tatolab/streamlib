# Standalone example (headed to its own repo). The `streamlib` SDK resolves by
# version, and the empty `[workspace]` table makes this its own workspace root so
# it builds off-tree. The processor packages it uses
# (`@tatolab/{audio,camera,h264,opus,webrtc}`) are NOT Cargo deps — they live in
# this app's `streamlib_modules/` folder (run `./setup.sh` once) and the runtime
# lazily discovers + loads them at runtime. The build-time jtd-codegen generates
# typed config structs from the schemas declared in `streamlib.yaml`, resolving
# schema deps from the checkout via `STREAMLIB_LINK_CHECKOUT` (set by
# `./setup.sh`'s `streamlib link --engine`). Linux-only example — WHIP streaming
# to Cloudflare Stream. See README.md.
[package]
name = "webrtc-cloudflare-stream"
version = "0.1.0"
edition = "2024"
publish = false

[build-dependencies]
# The SDK codegen crate is resolved by version (same link-by-checkout dev loop
# as the `streamlib` dep below).
streamlib-jtd-codegen = { version = "0.7.6" }

[dependencies]
# The SDK is resolved by version. It is not published to crates.io yet, so for
# local development `./setup.sh` runs `streamlib link --engine <checkout>` to
# point this dep at the in-repo SDK. Once the SDK publishes, the bare version
# resolves with no link step.
streamlib = { version = "0.7.6" }
tokio = { version = "1.48.0", features = ["full"] }
anyhow = "1.0.100"
libc = "0.2"
rustls = { version = "0.23", features = ["ring"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }

[workspace]
