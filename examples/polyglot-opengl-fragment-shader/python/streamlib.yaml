# yaml-language-server: $schema=../../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: polyglot-opengl-fragment-shader
  version: "0.1.0"
  description: "Polyglot OpenGL adapter scenario (#530) — Python Mandelbrot fragment shader rendered into a host DMA-BUF surface"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time override (#717): point `@tatolab/core` at the in-tree
# packages/core source so the runtime resolves to it without an
# `streamlib pkg install`. `streamlib pack` rejects yamls whose
# `patch:` block carries `path:` entries, so this consumer is dev-
# only — the customer-facing flow goes through the installed cache.
patch:
  "@tatolab/core":
    path: ../../../packages/core

processors:
  - name: OpenGlFragmentShader
    version: "1.0.0"
    description: "Acquires a host-pre-registered render-target DMA-BUF surface as a GL_TEXTURE_2D, renders a Mandelbrot fragment shader, releases"
    runtime: python
    execution: reactive
    entrypoint: "opengl_fragment_shader:OpenGlFragmentShaderProcessor"
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
