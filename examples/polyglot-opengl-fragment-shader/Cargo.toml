[package]
name = "polyglot-opengl-fragment-shader-scenario"
version = "0.1.0"
edition = "2024"
publish = false

# The `streamlib*` SDK crates resolve by version. They aren't published to
# crates.io yet, so `./setup.sh` runs `streamlib link --engine <checkout>` to
# point them at the in-repo SDK for local development.
[dependencies]
streamlib = { version = "0.7.13" }
streamlib-adapter-abi = { version = "0.7.13" }
serde_json = "1.0"
png = "0.17"

[target.'cfg(target_os = "linux")'.dependencies]
streamlib-adapter-opengl = { version = "0.7.13" }

[workspace]
