# Workspace-root manifest. Mirrors Cargo's `[workspace]` + `[patch.crates-io]`
# idiom: every consumer in the tree (`libs/streamlib/streamlib.yaml`, every
# `examples/**/streamlib.yaml`) declares its dependencies in canonical form
# (`"@org/name": "<version-range>"`). The `patch:` table below is the single
# place that says "for this workspace, resolve `@org/name` to here". Consumer
# yamls stay portable byte-for-byte between the source tree, an extracted
# slpkg cache, and any future registry.
#
# The runtime's walk-up discovery (in `streamlib_idents::discover_workspace`)
# stops at the nearest streamlib.yaml carrying `workspace: {}`. Don't add a
# nested `workspace:` block elsewhere in the tree — that would shadow this
# one for descendants.
#
# See #717 for the architectural rationale; the dev workflow is documented
# in @docs/architecture/schema-identity-and-packaging.md once #399 lands.

workspace: {}

patch:
  "@tatolab/core":
    path: packages/core
