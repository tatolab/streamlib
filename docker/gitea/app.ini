# Standalone Gitea config for the in-container StreamLib package registry.
#
# This is a TEMPLATE: `docker/build-stage1.sh` copies it to
# `${GITEA_WORK_DIR}/conf/app.ini` and appends generated `[security]` secrets
# (SECRET_KEY / INTERNAL_TOKEN) at build time, so no secret is committed. The
# resulting data dir (DB + packages + secret-bearing app.ini) is baked into the
# final image and served verbatim by `docker/entrypoint.sh`.
#
# Gitea 1.22 refuses to run as root, so the registry process runs as the `git`
# user (uid 1000); the runtime + audio stack run as root for GPU/device access.
# The registry is localhost-only and its read path is fully anonymous (cargo
# sparse / pypi / npm / generic) — see docs/architecture/gitea-registry-distribution.md.

APP_NAME = StreamLib Package Registry
RUN_USER = git
RUN_MODE = prod
WORK_PATH = /var/lib/gitea

[server]
PROTOCOL  = http
HTTP_ADDR = ::
HTTP_PORT = 3300
# Trailing slash is load-bearing: every package-registry endpoint URL is
# computed from ROOT_URL at request time. Keep it consistent across the
# stage-1 ephemeral registry and the final image so consumers (cargo/pypi/
# npm/generic) resolve correctly. Matches the repo .cargo/config.toml default.
ROOT_URL    = http://localhost:3300/
DOMAIN      = localhost
DISABLE_SSH = true
OFFLINE_MODE = true
APP_DATA_PATH = /var/lib/gitea/data

[database]
DB_TYPE = sqlite3
PATH    = /var/lib/gitea/gitea.db

[repository]
ROOT = /var/lib/gitea/git/repositories

[packages]
ENABLED = true

[security]
INSTALL_LOCK = true
# SECRET_KEY / INTERNAL_TOKEN appended by docker/build-stage1.sh at build time.

[service]
DISABLE_REGISTRATION       = true
REQUIRE_SIGNIN_VIEW        = false
ENABLE_NOTIFY_MAIL         = false

[actions]
ENABLED = false

[log]
MODE  = console
LEVEL = warn

[cron]
ENABLED = false
