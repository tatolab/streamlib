[package]
name = "streamlib-error"
description = "Canonical StreamLib Error + Result, shared by the engine and the plugin-SDK so plugin cdylibs need not link the engine for error types."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[lib]
name = "streamlib_error"
path = "src/lib.rs"

[dependencies]
thiserror.workspace = true
anyhow.workspace = true
streamlib-processor-schema = { path = "../streamlib-processor-schema", version = "0.7.22" }

[target.'cfg(target_os = "linux")'.dependencies]
streamlib-consumer-rhi = { path = "../../runtime/streamlib-consumer-rhi", version = "0.7.22" }

[lints]
workspace = true
