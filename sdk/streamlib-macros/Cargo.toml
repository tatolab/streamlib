[package]
name = "streamlib-macros"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[lib]
proc-macro = true

[dependencies]
quote = "1.0"
syn = { version = "2.0", features = ["full", "extra-traits"] }
proc-macro2 = "1.0"
# Detect the consumer's real SDK crate name (streamlib-plugin-sdk for plugin
# packages, the streamlib facade for hosts) so emitted paths use real names
# with no `streamlib` aliasing — the serde_derive pattern.
proc-macro-crate = "3"

# YAML parsing for streamlib.yaml processor lookup
serde = { workspace = true }
serde_yaml = { workspace = true }

# Execution types (shared with streamlib for code generation)
streamlib-processor-schema = { path = "../streamlib-processor-schema", version = "0.7.29" }
# The `#[processor(...)]` attribute grammar — shared with the source-scan
# extractor so both parse the attribute through one parser (#1411).
streamlib-processor-extract = { path = "../streamlib-processor-extract", version = "0.7.29" }
# Manifest resolver — used to walk the enclosing manifest's `schemas:` map
# and resolve bare-name `PortSchemaSpec::Named` references to fully-
# qualified `SchemaIdent`s at proc-macro expansion time (#767).
streamlib-idents = { path = "../streamlib-idents", version = "0.7.29" }


[dev-dependencies]
crossbeam-channel = "0.5"
serde_json = "1.0"

[lints]
workspace = true
