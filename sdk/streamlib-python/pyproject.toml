[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "streamlib"
# Tracks the workspace [workspace.package].version in Cargo.toml. The static
# package-source emit (`cargo xtask static-package-source emit`) is authoritative: it builds
# the pypi sdist from the workspace version (+ optional -dev.N) at emit time.
# Keep it in sync with the workspace on release so a bare local `uv build`
# produces a sane version.
version = "0.4.30"
description = "Python subprocess SDK for StreamLib real-time streaming framework"
requires-python = ">=3.10"
license = { text = "BUSL-1.1" }
authors = [
    { name = "Jonathan Fontanez", email = "fontanezj1@gmail.com" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
# msgpack is the only core runtime dependency (processor_context.py imports it
# at module load for the iceoryx2 wire). numpy / skia / OpenGL / torch etc. are
# lazy-imported inside the adapters and stay optional — users bring their own
# versions (engine rule: adapters must not pin user libraries).
dependencies = [
    "msgpack>=1.0",
]

[tool.setuptools.packages.find]
where = ["python"]
# The published distribution is the SDK, not its test suite. Tests run from the
# source tree; shipping them as an importable `streamlib.tests` subpackage is
# just artifact noise.
exclude = ["streamlib.tests*"]

# Ship the PEP 561 inline-type marker so type checkers / LSP resolve completion
# against an installed `streamlib` (the declared-dependency half of the
# declare-and-inject contract).
[tool.setuptools.package-data]
streamlib = ["py.typed"]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "numpy>=1.24.0",
]
