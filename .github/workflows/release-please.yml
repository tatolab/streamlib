name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.tag.outputs.release_created || steps.open.outputs.release_created }}
      tag_name: ${{ steps.tag.outputs.tag_name || steps.open.outputs.tag_name }}
      version: ${{ steps.tag.outputs.major || steps.open.outputs.major }}.${{ steps.tag.outputs.minor || steps.open.outputs.minor }}.${{ steps.tag.outputs.patch || steps.open.outputs.patch }}
    steps:
      - uses: actions/checkout@v4

      # Pass 1 — open / refresh the standing release PR (version bump + changelog)
      # for the feat/fix commits landed since the last release.
      - uses: googleapis/release-please-action@v4
        id: open
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # The `simple` release-type bumps [workspace.package].version in Cargo.toml
      # but ships no cargo dependency-requirement updater. Every in-tree crate
      # pins its workspace-versioned sibling crates with a frozen
      # `version = "X.Y.Z"` requirement (e.g. streamlib-error, vulkan-jpeg). Those
      # requirements never move on their own: caret-compatible within a 0.7.x line
      # but silently EXCLUDING the next breaking bump (0.8.0), which would make the
      # whole tree fail to resolve after the release. Rewrite them to the release
      # version on the release-PR branch (found by the same `autorelease: pending`
      # label the lock-sync and auto-merge steps use) so the squash-merge folds it
      # into the release commit. Runs BEFORE the lock sync so `cargo update` below
      # records the rewritten requirements. Independently-versioned `packages/*`
      # domain crates are left alone by the script. No-ops when nothing is pending
      # or the requirements are already in sync.
      - name: Sync inter-crate version requirements to the release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
            --json headRefName,labels \
            --jq 'map(select(.labels[].name == "autorelease: pending")) | .[0].headRefName // empty')
          if [ -z "$BRANCH" ]; then
            echo "no open release PR this run"
            exit 0
          fi
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          python3 scripts/sync-inter-crate-versions.py
          if git diff --quiet; then
            echo "inter-crate requirements already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync inter-crate version requirements to the release version"
          git push origin "$BRANCH"

      # The `simple` release-type bumps [workspace.package].version in Cargo.toml
      # (via extra-files) but has no Cargo.lock updater, so the workspace-member
      # entries in Cargo.lock keep the old version. CI runs cargo with --locked,
      # so a merged bump with a stale lock errors before any check runs. Sync the
      # lock on the release-PR branch (found by the same `autorelease: pending`
      # label the auto-merge step below uses) so the squash-merge folds it into
      # the release commit. `cargo update --workspace` rewrites only the member
      # versions and leaves external deps pinned (resolution only, no build);
      # no-ops when nothing is pending or the lock is already in sync.
      - name: Sync Cargo.lock to the release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
            --json headRefName,labels \
            --jq 'map(select(.labels[].name == "autorelease: pending")) | .[0].headRefName // empty')
          if [ -z "$BRANCH" ]; then
            echo "no open release PR this run"
            exit 0
          fi
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          cargo update --workspace
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock to the release version"
          git push origin "$BRANCH"

      # A version cut is pure bookkeeping — version + changelog, no code — so it
      # needs no human gate; auto-merge the release PR the moment it exists. The
      # PR is found by release-please's own `autorelease: pending` label rather
      # than an action output, so a freshly-opened PR is caught unambiguously.
      - name: Auto-merge the release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 \
            --json number,labels \
            --jq 'map(select(.labels[].name == "autorelease: pending")) | .[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "no open release PR to merge this run"
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            if gh pr merge "$PR_NUMBER" --squash --repo "$GITHUB_REPOSITORY"; then
              echo "merged release PR #$PR_NUMBER"
              exit 0
            fi
            echo "attempt $attempt: release PR #$PR_NUMBER not yet mergeable, retrying in 5s..."
            sleep 5
          done
          echo "::error::could not merge release PR #$PR_NUMBER after retries"
          exit 1

      # A GITHUB_TOKEN merge does NOT re-fire this `push: main` workflow, so the
      # tag would never be cut. Pass 2 runs release-please again in-run: it now
      # sees the merged release PR, creates the git tag + GitHub Release, and sets
      # release_created so trigger-schemas publishes the client. No-op when the
      # step above merged nothing.
      - uses: googleapis/release-please-action@v4
        id: tag
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Trigger schema/client generation on new releases
  trigger-schemas:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/schemas.yml
    secrets: inherit
