name: Check No Streamlib Metadata

# CI gate for #402's atomic cutover off language-native metadata.
# `cargo xtask check-no-streamlib-metadata` walks every `Cargo.toml`,
# `pyproject.toml`, and `deno.json` / `deno.jsonc` in the workspace and
# fails if any of them re-introduces a streamlib metadata block.
#
# `streamlib.yaml` is the single source of truth for a package's schemas,
# dependencies, and identity. See
# `docs/architecture/schema-identity-and-packaging.md` (anti-pattern 4).
#
# Grep-shaped on purpose: sub-second on a clean runner, no workspace build.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  xtask-check-no-streamlib-metadata:
    name: xtask check-no-streamlib-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-xtask-${{ hashFiles('xtask/Cargo.toml', 'xtask/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-xtask-

      # Serverless registry: the workspace declares `vulkanalia = { registry = "tatolab" }`,
      # so xtask cannot build without the fork fetchable. Emit it + reshape into a cargo
      # local-registry `[source]` replacement (no HTTP server) so `--locked` resolves offline.
      - name: Mirror vulkanalia fork (serverless cargo [source] replacement)
        uses: ./.github/actions/cargo-fork-mirror

      - name: cargo xtask check-no-streamlib-metadata
        run: cargo run --locked -q -p xtask -- check-no-streamlib-metadata

      - name: cargo test -p xtask check_no_streamlib_metadata (fixture tests)
        run: cargo test --locked -p xtask check_no_streamlib_metadata
