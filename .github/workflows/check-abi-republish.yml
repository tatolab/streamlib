name: Check ABI Republish

# CI gate for the "ABI bump ⇒ coordinated republish" CD step.
# `cargo xtask check-abi-republish` fails a PR that changes
# `STREAMLIB_ABI_VERSION` (the C-ABI contract in streamlib-plugin-abi)
# without also changing the `[workspace.package]` version in Cargo.toml.
#
# An ABI bump is a breaking plugin-ABI change: a package resolves the
# PUBLISHED streamlib SDK by version from the static registry, so an ABI
# move without a coordinated SDK republish (new workspace version + every
# package pin bumped) leaves a registry-resolved cdylib refused at load
# with `PluginAbiVersionMismatch` — the handshake working as designed on a
# genuine version skew. This lint catches the first, mechanical half of
# that republish. See the "Release / ABI republish" section of
# docs/architecture/static-registry.md.
#
# The check is a `git` diff (merge-base vs. working tree) — registry-free,
# no network. `fetch-depth: 0` is required so the merge-base against the
# target branch is available.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  xtask-check-abi-republish:
    name: xtask check-abi-republish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The lint diffs HEAD against the merge-base with the target branch;
          # a shallow clone has no merge-base to resolve.
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-xtask-${{ hashFiles('xtask/Cargo.toml', 'xtask/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-xtask-

      # Daemon-free: the workspace declares `vulkanalia = { registry = "tatolab" }`,
      # so xtask cannot build without the fork served. Emit + serve it statically
      # (no registry daemon) and point cargo at it.
      - name: Serve static vulkanalia fork registry
        uses: ./.github/actions/serve-static-fork

      - name: cargo xtask check-abi-republish
        run: cargo xtask check-abi-republish

      - name: cargo test -p xtask check_abi_republish (unit tests)
        run: cargo test -p xtask check_abi_republish
