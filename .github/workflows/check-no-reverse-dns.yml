name: Check No Reverse-DNS Literals

# CI gate for milestone-10's structured-identifier rule.
# `cargo xtask check-no-reverse-dns` walks every workspace source file
# and fails if any reintroduces a legacy `com.tatolab.*` /
# `com.streamlib.*` reverse-DNS schema literal in live code.
#
# Apple platform code (`*/apple/*`), test code (`#[cfg(test)]`,
# `tests/`, `*_test{s}.rs`), and Rust comments are allowed — the
# legacy grammar still appears in legacy-shape conversion fixtures and
# in Apple DispatchQueue / XPC service names. See
# `docs/architecture/schema-identity-and-packaging.md`.
#
# Grep-shaped on purpose: sub-second on a clean runner, no workspace build.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  xtask-check-no-reverse-dns:
    name: xtask check-no-reverse-dns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-xtask-${{ hashFiles('xtask/Cargo.toml', 'xtask/Cargo.lock', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-xtask-

      - name: cargo xtask check-no-reverse-dns
        run: cargo xtask check-no-reverse-dns

      - name: cargo test -p xtask check_no_reverse_dns (fixture tests)
        run: cargo test -p xtask check_no_reverse_dns
