name: Check Pack → Load

# Foundation gate for the file-based package distribution model:
# `streamlib pkg build` produces a `.slpkg`, `Runner::add_module_with`
# consumes it from a file, and the package's schemas (schemas-only
# package) land in the runtime registries. Any mismatch between the
# pack producer side (`tools/streamlib-cli/src/commands/pkg.rs`) and the
# load consumer side (`Strategy::Slpkg` / `extract_slpkg_to_cache` in
# `runtime/streamlib-engine/src/core/runtime/`) surfaces here before the
# broader example sweep / container smoke test would amplify it.
#
# Covers:
#   - The `.slpkg` store + catalog renderers + gapless atomic
#     staged-swap + completeness negative gate (`cargo test -p
#     streamlib-pack`).
#   - One schemas-only package (`@tatolab/core`): pack-then-add-from-file
#     exercises the no-cdylib branch — `pkg build` emits no `lib/`
#     entries, the loader walks the `schemas:` map and registers each
#     canonical schema. Pure file-based; no by-version SDK resolution.
#   - Negative paths: missing slpkg, foreign-triple-only slpkg.
#
# The Rust-impl leg (`@tatolab/jpeg`, which cargo-builds a cdylib
# out-of-tree and needs the SDK by version) is `#[ignore]`d — the
# custom cargo registry that served it was removed (#1322); SDK publish
# to real registries is deferred (#1323) and the leg's rework onto
# `streamlib link --engine` is tracked by #1338. Rust-cdylib load
# coverage meanwhile lives in the `load_project_dylib_*` dlopen
# integration tests. (`@tatolab/jpeg` is the remaining engine-free Rust
# package after `@tatolab/network` / `@tatolab/mavlink` /
# `@tatolab/vadr-vision` were evicted to tatolab/streamlib-packages.)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pack-then-load-smoke:
    name: pack → load smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # The pack-then-load test builds `streamlib-cli` (depends on
        # the full SDK) and `streamlib-engine`. Both inherit the
        # engine's Linux dep set; minimal subset covers them without
        # dragging in the GPU/codec backends.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            protobuf-compiler \
            libvulkan-dev \
            glslc

      - name: Install jtd-codegen
        # The engine's `build.rs` invokes the upstream `jtd-codegen`
        # binary (v0.4.1) to generate typed bindings from JTD schemas
        # — see `sdk/streamlib-jtd-codegen/src/lib.rs` for the
        # version contract. The streamlib-engine build fails without
        # it (`jtd-codegen not found. Install v0.4.1 from
        # https://github.com/jsontypedef/json-typedef-codegen/releases/tag/v0.4.1`).
        run: |
          curl -sSL https://github.com/jsontypedef/json-typedef-codegen/releases/download/v0.4.1/x86_64-unknown-linux-gnu.zip -o /tmp/jtd-codegen.zip
          unzip -q /tmp/jtd-codegen.zip -d /tmp/jtd-codegen
          sudo install -m 0755 /tmp/jtd-codegen/jtd-codegen /usr/local/bin/jtd-codegen
          jtd-codegen --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pack-load-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pack-load-

      # `.slpkg` store + catalog renderers, atomic staged-swap, and the
      # completeness negative gate (folded in from the retired
      # static-registry workflow).
      - name: cargo test -p streamlib-pack
        run: cargo test --locked -p streamlib-pack

      # File-based pack → add-from-file smoke: the schemas-only leg + the
      # negative paths run by default; the Rust-impl leg is `#[ignore]`d
      # (see the header + the test's `#[ignore]` reason).
      - name: cargo test pack_then_load_smoke
        run: cargo test --locked --test pack_then_load_smoke -p streamlib-engine
