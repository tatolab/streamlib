name: Test

# DISABLED: Temporarily disabled to reduce GitHub Actions costs
# To re-enable, uncomment the triggers below
on:
  workflow_dispatch:  # Manual trigger only
  # pull_request:
  # push:
  #   branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Tests (macOS)
    runs-on: macos-14  # macOS for Apple-specific code

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: brew install opus pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --features debug-overlay --bins --lib -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --features debug-overlay

      - name: Run tests
        run: cargo test --workspace --features debug-overlay --lib

      - name: Build examples
        run: |
          cargo build -p camera-display
          cargo build -p whep-player
          cargo build -p microphone-reverb-speaker

  rust-tests-linux:
    name: Rust Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            protobuf-compiler \
            libvulkan-dev \
            libopus-dev \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libavdevice-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p streamlib -p streamlib-broker --features ffmpeg -- -D warnings

      - name: Check streamlib
        run: cargo check -p streamlib

      - name: Check streamlib with FFmpeg
        run: cargo check -p streamlib --features ffmpeg

      - name: Run unit tests
        run: cargo test -p streamlib --lib

      - name: Check streamlib-broker
        run: cargo check -p streamlib-broker

      - name: Run streamlib-broker tests
        # Includes lib tests and the daemon-lifecycle integration tests
        # (socket activation, idle-exit, stale-socket cleanup, systemd
        # unit parsing, dead-runtime pruning). These run on the Linux
        # job because the broker is Linux-only.
        run: cargo test -p streamlib-broker
