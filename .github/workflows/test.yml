name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests-linux:
    name: Rust Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # `-p streamlib` pulls streamlib-engine, whose build.rs compiles GLSL
        # compute shaders with glslc and generates JTD bindings; the Linux
        # engine dep set links Vulkan. Minimal subset — no GPU/codec backends.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            protobuf-compiler \
            libvulkan-dev \
            glslc

      - name: Install jtd-codegen
        # The engine's build.rs invokes the upstream jtd-codegen binary
        # (v0.4.1) to generate typed bindings from JTD schemas — see
        # sdk/streamlib-jtd-codegen/src/lib.rs for the version contract. The
        # streamlib-engine build fails without it.
        run: |
          curl -sSL https://github.com/jsontypedef/json-typedef-codegen/releases/download/v0.4.1/x86_64-unknown-linux-gnu.zip -o /tmp/jtd-codegen.zip
          unzip -q /tmp/jtd-codegen.zip -d /tmp/jtd-codegen
          sudo install -m 0755 /tmp/jtd-codegen/jtd-codegen /usr/local/bin/jtd-codegen
          jtd-codegen --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        # A cache-service flake must never fail the job; a miss just means a cold build.
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      # Unit-test gate. Runs the facade + the engine-free ABI crates' lib tests:
      # streamlib-plugin-abi / -plugin-sdk carry the layout-regression, fingerprint,
      # twin-drift and tier-1 wire-format locks — the guards against silent ABI
      # layout drift (which corrupts the driver only in a separately-built .slpkg).
      # These crates are pure-repr / engine-free, so they add no flaky or GPU tests.
      # streamlib-engine's lib tests (host-body tier-1 + engine twin) are a tracked
      # follow-up, pending a fix to a parallel-run test flake.
      - name: Run unit tests
        run: cargo test --locked -p streamlib -p streamlib-plugin-abi -p streamlib-plugin-sdk -p streamlib-processor-extract --lib
