name: Static Registry

# Daemon-free registry gate: emit the four-ecosystem static tree (cargo sparse
# + pypi-simple + npm + `.slpkg` generic) and resolve real packages from it over
# `file://` (slpkg, pypi) / a dumb static HTTP mount (cargo, npm) with NO registry
# daemon and NO token — closing the standing CI red.
#
# Covers:
#   - The static-registry renderers + gapless atomic staged-swap (unit tests).
#   - The `.slpkg` file:// resolve + the completeness NEGATIVE gate: a truncated
#     tree (member removed / omitted from the release manifest) is REJECTED,
#     not silently half-resolved.
#   - The vulkanalia-fork static cargo tree emitter (shell) + the xtask
#     `static-registry emit` generator, run daemon-free in-job.
#
# See docs/architecture/static-registry.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  static-registry:
    name: emit + daemon-free resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck the registry scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/registry/emit-static-fork.sh \
                     scripts/registry/emit-cargo-local-registry.sh \
                     scripts/registry/serve-static-registry.sh \
                     scripts/registry/cargo-idx-path.sh

      - name: Install system dependencies
        # streamlib-pack sits on the lean idents/schema/cargo-build crates, but
        # the workspace resolve pulls the engine's Linux dep set through the
        # graph. Minimal subset covers the build.
        run: |
          sudo apt-get install -y pkg-config protobuf-compiler libvulkan-dev glslc

      - name: Install jtd-codegen
        run: |
          curl -sSL https://github.com/jsontypedef/json-typedef-codegen/releases/download/v0.4.1/x86_64-unknown-linux-gnu.zip -o /tmp/jtd-codegen.zip
          unzip -q /tmp/jtd-codegen.zip -d /tmp/jtd-codegen
          sudo install -m 0755 /tmp/jtd-codegen/jtd-codegen /usr/local/bin/jtd-codegen

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-static-registry-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-static-registry-

      # Serverless bootstrap: emit the vulkanalia fork + reshape it into a cargo
      # local-registry `[source]` replacement (no HTTP server) so the workspace
      # resolves `--locked` offline against the mirror.
      - name: Mirror vulkanalia fork (serverless cargo [source] replacement)
        uses: ./.github/actions/cargo-fork-mirror

      - name: Static-registry renderers, atomic swap, slpkg completeness
        run: cargo test --locked -p streamlib-pack

      - name: xtask static-registry emit (fork tree, daemon-free smoke)
        # The composite action already cloned the fork to /tmp/vulkanalia-fork;
        # reuse it so the generator doesn't re-clone.
        run: |
          # Defensive: this smoke emit is fork-only (no --cargo-closure), so
          # target/package holds no closure tarballs today. Clearing it keeps
          # the "never reuse a stale-content tarball across a cached target dir"
          # invariant true even if a closure emit is added here later.
          # Content-addressed verification is the real fix.
          rm -rf target/package
          VULKANALIA_DIR=/tmp/vulkanalia-fork \
            cargo run --locked -q -p xtask -- static-registry emit \
              --out /tmp/emitted-registry \
              --base-url http://127.0.0.1:8799 \
              --no-pypi --no-npm --no-slpkg
          test -f /tmp/emitted-registry/cargo/config.json
          test -f /tmp/emitted-registry/cargo/vu/lk/vulkanalia
          echo "static cargo fork tree emitted daemon-free"
