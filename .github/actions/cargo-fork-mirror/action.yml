#
# Composite action: emit the tatolab/vulkanalia fork as a byte-stable static
# cargo sparse tree, reshape it into a SERVERLESS cargo LOCAL-REGISTRY, and
# point cargo at it via a `[source]` replacement written to the GLOBAL cargo
# config — so any workspace `cargo` command resolves `vulkanalia` daemon-free
# AND offline, WITHOUT a running HTTP server and WITHOUT the
# `CARGO_REGISTRIES_TATOLAB_INDEX` env override. This is the exact serverless
# path an external consumer uses: a source replacement keeps the canonical
# `sparse+https://registry.tatolab.com/cargo/` source id in Cargo.lock, so
# `--locked` resolves reproducibly against the mirror (the fork `.crate`s are
# byte-stable at the canonical URL — see scripts/registry/normalize_fork_crate.py
# and docs/architecture/static-registry.md).
#
# The workspace declares `vulkanalia = { registry = "tatolab" }`, so cargo
# cannot build a single crate (including xtask itself) until the fork is
# fetchable. emit-static-fork.sh packages the 3 fork crates behind its own ~2s
# throwaway packaging server (to resolve fork siblings during `cargo package`),
# which dies before workspace resolution; the reshape + `[source]` replacement
# then serve every later `cargo` step with no daemon.
#
# LOAD-BEARING: this action MUST NOT export `CARGO_REGISTRIES_TATOLAB_INDEX`.
# An env index override shadows the `[source]` replacement and rewrites the
# fork's source id in Cargo.lock (empirically: an env index for `tatolab` wins
# over `replace-with`), defeating the canonical-source-id preservation this
# action exists to provide.

name: Mirror vulkanalia fork as a serverless cargo [source] replacement
description: Emit the vulkanalia fork, reshape to a cargo local-registry, and configure a serverless [source] replacement (no HTTP server for cargo).

inputs:
  port:
    description: Ephemeral port emit-static-fork.sh's throwaway packaging server binds; it dies before workspace resolution.
    required: false
    default: "8799"
  out:
    description: Directory the static tree + local-registry mirror are emitted into.
    required: false
    default: /tmp/streamlib-static-registry

runs:
  using: composite
  steps:
    - name: Cache vulkanalia fork checkout
      id: fork-cache
      uses: actions/cache@v4
      with:
        path: /tmp/vulkanalia-fork
        # The pinned rev is the cache identity — a rev bump busts the cache.
        key: vulkanalia-fork-${{ hashFiles('libs/streamlib-cross-rustc-fixture/Cargo.toml') }}

    - name: Clone vulkanalia fork (on cache miss)
      if: steps.fork-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        rev="$(grep -oE 'rev = "[0-9a-f]{40}"' libs/streamlib-cross-rustc-fixture/Cargo.toml \
               | head -1 | grep -oE '[0-9a-f]{40}')"
        rm -rf /tmp/vulkanalia-fork
        git clone --quiet https://github.com/tatolab/vulkanalia.git /tmp/vulkanalia-fork
        git -C /tmp/vulkanalia-fork checkout --quiet "$rev"
        git -C /tmp/vulkanalia-fork submodule update --init --quiet \
          ext/vma/vendor/Vulkan-Headers ext/vma/vendor/VulkanMemoryAllocator

    - name: Emit fork + reshape to a serverless local-registry mirror
      shell: bash
      run: |
        set -euo pipefail
        # tomlkit backs the manifest annotation + normalize step in emit-static-fork.sh.
        python3 -m pip install --quiet tomlkit \
          || python3 -m pip install --quiet --user tomlkit \
          || python3 -m pip install --quiet --break-system-packages tomlkit
        mkdir -p "${{ inputs.out }}"
        # No STATIC_FORK_URL → emit-static-fork.sh starts its OWN ~2s throwaway
        # packaging server (to resolve fork siblings during `cargo package`) and
        # kills it before this step returns. No persistent server survives into
        # workspace resolution — the whole point. normalize_fork_crate.py (run
        # inside the emitter) rewrites the baked ephemeral-port URL to the
        # canonical index, so the emitted checksums are port-independent and
        # match the committed Cargo.lock.
        VULKANALIA_DIR=/tmp/vulkanalia-fork \
          scripts/registry/emit-static-fork.sh "${{ inputs.out }}" \
          --base-url "http://127.0.0.1:${{ inputs.port }}"
        # Reshape the sparse tree into a cargo local-registry that cargo resolves
        # over a `[source]` replacement with NO server (file-only).
        scripts/registry/emit-cargo-local-registry.sh \
          "${{ inputs.out }}" "${{ inputs.out }}/cargo-local-registry"
        echo "STREAMLIB_STATIC_REGISTRY_DIR=${{ inputs.out }}" >> "$GITHUB_ENV"

    - name: Configure the serverless [source] replacement (global cargo config)
      shell: bash
      run: |
        set -euo pipefail
        # GLOBAL config (not the repo .cargo/config.toml) so an out-of-tree
        # `cargo package` / build (check-pack-load's staged .slpkg, which
        # config-discovers from its own temp cwd) also sees the replacement.
        # Self-contained: declares the canonical [registries.tatolab] index +
        # the [source] replacement to the local-registry mirror. Deliberately
        # NO CARGO_REGISTRIES_TATOLAB_INDEX export (see the header note).
        cargo_home="${CARGO_HOME:-$HOME/.cargo}"
        mkdir -p "$cargo_home"
        lr="$(cd "${{ inputs.out }}/cargo-local-registry" && pwd)"
        {
          printf '\n[registries.tatolab]\n'
          printf 'index = "sparse+https://registry.tatolab.com/cargo/"\n'
          printf '\n[source.tatolab]\n'
          printf 'registry = "sparse+https://registry.tatolab.com/cargo/"\n'
          printf 'replace-with = "tatolab-local-registry"\n'
          printf '\n[source.tatolab-local-registry]\n'
          printf 'local-registry = "%s"\n' "$lr"
        } >> "$cargo_home/config.toml"

    - name: Assert mirror fork checksums match the committed Cargo.lock
      shell: bash
      run: |
        set -euo pipefail
        # The fork `.crate`s are byte-stable at the canonical URL (see
        # scripts/registry/normalize_fork_crate.py), so each mirror index-line
        # cksum must equal the checksum frozen in the committed root Cargo.lock
        # — that equality is what makes a `--locked` resolve against the mirror
        # succeed. A mismatch means the fork rev moved without a lock regen;
        # fail fast with an actionable message rather than let a downstream
        # `--locked` resolve brick on a cryptic "checksum changed" error.
        python3 - "${{ inputs.out }}/cargo-local-registry/index" Cargo.lock <<'PY'
        import json, re, sys
        idx, lock = sys.argv[1], sys.argv[2]
        # crate -> local-registry index shard path (fixed: the fork is these 3).
        forks = {
            "vulkanalia": "vu/lk/vulkanalia",
            "vulkanalia-sys": "vu/lk/vulkanalia-sys",
            "vulkanalia-vma": "vu/lk/vulkanalia-vma",
        }
        locktext = open(lock).read()
        def lock_cksum(name):
            for blk in locktext.split("[[package]]"):
                if re.search(rf'^name = "{re.escape(name)}"$', blk, re.MULTILINE):
                    m = re.search(r'^checksum = "([0-9a-f]+)"$', blk, re.MULTILINE)
                    return m.group(1) if m else None
            return None
        bad = False
        for name, shard in forks.items():
            emitted = json.loads(open(f"{idx}/{shard}").read().strip().splitlines()[-1])["cksum"]
            locked = lock_cksum(name)
            ok = emitted == locked
            print(f"  {name:16} mirror={emitted} lock={locked} [{'ok' if ok else 'MISMATCH'}]")
            bad = bad or not ok
        if bad:
            sys.stderr.write(
                "\nMirror vulkanalia-fork checksum(s) diverge from the committed "
                "Cargo.lock. Re-run scripts/registry/emit-static-fork.sh and update "
                "the fork checksums in Cargo.lock "
                "(see docs/architecture/static-registry.md).\n"
            )
            sys.exit(1)
        print("All mirror fork checksums match the committed Cargo.lock.")
        PY
