#
# Composite action: emit the tatolab/vulkanalia fork into a STATIC cargo sparse
# tree and serve it with a dumb `python3 -m http.server`, so any workspace
# `cargo` command resolves `vulkanalia` daemon-free — no Gitea, no token.
# Exports `CARGO_REGISTRIES_GITEA_INDEX` for every later step in the job.
#
# This is the daemon-free bootstrap: the workspace declares
# `vulkanalia = { registry = "gitea" }`, so cargo cannot build a single crate
# (including xtask itself) until the fork is fetchable. Emitting it as a static
# file tree removes the localhost:3300 dependency the standing CI red hit.

name: Serve static vulkanalia fork registry
description: Emit + serve the vulkanalia fork as a daemon-free static cargo sparse index.

inputs:
  port:
    description: Port the static registry is served on (127.0.0.1).
    required: false
    default: "8799"
  out:
    description: Directory the static tree is emitted into.
    required: false
    default: /tmp/streamlib-static-registry

runs:
  using: composite
  steps:
    - name: Cache vulkanalia fork checkout
      id: fork-cache
      uses: actions/cache@v4
      with:
        path: /tmp/vulkanalia-fork
        # The pinned rev is the cache identity — a rev bump busts the cache.
        key: vulkanalia-fork-${{ hashFiles('libs/streamlib-cross-rustc-fixture/Cargo.toml') }}

    - name: Clone vulkanalia fork (on cache miss)
      if: steps.fork-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        rev="$(grep -oE 'rev = "[0-9a-f]{40}"' libs/streamlib-cross-rustc-fixture/Cargo.toml \
               | head -1 | grep -oE '[0-9a-f]{40}')"
        rm -rf /tmp/vulkanalia-fork
        git clone --quiet https://github.com/tatolab/vulkanalia.git /tmp/vulkanalia-fork
        git -C /tmp/vulkanalia-fork checkout --quiet "$rev"
        git -C /tmp/vulkanalia-fork submodule update --init --quiet \
          ext/vma/vendor/Vulkan-Headers ext/vma/vendor/VulkanMemoryAllocator

    - name: Serve the tree (before emit — emit resolves fork siblings from it)
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.out }}"
        # Detach the static server so it survives into later job steps. It
        # serves the tree WHILE emit populates it (http.server stats per
        # request), so `cargo package` for vulkanalia resolves the
        # already-emitted vulkanalia-sys from THIS exact tree — one server,
        # no port coupling, no second bind.
        nohup python3 -m http.server "${{ inputs.port }}" --bind 127.0.0.1 \
          --directory "${{ inputs.out }}" > /tmp/static-registry-httpd.log 2>&1 &
        for _ in $(seq 1 30); do
          curl -fsS "http://127.0.0.1:${{ inputs.port }}/" >/dev/null 2>&1 && break
          sleep 1
        done
        curl -fsS "http://127.0.0.1:${{ inputs.port }}/" >/dev/null \
          || { echo "static registry server did not come up"; cat /tmp/static-registry-httpd.log; exit 1; }
        echo "STATIC_FORK_URL=http://127.0.0.1:${{ inputs.port }}" >> "$GITHUB_ENV"
        echo "CARGO_REGISTRIES_GITEA_INDEX=sparse+http://127.0.0.1:${{ inputs.port }}/cargo/" >> "$GITHUB_ENV"
        echo "STREAMLIB_STATIC_REGISTRY_DIR=${{ inputs.out }}" >> "$GITHUB_ENV"

    - name: Emit static fork registry tree
      shell: bash
      run: |
        set -euo pipefail
        # tomlkit backs the manifest annotation step in emit-static-fork.sh.
        python3 -m pip install --quiet tomlkit \
          || python3 -m pip install --quiet --user tomlkit \
          || python3 -m pip install --quiet --break-system-packages tomlkit
        # STATIC_FORK_URL → the script skips its own throwaway server and
        # resolves fork siblings through the already-running one above.
        VULKANALIA_DIR=/tmp/vulkanalia-fork \
        STATIC_FORK_URL="http://127.0.0.1:${{ inputs.port }}" \
          scripts/gitea/emit-static-fork.sh "${{ inputs.out }}" \
          --base-url "http://127.0.0.1:${{ inputs.port }}"
        # The emitted tree is complete and fetchable through the live server.
        curl -fsS "http://127.0.0.1:${{ inputs.port }}/cargo/config.json" >/dev/null \
          || { echo "emitted tree not fetchable"; exit 1; }
