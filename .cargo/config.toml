# Cargo configuration for streamlib workspace

[alias]
xtask = "run --package xtask --"

# The `tatolab` registry: the streamlib SDK crate chain + the vulkanalia fork
# resolve by version from the static file-tree registry. This canonical index
# URL is baked into every consumer's Cargo.lock; it does NOT need to be live —
# offline / local resolution works against a mirror of the tree. To resolve
# from a local folder or any other mount, emit the `[source]` replacement with
# `streamlib registry use <dir>` (cargo source-replacement keeps this canonical
# source id in the lockfile), or override with `CARGO_REGISTRIES_TATOLAB_INDEX`.
# Reads are anonymous (tokenless); the tree is served by any dumb HTTP mount.
# See docs/architecture/static-registry.md.
[registries.tatolab]
index = "sparse+https://registry.tatolab.com/cargo/"
