[package]
name = "streamlib-plugin-sdk"
description = "Engine-free StreamLib authoring SDK. Packages (plugins) depend on this instead of the streamlib engine facade, so a plugin cdylib never statically links a second copy of streamlib-engine. Carries the cdylib (vtable-marshal) arm of the dual-mode authoring types; the host backings stay in the engine."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[lib]
name = "streamlib_plugin_sdk"
path = "src/lib.rs"

[dependencies]
# Canonical Error / Result / PortDirection (engine-free, plugin/ zone).
streamlib-error = { path = "../streamlib-error", version = "0.4.30", registry = "gitea" }
# Schema identity, descriptor types, execution config — engine-free shared
# data the macro emits against and the views/traits return.
streamlib-processor-schema = { path = "../../libs/streamlib-processor-schema", version = "0.4.30", registry = "gitea" }
# Plugin ABI vtables + HostServices + export_plugin! (zero-dep, engine-free).
streamlib-plugin-abi = { path = "../../libs/streamlib-plugin-abi", version = "0.4.30", registry = "gitea" }
# Procedural macros (#[processor], schema_ident!, module_ident!, ...). Re-exported
# under sdk::* so plugins author against this crate by its real name.
streamlib-macros = { path = "../../libs/streamlib-macros", version = "0.4.30", registry = "gitea" }

serde = { workspace = true }
serde_json = { workspace = true }
rmp-serde = { workspace = true }
tracing = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
# Consumer-side RHI carve-out: TextureFormat / TextureUsages / PixelFormat /
# VulkanLayout the views surface. Engine-free (the python/deno cdylibs already
# depend on it instead of the engine).
streamlib-consumer-rhi = { path = "../../libs/streamlib-consumer-rhi", version = "0.4.30", registry = "gitea" }

[lints]
workspace = true
