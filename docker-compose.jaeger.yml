# StreamLib — Example: Jaeger for local trace visualization
#
# This is a convenience for quick local testing. StreamLib works with ANY
# OTLP-compatible backend (Grafana Tempo, Datadog, Honeycomb, etc.) —
# just set STREAMLIB_OTLP_ENDPOINT on the broker.
#
# Usage:
#   docker compose -f docker-compose.jaeger.yml up -d
#   STREAMLIB_OTLP_ENDPOINT=http://localhost:4317 ./.streamlib/bin/streamlib-broker
#   open http://localhost:16686

services:
  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "16686:16686"  # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
