[package]
name = "streamlib-cli"
description = "Command-line interface for StreamLib runtime"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[[bin]]
name = "streamlib"
path = "src/main.rs"

[dependencies]
# Core library (bundles all Rust processors)
streamlib = { path = "../../sdk/streamlib-sdk", version = "0.7.32" }

# Schema types (processor YAML parsing)
streamlib-processor-schema = { path = "../../sdk/streamlib-processor-schema", version = "0.7.32" }

# Manifest + workspace + dependency-spec types for `streamlib pack` /
# `streamlib add` / `streamlib remove` — typed PackageRef, Manifest schema, etc.
streamlib-idents = { path = "../../sdk/streamlib-idents", version = "0.7.32" }

# Cargo-build orchestration helpers — `streamlib pack`'s auto-build branch
# routes through this crate so the same logic is reused by
# `streamlib-build-orchestrator` without dragging in the full CLI surface.
streamlib-cargo-build = { path = "../streamlib-cargo-build", version = "0.7.32" }
streamlib-pack = { path = "../streamlib-pack", version = "0.7.32" }

# JTD-codegen pipeline (drives `streamlib generate`)
streamlib-jtd-codegen = { path = "../../sdk/streamlib-jtd-codegen", version = "0.7.32" }

# CLI framework
clap = { version = "4.5", features = ["derive"] }

# Async runtime
tokio.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml.workspace = true

# Format-preserving TOML editing for `streamlib link` (cargo config + pyproject
# override emission that survives an idempotent byte-clean unlink).
toml_edit.workspace = true

# Content hashing for the `streamlib link` backup manifest.
sha2.workspace = true

# Error handling
anyhow.workspace = true
thiserror.workspace = true

# Load .env files for development environment
dotenvy = "0.15"

# Logging
tracing.workspace = true

# Timestamp parsing for log filtering
chrono = "0.4"

# Home directory detection
dirs = "6.0"

# ZIP archive creation
zip = "2.2"

# Temporary directory for `uv build --wheel` output staging inside `streamlib pack`
tempfile = "3.14"

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
