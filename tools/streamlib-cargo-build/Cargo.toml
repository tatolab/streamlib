[package]
name = "streamlib-cargo-build"
description = "Cargo-build orchestration helpers shared between `streamlib pack` and `streamlib-build-orchestrator` — host target triple probe, cdylib JSON-artifact parser, package-directory discovery, per-package staging"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
streamlib-idents = { path = "../../sdk/streamlib-idents", version = "0.6.0" }
streamlib-processor-schema = { path = "../../sdk/streamlib-processor-schema", version = "0.6.0" }

[dev-dependencies]
tempfile = "3.14"

[lints]
workspace = true
