[package]
name = "streamlib-build-orchestrator"
description = "Default polyglot BuildOrchestrator impl — runtime materialization of source packages into the streamlib package cache. Assembles the same complete artifact `streamlib pack` produces (via streamlib-pack) and stages it as an extracted directory, identical to extracting a .slpkg / installing from GitHub. Depends on streamlib-engine for the BuildOrchestrator trait."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[dependencies]
anyhow = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde_json = { workspace = true }
toml_edit = { workspace = true }
ureq = { workspace = true }
streamlib-engine = { path = "../../runtime/streamlib-engine", version = "0.7.0" }
streamlib-cargo-build = { path = "../streamlib-cargo-build", version = "0.7.0" }
streamlib-pack = { path = "../streamlib-pack", version = "0.7.0" }
streamlib-idents = { path = "../../sdk/streamlib-idents", version = "0.7.0" }
streamlib-plugin-abi = { path = "../../runtime/streamlib-plugin-abi", version = "0.7.0" }
streamlib-jtd-codegen = { path = "../../sdk/streamlib-jtd-codegen", version = "0.7.0" }

[dev-dependencies]
tempfile = "3.14"
serial_test = "3.2"
streamlib-idents = { path = "../../sdk/streamlib-idents" }

[lints]
workspace = true
