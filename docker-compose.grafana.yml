# StreamLib — Local Grafana stack for telemetry visualization
#
# Provides Grafana + Tempo (traces) + Loki (logs), all receiving OTLP.
#
# Usage:
#   docker compose -f docker-compose.grafana.yml up -d
#   STREAMLIB_OTLP_ENDPOINT=http://localhost:4317 cargo run -p streamlib-runtime
#   open http://localhost:3000  (admin/admin)
#
# Backfill historical data:
#   streamlib telemetry export --endpoint http://localhost:4317 --since 7d
#
# Data persists in Docker volumes (survives restarts).
# To reset: docker compose -f docker-compose.grafana.yml down -v

services:
  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "3200:3200"   # Tempo API

  loki:
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./docker/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki API + push endpoint

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./docker/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"   # Grafana UI
    depends_on:
      - tempo
      - loki

volumes:
  tempo-data:
  loki-data:
  grafana-data:
