[package]
name = "streamlib-engine"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "Engine internals for streamlib (RHI, IPC, surface-share, runtime executor). Customer apps depend on `streamlib` (the SDK), not on this crate directly."
keywords = ["video", "streaming", "gpu", "real-time", "ai"]
categories = ["multimedia::video", "multimedia", "api-bindings"]

[lib]
name = "streamlib_engine"
crate-type = ["rlib"]

[features]
default = []
# GPU backend selection (feature overrides default platform backend)
backend-metal = []
backend-vulkan = ["dep:vulkanalia"]
# Strip `debug!` (and `trace!`) from release builds. Opt-in per deployment
# image. `warn!` / `error!` / `info!` are never stripped. See docs/logging.md.
strip_debug_logging = ["tracing/release_max_level_info"]
# Tier 2 — hardware-integration tests (`#[cfg_attr(not(feature =
# "hardware-tests"), ignore)]` on tests that construct a real
# `HostVulkanDevice`). Default `cargo test` is the tier-1 unit gate
# (parallel-safe, mocked). To run hardware tests:
#   cargo test --features streamlib/hardware-tests --workspace -- --test-threads=1
# See `docs/testing-hardware.md`.
hardware-tests = []

# In-memory constructors for engine primitives (e.g. `TapSubscription`) that
# normally require a live iceoryx2 channel, so a downstream consumer (the
# api-server tap tools) can be tested without one. Default-off; enabled only by
# a consumer's `[dev-dependencies]`, so it is physically excluded from a
# production build's dependency graph.
test-support = []

# Codec-layer debug knob (`vulkan/video/codec_utils/vk_buffer_resource.rs`):
# zero out bitstream buffers when (re)allocating, to make NAL-parser bugs
# easier to spot in raw memory. Off by default; opt-in for nvpro-style
# debugging only. Inherited from the former libs/vulkan-video crate's
# feature set; intent kept identical post-fold.
clear_bitstream_buffers_on_create = []

[dependencies]
# Processor schema types (shared with macros for code generation)
streamlib-processor-schema = { path = "../../sdk/streamlib-processor-schema", version = "0.7.23", features = ["utoipa"] }

# Canonical Error / Result / PortDirection, shared with the plugin-SDK so
# plugin cdylibs author against them without linking the engine. The engine
# re-exports them at `core::error`.
streamlib-error = { path = "../../sdk/streamlib-error", version = "0.7.23" }

# Schema identity + manifest types (one source of truth for the
# structured `dependencies:` shape consumed at runtime).
streamlib-idents = { path = "../../sdk/streamlib-idents", version = "0.7.23" }
# Runtime-layer codegen: the engine regenerates the source-only Python SDK's
# wire vocabulary (`streamlib/_generated_`) into each processor venv after
# install. Same codegen the build script uses; needed at runtime here too.
streamlib-jtd-codegen = { path = "../../sdk/streamlib-jtd-codegen", version = "0.7.23" }

# Procedural macros
streamlib-macros = { path = "../../sdk/streamlib-macros", version = "0.7.23" }

# Plugin ABI wire-protocol header. Dep direction reversed in #877:
# streamlib-plugin-abi no longer depends on streamlib (the SDK), so the
# cyclic dep this dep used to dodge (engine → plugin-abi → sdk → engine)
# is gone. The engine's dlopen loader uses `PluginDeclaration` and
# `STREAMLIB_ABI_VERSION` from this crate directly.
streamlib-plugin-abi = { path = "../streamlib-plugin-abi", version = "0.7.23" }

# Shared iceoryx2 payload types (for cross-process IPC)
streamlib-ipc-types = { path = "../streamlib-ipc-types", version = "0.7.23" }

# Consumer-side carve-out — owns the format primitives
# (TextureFormat / TextureUsages / PixelFormat), the trait machinery
# (VulkanRhiDevice, DevicePrivilege, *Like, ConsumerMarker), the
# Consumer* RHI types (Linux), and a slim ConsumerRhiError. streamlib
# re-exports the primitives so existing in-tree call sites (e.g.
# `crate::core::rhi::TextureFormat`) keep working unchanged.
streamlib-consumer-rhi = { path = "../streamlib-consumer-rhi", version = "0.7.23" }

# Core dependencies (always included)
thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "net", "sync"] }
crossbeam-channel = "0.5"
inventory = "0.3"
parking_lot = "0.12"  # Fast mutexes for all synchronization
crossbeam-queue = "0.3"  # Lock-free MPMC queue for thread-safe mailboxes
iceoryx2 = "0.8.1"  # Zero-copy IPC pub/sub for cross-process communication
iceoryx2-log = "0.8.1"  # Bridge iceoryx2's internal log records into streamlib tracing
rmp-serde = "1.3"  # MessagePack serialization for frame payloads
signal-hook = "0.3"  # Native signal handling (SIGTERM, SIGINT) for event bus
ctrlc = "3.4"  # Cross-platform Ctrl+C handler (works with GUI apps)
petgraph = "0.8.3"  # Directed graph for GraphOptimizer topology analysis
ahash = "0.8"  # Fast hashing for graph checksum computation
anymap2 = "0.13"  # TypeMap for embedded component storage on graph weights
cuid2 = "0.1"  # Collision-resistant unique identifiers for processor/link IDs
uuid = { version = "1.11", features = ["v4"] }  # UUID generation for PixelBufferPoolId
dirs = "6.0"   # Cross-platform home directory resolution
zip = "2.2"    # ZIP archive extraction for .slpkg packages
libloading = "0.8"  # Dynamic library loading for Rust dylib plugins
sha2.workspace = true  # SHA-256 hashing for venv cache keys + .slpkg integrity
ureq.workspace = true  # Blocking HTTP fetch for remote `.slpkg` (Strategy::Url)
dotenvy = "0.15"  # Load .env files for development environment

# Serialization
serde.workspace = true
# Generated `EncodedVideoFrame.data` / `EncodedAudioFrame.data` carry
# `#[serde(with = "serde_bytes")]` for compact msgpack `bin` wire shape.
serde_bytes.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml.workspace = true
schemars = "0.8"  # JSON Schema generation from Rust types

# Vulkan backend (optional, enabled via backend-vulkan feature)
vulkanalia = { workspace = true, optional = true }


# OpenAPI schema derives on the JSON wire types in `core/json_schema.rs`.
utoipa = { version = "5.3", features = ["axum_extras"] }

# Platform-specific: macOS/iOS
[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
objc2.workspace = true
objc2-metal.workspace = true
objc2-io-surface.workspace = true
objc2-core-foundation.workspace = true
objc2-core-video.workspace = true
objc2-foundation.workspace = true
objc2-av-foundation = { workspace = true, features = ["objc2-core-media", "objc2-core-video"] }
objc2-app-kit.workspace = true
objc2-quartz-core.workspace = true
objc2-core-text.workspace = true
objc2-core-graphics.workspace = true
libc.workspace = true

# Apple-specific crates
metal = "0.31"  # Metal crate for native RHI backend
dispatch2 = "0.3"  # GCD dispatch queues
# yuv.workspace = true  # REMOVED - now using GPU-accelerated VTPixelTransferSession
pollster = "0.3"  # For blocking on async
mach2 = "0.4"  # Mach kernel API for thread priorities and timing

[target.'cfg(target_os = "linux")'.dependencies]
vulkanalia = { workspace = true }
vulkanalia-vma = { workspace = true }
rspirv-reflect = { workspace = true }
libc.workspace = true
winit = "0.30"  # Window creation and event loop for display processor
raw-window-handle = "0.6"  # Raw window handle types for Vulkan surface creation
# rtkit (RealtimeKit) D-Bus client for unprivileged SCHED_FIFO / nice
# priority elevation on Linux. PipeWire / PulseAudio / JACK use the
# same path. Without it, `pthread_setschedparam(SCHED_FIFO|RR, ...)`
# fails with EPERM on every desktop process; rtkit-daemon does the
# privileged syscall on the requesting thread's behalf.
zbus = "5"
# Wire-format helpers for the per-runtime surface-sharing socket
streamlib-surface-client = { path = "../streamlib-surface-client", version = "0.7.23" }
# Surface adapter ABI types referenced by the host-side CpuReadbackBridge
# trait (linux-only; the cpu-readback adapter is linux-only).
streamlib-adapter-abi = { path = "../../adapters/streamlib-adapter-abi", version = "0.7.23" }
# Consumer-side carve-out — defines the trait machinery
# (VulkanRhiDevice, DevicePrivilege, *Like, ConsumerMarker), the
# Consumer* RHI types, and the format/error primitives shared with the
# host side. streamlib re-exports for in-tree consumers; subprocess
# cdylibs depend on it directly so the FullAccess capability boundary
# is enforced by the type system.
streamlib-consumer-rhi = { path = "../streamlib-consumer-rhi", version = "0.7.23" }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.9"
core-graphics = "0.24"

[dev-dependencies]
# Self-alias via the SDK so engine tests / benches that use
# `#[streamlib::processor(...)]` resolve macro-emitted `::streamlib::*`
# paths through the SDK (which transitively re-exports engine items).
# Dev-dep cycles are permitted by Cargo because they don't propagate.
streamlib = { path = "../../sdk/streamlib-sdk" }
tokio = { workspace = true, features = ["full"] }
hound = "3.5"  # WAV file writing for examples
serial_test = "3.2"  # Run tests sequentially to avoid global PUBSUB interference
tempfile = "3.14"  # Temporary directories for config tests
criterion = { version = "0.5", features = ["html_reports"] }  # Benches for logging hot path (#447)
png = "0.17"  # PNG decoding for shader-output fixture comparisons

[[bench]]
name = "logging"
harness = false

[[bench]]
name = "output_writer_ffi_hop"
harness = false

[[bin]]
name = "log_emit_1000"
path = "tests/bin/log_emit_1000.rs"
# Strace-backed no-syscalls test child. Built under `cargo test` via
# the path dep; not needed for normal builds.

[[bin]]
name = "surface_share_crash_helper"
path = "tests/bin/surface_share_crash_helper.rs"
# Subprocess fixture for the EPOLLHUP watchdog integration test
# (runtime/streamlib-engine/tests/surface_share_subprocess_crash.rs). Linux only.
required-features = []

[build-dependencies]
streamlib-jtd-codegen = { path = "../../sdk/streamlib-jtd-codegen", version = "0.7.23" }
serde_json = { workspace = true }

# Build dependencies for protobuf compilation (surface-share service gRPC)
[target.'cfg(target_os = "macos")'.build-dependencies]
tonic-build = "0.12"
prost-build = "0.13"

[package.metadata.docs.rs]
# Generate docs for all platforms and features
all-features = true
targets = ["x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

# [package.metadata.streamlib] removed in #402.
# Schema list moved to `streamlib.yaml` (the single source of truth for
# this package's schemas + dependencies). The `processors` array that
# previously lived here referenced YAML files that did not exist on disk
# — dead config, removed without replacement. Inline processor definitions
# remain in `streamlib.yaml`'s `processors:` block.
#
# CI lint (`cargo xtask check-no-streamlib-metadata`, #402) rejects
# re-introduction of this block.

[lints]
workspace = true
