[package]
name = "streamlib-runtime"
description = "StreamLib runtime binary — hosts processors and the API server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[[bin]]
name = "streamlib-runtime"
path = "src/main.rs"

[dependencies]
# Engine + SDK. Every processor EXCEPT the always-present control plane is
# loaded at runtime through the all-dynamic module loader, not linked here.
streamlib = { path = "../../sdk/streamlib-sdk", version = "0.7.38" }

# The API server is the control plane — a host, not a loadable plugin — so
# it is statically linked and registered in-process on `PROCESSOR_REGISTRY`
# rather than dlopen'd. It is a host-side, non-distributable package.
streamlib-api-server = { path = "../../packages/api-server", version = "1.0.0" }

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# JSON config for module-loaded processors (ProcessorSpec)
serde_json = "1"

# Async runtime
tokio.workspace = true

# Logging
tracing.workspace = true

# Runtime ID generation
cuid2 = "0.1"

# Error handling
anyhow.workspace = true
