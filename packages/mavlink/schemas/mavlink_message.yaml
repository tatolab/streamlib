#
# JSON Type Definition (RFC 8927) schema for a decoded MAVLink2 message,
# represented as a tagged union over the common-dialect navigation /
# telemetry / control messages the sim exchanges with the pilot. The
# discriminator (`kind`) preserves the message-type distinction across the
# iceoryx2 mailbox; consumers `match` on the variant to dispatch typed
# payload handling.
#
# Each variant carries:
#   - MAVLink header fields (system_id, component_id, sequence)
#   - Networking metadata (peer_addr, timestamp_ns from the source
#     NetworkPacket; both pass through encode → decode roundtrips).
#   - The MAVLink message body, field-for-field matched against the
#     common-dialect XML definition. Field types mirror the wire format:
#     uint8 enums (MavType, MavAutopilot, MavModeFlag, MavState) stay as
#     raw `uint8` here so the schema doesn't bake the enum surface into
#     the wire vocabulary — consumers map to typed enums in user code if
#     they wish. uint64 / int64 fields ride as decimal strings per the
#     in-tree int64-as-string convention.
#
# Adding a new MAVLink message later means adding one entry to `mapping:`
# below — the processor surface (one input port, one output port per
# direction) stays unchanged.

metadata:
  type: MavlinkMessage
  description: "Decoded MAVLink2 message as a tagged union over the supported common-dialect messages"
  read_mode: read_next_in_order
  max_queued_messages: 64
  # MAVLink2 max wire frame is 280 bytes (1 STX + 10 header + 255 payload
  # + 2 CRC + 13 signature). The decoded-struct form is larger due to
  # msgpack overhead and string-encoded int64 fields, but still fits
  # comfortably under 1 KiB; round up for headroom.
  max_payload_bytes: 1024

discriminator: kind
mapping:
  heartbeat:
    properties:
      system_id:
        metadata:
          description: "MAVLink system ID of the sender (1..255). Vehicles conventionally use 1; GCS uses 255."
        type: uint8
      component_id:
        metadata:
          description: "MAVLink component ID of the sender (1..255). Autopilot uses 1; companion-computer / GCS commonly use MAV_COMP_ID_USER1 (190)."
        type: uint8
      sequence:
        metadata:
          description: "MAVLink sequence counter; wraps at 256. Auto-incremented by MavlinkEncoder per (system_id, component_id) pair."
        type: uint8
      peer_addr:
        metadata:
          description: "Networking peer address as host:port. On decode this is propagated from the source NetworkPacket; on encode it overrides UdpSink's default_destination. Empty string means 'use the sink's default_destination'."
        type: string
      timestamp_ns:
        metadata:
          description: "Monotonic timestamp from the source NetworkPacket recv (int64 as string). Populated by MavlinkDecoder; ignored by MavlinkEncoder."
        type: string
      custom_mode:
        metadata:
          description: "A bitfield for use for autopilot-specific flags."
        type: uint32
      mavtype:
        metadata:
          description: "Vehicle/component type — MAV_TYPE enum value (raw uint8). 0=GENERIC, 2=QUADROTOR, 6=GCS, etc."
        type: uint8
      autopilot:
        metadata:
          description: "Autopilot type / class — MAV_AUTOPILOT enum value (raw uint8). 8=INVALID (non-flight-controller node), 12=PX4, 3=ARDUPILOTMEGA."
        type: uint8
      base_mode:
        metadata:
          description: "System mode bitmap — MAV_MODE_FLAG (raw uint8). Bits include MANUAL_INPUT_ENABLED, STABILIZE_ENABLED, GUIDED_ENABLED, AUTO_ENABLED, SAFETY_ARMED."
        type: uint8
      system_status:
        metadata:
          description: "System status — MAV_STATE enum value (raw uint8). 0=UNINIT, 3=STANDBY, 4=ACTIVE, 5=CRITICAL, 6=EMERGENCY."
        type: uint8
      mavlink_version:
        metadata:
          description: "MAVLink wire-protocol version. Always 3 for MAVLink2."
        type: uint8

  attitude:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_boot_ms:
        metadata:
          description: "Timestamp since system boot, milliseconds."
        type: uint32
      roll:
        metadata:
          description: "Roll angle (-pi..+pi), radians."
        type: float32
      pitch:
        metadata:
          description: "Pitch angle (-pi..+pi), radians."
        type: float32
      yaw:
        metadata:
          description: "Yaw angle (-pi..+pi), radians."
        type: float32
      rollspeed:
        metadata:
          description: "Roll angular speed, rad/s."
        type: float32
      pitchspeed:
        metadata:
          description: "Pitch angular speed, rad/s."
        type: float32
      yawspeed:
        metadata:
          description: "Yaw angular speed, rad/s."
        type: float32

  highres_imu:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_usec:
        metadata:
          description: "Timestamp (UNIX Epoch or time since system boot), microseconds (uint64 as string)."
        type: string
      xacc:
        metadata: { description: "X acceleration, m/s^2." }
        type: float32
      yacc:
        metadata: { description: "Y acceleration, m/s^2." }
        type: float32
      zacc:
        metadata: { description: "Z acceleration, m/s^2." }
        type: float32
      xgyro:
        metadata: { description: "Angular speed around X axis, rad/s." }
        type: float32
      ygyro:
        metadata: { description: "Angular speed around Y axis, rad/s." }
        type: float32
      zgyro:
        metadata: { description: "Angular speed around Z axis, rad/s." }
        type: float32
      xmag:
        metadata: { description: "X magnetic field, gauss." }
        type: float32
      ymag:
        metadata: { description: "Y magnetic field, gauss." }
        type: float32
      zmag:
        metadata: { description: "Z magnetic field, gauss." }
        type: float32
      abs_pressure:
        metadata: { description: "Absolute pressure, hPa." }
        type: float32
      diff_pressure:
        metadata: { description: "Differential pressure, hPa." }
        type: float32
      pressure_alt:
        metadata: { description: "Altitude calculated from pressure, m." }
        type: float32
      temperature:
        metadata: { description: "Temperature, degC. 0 if temperature not provided." }
        type: float32
      fields_updated:
        metadata:
          description: "Bitmap indicating which IMU fields hold updated values — HIGHRES_IMU_UPDATED_FLAGS bitmask."
        type: uint16
      id:
        metadata:
          description: "IMU instance ID (extension field, defaults to 0)."
        type: uint8

  set_position_target_local_ned:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_boot_ms:
        metadata:
          description: "Timestamp since system boot, milliseconds."
        type: uint32
      target_system:
        metadata: { description: "MAVLink system ID of the target." }
        type: uint8
      target_component:
        metadata: { description: "MAVLink component ID of the target." }
        type: uint8
      coordinate_frame:
        metadata:
          description: "Coordinate frame — MAV_FRAME enum. 1=LOCAL_NED, 7=LOCAL_OFFSET_NED, 8=BODY_NED, 9=BODY_OFFSET_NED."
        type: uint8
      type_mask:
        metadata:
          description: "Bitmap to indicate which fields should be ignored by the vehicle (POSITION_TARGET_TYPEMASK_*)."
        type: uint16
      x:
        metadata: { description: "X position in NED frame, m." }
        type: float32
      y:
        metadata: { description: "Y position in NED frame, m." }
        type: float32
      z:
        metadata: { description: "Z position in NED frame, m (positive down)." }
        type: float32
      vx:
        metadata: { description: "X velocity in NED frame, m/s." }
        type: float32
      vy:
        metadata: { description: "Y velocity in NED frame, m/s." }
        type: float32
      vz:
        metadata: { description: "Z velocity in NED frame, m/s." }
        type: float32
      afx:
        metadata: { description: "X acceleration / force in NED frame, m/s^2." }
        type: float32
      afy:
        metadata: { description: "Y acceleration / force in NED frame, m/s^2." }
        type: float32
      afz:
        metadata: { description: "Z acceleration / force in NED frame, m/s^2." }
        type: float32
      yaw:
        metadata: { description: "Yaw setpoint, rad." }
        type: float32
      yaw_rate:
        metadata: { description: "Yaw rate setpoint, rad/s." }
        type: float32

  set_attitude_target:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_boot_ms:
        metadata:
          description: "Timestamp since system boot, milliseconds."
        type: uint32
      target_system:
        metadata: { description: "MAVLink system ID of the target." }
        type: uint8
      target_component:
        metadata: { description: "MAVLink component ID of the target." }
        type: uint8
      type_mask:
        metadata:
          description: "Bitmap to ignore one or more attitude fields (ATTITUDE_TARGET_TYPEMASK_*)."
        type: uint8
      q:
        metadata:
          description: "Attitude quaternion [w, x, y, z]. Exactly four elements; encoder validates length."
        elements:
          type: float32
      body_roll_rate:
        metadata: { description: "Body roll rate, rad/s." }
        type: float32
      body_pitch_rate:
        metadata: { description: "Body pitch rate, rad/s." }
        type: float32
      body_yaw_rate:
        metadata: { description: "Body yaw rate, rad/s." }
        type: float32
      thrust:
        metadata: { description: "Collective thrust, normalized to 0..1 (-1..1 for vehicles supporting reverse thrust)." }
        type: float32
      thrust_body:
        metadata:
          description: "3D thrust setpoint in body NED frame, normalized to -1..1. Exactly 3 elements [x, y, z]; MAVLink2 extension field that defaults to [0, 0, 0]."
        elements:
          type: float32

  timesync:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      tc1:
        metadata:
          description: "Time sync timestamp 1, ns (int64 as string). 0 from initiator; filled by responder."
        type: string
      ts1:
        metadata:
          description: "Time sync timestamp 2, ns (int64 as string). Time of request sender."
        type: string
      target_system:
        metadata:
          description: "Target system ID. Request: 0 (broadcast) or id of specific system. MAVLink2 extension field that defaults to 0."
        type: uint8
      target_component:
        metadata:
          description: "Target component ID. Request: 0 (broadcast) or id of specific component. MAVLink2 extension field that defaults to 0."
        type: uint8

  command_long:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      target_system:
        metadata: { description: "System ID of the command target." }
        type: uint8
      target_component:
        metadata: { description: "Component ID of the command target." }
        type: uint8
      command:
        metadata:
          description: "MAV_CMD command id (uint16). 400 = MAV_CMD_COMPONENT_ARM_DISARM. The encoder lifts this to a typed MavCmd; ids outside the common dialect are rejected on encode."
        type: uint16
      confirmation:
        metadata: { description: "0 for the first transmission of this command; incremented on retransmission." }
        type: uint8
      param1:
        metadata: { description: "Command parameter 1 (meaning depends on command; for ARM_DISARM, 1=arm / 0=disarm)." }
        type: float32
      param2:
        metadata: { description: "Command parameter 2." }
        type: float32
      param3:
        metadata: { description: "Command parameter 3." }
        type: float32
      param4:
        metadata: { description: "Command parameter 4." }
        type: float32
      param5:
        metadata: { description: "Command parameter 5." }
        type: float32
      param6:
        metadata: { description: "Command parameter 6." }
        type: float32
      param7:
        metadata: { description: "Command parameter 7." }
        type: float32

  encapsulated_data:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      seqnr:
        metadata: { description: "Data-chunk sequence number. The AGP sim streams race-status + track data in the payload (see VADR-TS-002)." }
        type: uint16
      data:
        metadata:
          description: "Raw chunk payload (up to 253 bytes). Application-defined; the AGP sim packs its race-status / track structs here for the consumer to parse."
        elements:
          type: uint8

  local_position_ned:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_boot_ms:
        metadata: { description: "Timestamp since system boot, milliseconds." }
        type: uint32
      x:
        metadata: { description: "X position in local NED frame, m." }
        type: float32
      y:
        metadata: { description: "Y position in local NED frame, m." }
        type: float32
      z:
        metadata: { description: "Z position in local NED frame, m (positive down)." }
        type: float32
      vx:
        metadata: { description: "X velocity in local NED (world) frame, m/s." }
        type: float32
      vy:
        metadata: { description: "Y velocity in local NED (world) frame, m/s." }
        type: float32
      vz:
        metadata: { description: "Z velocity in local NED (world) frame, m/s." }
        type: float32

  odometry:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_usec:
        metadata: { description: "Timestamp (UNIX Epoch or time since system boot), microseconds (uint64 as string)." }
        type: string
      x:
        metadata: { description: "X position, m. Frame given by frame_id." }
        type: float32
      y:
        metadata: { description: "Y position, m. Frame given by frame_id." }
        type: float32
      z:
        metadata: { description: "Z position, m. Frame given by frame_id." }
        type: float32
      q:
        metadata: { description: "Orientation quaternion [w, x, y, z] (1 0 0 0 is the null-rotation). Four elements." }
        elements:
          type: float32
      vx:
        metadata: { description: "X linear velocity, m/s. Frame given by child_frame_id (BODY_NED on the AGP sim)." }
        type: float32
      vy:
        metadata: { description: "Y linear velocity, m/s. Frame given by child_frame_id." }
        type: float32
      vz:
        metadata: { description: "Z linear velocity, m/s. Frame given by child_frame_id." }
        type: float32
      rollspeed:
        metadata: { description: "Roll angular speed, rad/s (body frame)." }
        type: float32
      pitchspeed:
        metadata: { description: "Pitch angular speed, rad/s (body frame)." }
        type: float32
      yawspeed:
        metadata: { description: "Yaw angular speed, rad/s (body frame)." }
        type: float32
      pose_covariance:
        metadata: { description: "Upper-right triangle of the 6x6 pose cross-covariance (x,y,z,roll,pitch,yaw), row-major; 21 elements. NaN in the first element if unknown." }
        elements:
          type: float32
      velocity_covariance:
        metadata: { description: "Upper-right triangle of the 6x6 velocity cross-covariance (vx,vy,vz,rollspeed,pitchspeed,yawspeed), row-major; 21 elements. NaN in the first element if unknown." }
        elements:
          type: float32
      frame_id:
        metadata: { description: "Coordinate frame of the pose data — MAV_FRAME enum (raw uint8). 1=LOCAL_NED." }
        type: uint8
      child_frame_id:
        metadata: { description: "Coordinate frame of the velocity (twist) data — MAV_FRAME enum (raw uint8). 8=BODY_NED." }
        type: uint8
      reset_counter:
        metadata: { description: "Estimate reset counter; incremented on any estimate reset/jump (SLAM loop-closure, sim teleport). Use to reject transient frames after a reset." }
        type: uint8
      estimator_type:
        metadata: { description: "Estimator providing the odometry — MAV_ESTIMATOR_TYPE enum (raw uint8). 2=VISION." }
        type: uint8
      quality:
        metadata: { description: "Optional odometry quality, percent. -1=failed, 0=unknown/unset, 1=worst, 100=best." }
        type: int8

  actuator_output_status:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      time_usec:
        metadata: { description: "Timestamp since system boot, microseconds (uint64 as string)." }
        type: string
      active:
        metadata: { description: "Bitmap of active output channels (1 bit per actuator)." }
        type: uint32
      actuator:
        metadata: { description: "Servo / motor output array values; 32 elements. Zero indicates an unused channel." }
        elements:
          type: float32

  collision:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      id:
        metadata: { description: "Unique collision identifier; domain depends on src. On the AGP sim 1001=gate, 1002=environment." }
        type: uint32
      time_to_minimum_delta:
        metadata: { description: "Estimated time until collision occurs, s." }
        type: float32
      altitude_minimum_delta:
        metadata: { description: "Closest vertical distance to the object, m." }
        type: float32
      horizontal_minimum_delta:
        metadata: { description: "Closest horizontal distance to the object, m (on the AGP sim this carries the impact impulse magnitude, kg*m/s)." }
        type: float32
      src:
        metadata: { description: "Collision data source — MAV_COLLISION_SRC enum (raw uint8)." }
        type: uint8
      action:
        metadata: { description: "Action taken to avoid the collision — MAV_COLLISION_ACTION enum (raw uint8)." }
        type: uint8
      threat_level:
        metadata: { description: "Threat level — MAV_COLLISION_THREAT_LEVEL enum (raw uint8). 1..2, higher is a harder impact." }
        type: uint8

  command_ack:
    properties:
      system_id:
        metadata: { description: "MAVLink system ID of the sender." }
        type: uint8
      component_id:
        metadata: { description: "MAVLink component ID of the sender." }
        type: uint8
      sequence:
        metadata: { description: "MAVLink sequence counter." }
        type: uint8
      peer_addr:
        metadata: { description: "Networking peer address (host:port). See heartbeat.peer_addr." }
        type: string
      timestamp_ns:
        metadata: { description: "Monotonic timestamp from source NetworkPacket recv (int64 as string)." }
        type: string
      command:
        metadata: { description: "MAV_CMD id being acknowledged (uint16). 400=COMPONENT_ARM_DISARM." }
        type: uint16
      result:
        metadata: { description: "Result of the command — MAV_RESULT enum (raw uint8). 0=ACCEPTED, 4=FAILED." }
        type: uint8
      progress:
        metadata: { description: "Progress percent when result is IN_PROGRESS [0-100], or 255 if unknown." }
        type: uint8
      result_param2:
        metadata: { description: "Additional command-specific result information (signed)." }
        type: int32
      target_system:
        metadata: { description: "System ID of the recipient (the system that sent the acknowledged command)." }
        type: uint8
      target_component:
        metadata: { description: "Component ID of the recipient." }
        type: uint8
