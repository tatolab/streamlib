[package]
name = "streamlib-mavlink"
version = "0.4.30"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "MAVLink2 encoder + decoder processors for streamlib — wraps rust-mavlink (common dialect). Pairs with @tatolab/network for MAVLink-over-UDP."
keywords = ["mavlink", "drone", "telemetry", "streamlib"]
categories = ["aerospace::drones", "encoding", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_mavlink"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.4.35-dev.10", registry = "gitea"}

[dependencies]
# Engine substrate — runtime context, processor traits, generated wire
# types under `crate::_generated_::*` (NetworkPacket imported from
# @tatolab/network; MavlinkMessage + Config types defined locally).
streamlib-plugin-sdk = {version = "0.4.35-dev.10", registry = "gitea"}

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.4.35-dev.10", registry = "gitea"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.4.35-dev.10", registry = "gitea"}

# Serialization (config dataclasses ship as serde-derived).
# Generated `NetworkPacket.payload` rides msgpack `bin` (1× wire) instead of array.
serde = {version = "1.0", features = ["derive"]}

# MAVLink wire format + typed messages. Default features off so the
# bundled MavConnection transports (`transport-udp`, `transport-tcp`,
# `transport-direct-serial`) are not pulled in — @tatolab/network owns
# the socket; our processors only need the parser / writer primitives.
mavlink = { version = "0.18", default-features = false, features = [
    "std",
    "dialect-common",
    "mav2-message-extensions",
] }

# num-traits — rust-mavlink's generated enums derive FromPrimitive /
# ToPrimitive; the encoder uses FromPrimitive::from_u8 to lift raw u8
# values back into MavType / MavAutopilot / MavState / MavFrame.
num-traits = { version = "0.2", default-features = false }

# Logging.
serde_bytes = {version = "0.11"}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
