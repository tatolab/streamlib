# @tatolab/mavlink — MAVLink2 encoder + decoder processors via the
# rust-mavlink crate. Wraps `mavlink::common` (the common dialect) for
# the core navigation / telemetry / control message set. Pairs with
# @tatolab/network for MAVLink-over-UDP: the decoder accepts inbound
# NetworkPacket payloads and emits typed MavlinkMessage; the encoder
# accepts typed MavlinkMessage and emits outbound NetworkPacket.
# Extensible to the broader MAVLink2 set by adding entries to the
# `mavlink_message.yaml` discriminator mapping — the processor surface
# stays unchanged.
package:
  org: tatolab
  name: mavlink
  version: 1.0.0
  description: "MAVLink2 encoder + decoder processors via rust-mavlink — pairs with @tatolab/network for MAVLink-over-UDP"

dependencies:
  "@tatolab/network": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/network":
    path: ../network

schemas:
  # Wire type imported from @tatolab/network — used as decoder input
  # (inbound UDP datagram → typed MAVLink message) and encoder output
  # (typed MAVLink message → outbound UDP datagram).
  NetworkPacket:
    package: "@tatolab/network"
  # Local schemas this package owns.
  MavlinkMessage:
    file: schemas/mavlink_message.yaml
  MavlinkDecoderConfig:
    file: schemas/mavlink_decoder_config.yaml
  MavlinkEncoderConfig:
    file: schemas/mavlink_encoder_config.yaml

processors:
  - name: MavlinkDecoder
    version: 1.0.0
    description: "Parses MAVLink2-framed bytes (NetworkPacket payload) into typed MavlinkMessage variants. Propagates peer_addr + timestamp_ns."
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: MavlinkDecoderConfig
    inputs:
      - name: bytes_in
        schema: NetworkPacket
        description: Inbound UDP datagrams carrying MAVLink2 frames
        read_mode: read_next_in_order
        buffer_size: 64
    outputs:
      - name: messages_out
        schema: MavlinkMessage
        description: Decoded MAVLink2 messages — one per parsed frame

  - name: MavlinkEncoder
    version: 1.0.0
    description: "Serializes typed MavlinkMessage into MAVLink2-framed bytes (NetworkPacket payload). Auto-increments sequence per (system_id, component_id)."
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: MavlinkEncoderConfig
    inputs:
      - name: messages_in
        schema: MavlinkMessage
        description: Typed MAVLink2 messages to serialize
        read_mode: read_next_in_order
        buffer_size: 64
    outputs:
      - name: bytes_out
        schema: NetworkPacket
        description: Outbound UDP datagrams carrying MAVLink2 frames; peer_addr passed through from the input message
