[package]
name = "streamlib-display"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Display processor — renders video frames to a window via the engine's host RHI presentation primitive. Linux first; macOS port is in the package but disabled (rewrite on top of a Metal present target tracked separately)."
keywords = ["display", "vulkan", "swapchain", "video", "rendering"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_display"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.6.0", registry = "tatolab"}

[dependencies]
# Engine substrate — runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__display::*`, VideoFrame
# wire type, host RHI types (HostVulkanDevice, VulkanGraphicsKernel,
# VulkanPresentTarget, RhiCommandRecorder, OffscreenColorTarget,
# TextureFormat).
streamlib = {version = "0.6.0", registry = "tatolab"}

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.6.0", registry = "tatolab"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.6.0", registry = "tatolab"}

tracing = {version = "0.1.41", features = ["release_max_level_debug"]}
serde = {version = "1.0", features = ["derive"]}

[target.'cfg(target_os = "linux")'.dependencies]
# Window creation + event loop for the Linux display processor.
winit = "0.30"
# Raw window-handle traits — `VulkanPresentTarget::new` takes
# `&(impl HasWindowHandle + HasDisplayHandle)`; the winit `Window` type
# implements both.
raw-window-handle = "0.6"
# Consumer-side RHI carve-out — typed `VulkanLayout` enum used in
# producer/consumer surface-share interop. Camera uses the same dep
# for the same reason.
streamlib-consumer-rhi = {version = "0.6.0", registry = "tatolab"}

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# Apple module is ported into this package but DISABLED in `lib.rs` —
# the Metal-side rewrite onto a Metal-equivalent present target is
# tracked as a separate follow-up. Listed here so the apple/ source
# tree is greppable / discoverable; nothing depends on these symbols
# being reachable yet.


[workspace]
