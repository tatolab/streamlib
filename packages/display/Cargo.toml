[package]
name = "streamlib-display"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Display processor — renders video frames to a window via the engine's host RHI presentation primitive. Linux first; macOS port is in the package but disabled (rewrite on top of a Metal present target tracked separately)."
keywords = ["display", "vulkan", "swapchain", "video", "rendering"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_display"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.19"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — capability-typed
# runtime/GPU context views, generated config types under
# `crate::_generated_::tatolab__display::*`, the `VideoFrame` wire type, and the
# cdylib-safe RHI PluginAbiObjects (`PresentTarget`, `VulkanGraphicsKernel`,
# `RhiCommandRecorder`, `TextureReadback`, `TextureFormat`, `VulkanLayout`). GPU
# resource creation goes through `GpuContextLimitedAccess::escalate` +
# `create_present_target` / `create_graphics_kernel` / `create_texture_readback`,
# never the raw host device.
streamlib-plugin-sdk = {version = "0.7.19"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.19"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.19"}

tracing = {version = "0.1.41", features = ["release_max_level_debug"]}
serde = {version = "1.0", features = ["derive"]}

[target.'cfg(target_os = "linux")'.dependencies]
# Window creation + event loop for the Linux display processor (a
# host-portable platform detail, not baked into the plugin ABI).
winit = "0.30"
# Raw window-handle traits — the winit `Window` implements
# `HasWindowHandle` + `HasDisplayHandle`; the processor projects those into
# the plugin ABI's flattened `RawWindowHandleRepr` fed to
# `create_present_target`.
raw-window-handle = "0.6"

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# Apple module is ported into this package but DISABLED in `lib.rs` —
# the Metal-side rewrite onto a Metal-equivalent present target is
# tracked as a separate follow-up. Listed here so the apple/ source
# tree is greppable / discoverable; nothing depends on these symbols
# being reachable yet.


[workspace]
