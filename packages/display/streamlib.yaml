# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: display
  version: 1.0.0
  description: Display processor — renders video frames to a window via the engine's host RHI presentation primitive
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  ColorInfo:
    package: '@tatolab/core'
  ContentLight:
    package: '@tatolab/core'
  DisplayConfig:
    file: schemas/display_config.yaml
  MasteringDisplay:
    package: '@tatolab/core'
  VideoFrame:
    package: '@tatolab/core'
processors:
- name: Display
  description: Displays video frames in a window with vsync
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling:
    priority: high
  config:
    name: config
    schema: DisplayConfig
  state: []
  inputs:
  - name: video
    schema: VideoFrame
    description: Video frames to display in the window
    delivery_profile: null
  outputs: []
