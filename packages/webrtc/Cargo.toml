[package]
name = "streamlib-webrtc"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "WebRTC WHIP/WHEP transport processors for streamlib — carved out of the streamlib engine substrate."
keywords = ["webrtc", "whip", "whep", "streaming", "streamlib"]
categories = ["multimedia::video", "multimedia"]

[lib]
name = "streamlib_webrtc"
crate-type = ["rlib", "cdylib"]

[dependencies]
streamlib = { path = "../../libs/streamlib-sdk" }
streamlib-macros = { path = "../../libs/streamlib-macros" }

serde.workspace = true
tracing.workspace = true

# WebRTC stack — full-featured implementation used by both WHIP and WHEP
# client/session code. Pinned to match what the engine carried previously
# so the runtime behavior is identical post-carve-out.
webrtc = "0.14.0"
bytes = "1.5"
fastrand = "2.0"
local-ip-address = "0.6"

tokio = { workspace = true, features = ["rt-multi-thread", "sync", "macros"] }

# HTTP client for WHIP/WHEP signaling (RFC 9725 / IETF WHEP).
hyper = { workspace = true }
hyper-rustls = { version = "0.27", features = ["http2", "native-tokio", "ring"] }
hyper-util = { version = "0.1", features = ["client", "client-legacy", "http1", "http2", "tokio"] }
http-body-util = "0.1"
rustls = { version = "0.23", features = ["ring"] }

[lints]
workspace = true
