# @tatolab/webrtc — WebRTC WHIP (ingress) and WHEP (egress) transport
# processors carved out of the streamlib engine substrate. Transport-only:
# accepts and produces EncodedVideoFrame / EncodedAudioFrame (from
# @tatolab/core); codec choice is composed by the consumer pipeline.
package:
  org: tatolab
  name: webrtc
  version: 1.0.0
  description: "WebRTC WHIP/WHEP transport processors (RFC 9725 + IETF WHEP)"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  # Wire types imported from @tatolab/core.
  EncodedAudioFrame:
    package: "@tatolab/core"
  EncodedVideoFrame:
    package: "@tatolab/core"
  # Local config schemas this package owns.
  WebrtcWhepConfig:
    file: schemas/webrtc_whep_config.yaml
  WebrtcWhipConfig:
    file: schemas/webrtc_whip_config.yaml

processors:
  - name: WebrtcWhep
    version: 1.0.0
    description: "Receives encoded video and audio from a WHEP endpoint (WebRTC egress)"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: WebrtcWhepConfig
    outputs:
      - name: encoded_video_out
        schema: EncodedVideoFrame
        description: H.264 encoded video frames from WHEP stream
      - name: encoded_audio_out
        schema: EncodedAudioFrame
        description: Opus encoded audio frames from WHEP stream

  - name: WebrtcWhip
    version: 1.0.0
    description: "Streams pre-encoded video and audio to a WHIP endpoint (WebRTC ingress)"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: WebrtcWhipConfig
    inputs:
      - name: encoded_video_in
        schema: EncodedVideoFrame
        description: H.264 encoded video frames to stream
        read_mode: read_next_in_order
        buffer_size: 16
      - name: encoded_audio_in
        schema: EncodedAudioFrame
        description: Opus encoded audio frames to stream
        read_mode: skip_to_latest
        buffer_size: 8
