package:
  org: tatolab
  name: jpeg
  version: 1.0.1
  description: JPEG decoder processor via the GPU SimpleJpegDecoder primitive
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  ColorInfo:
    package: '@tatolab/core'
  ContentLight:
    package: '@tatolab/core'
  EncodedJpegFrame:
    file: schemas/encoded_jpeg_frame.yaml
  JpegDecoderConfig:
    file: schemas/jpeg_decoder_config.yaml
  MasteringDisplay:
    package: '@tatolab/core'
  VideoFrame:
    package: '@tatolab/core'
processors:
- name: JpegDecoder
  version: 1.0.0
  description: Decodes EncodedJpegFrame to VideoFrame via the GPU SimpleJpegDecoder primitive
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: high
  config:
    name: config
    schema: JpegDecoderConfig
  state: []
  inputs:
  - name: encoded_jpeg_in
    schema: EncodedJpegFrame
    description: JPEG-encoded frames to decode
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 16
  outputs:
  - name: video_out
    schema: VideoFrame
    description: Decoded video frames
    read_mode: null
    overflow: null
    buffer_size: null
