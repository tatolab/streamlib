#
# JSON Type Definition (RFC 8927) schema for encoded JPEG frames.
#
# Mirrors EncodedVideoFrame's shape minus codec-specific fields: JPEG
# is self-contained per-frame (no keyframe/predicted-frame distinction,
# no inter-frame state) and carries its own colorimetry in-band via
# EXIF / ICC / Adobe APP14 segments — so no `is_keyframe` and no
# `color_info` / mastering / content-light fields out here. The
# decoder surfaces the parsed colorimetry on its output VideoFrame.

metadata:
  type: EncodedJpegFrame
  description: "JPEG-encoded image bytes (one self-contained frame per message)"
  read_mode: read_next_in_order
  max_queued_messages: 16
  # Slot-priming HINT, never a cap: the publisher grows its PowerOfTwo segment
  # on the first oversized loan, so a high-quality 4K JPEG (Q=100 ≈ 4–8 MiB)
  # delivers via one growth event rather than crashing. 1 MiB covers the common
  # 720p/1080p drone stream (30 Hz) without a first-frame regrow.
  expected_payload_bytes: 1048576

properties:
  data:
    metadata:
      description: "Raw JPEG bytes (SOI through EOI, one full image)"
    elements:
      type: uint8
  timestamp_ns:
    metadata:
      description: "Monotonic timestamp in nanoseconds (int64 as string)"
    type: string
  frame_number:
    metadata:
      description: "Sequential frame number (uint64 as string)"
    type: string

optionalProperties:
  fps:
    metadata:
      description: "Source frame rate in frames per second (pass-through from capture / depayloader, when known)"
    type: uint32
