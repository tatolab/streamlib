[package]
name = "streamlib-mp4"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "MP4 file writer processors for streamlib."
keywords = ["mp4", "video", "writer", "ffmpeg", "streamlib"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_mp4"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.10"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — runtime context
# views, processor traits, generated wire types. Depending on the plugin SDK
# by its real name keeps this cdylib from statically linking a second engine.
streamlib-plugin-sdk = {version = "0.7.10"}
streamlib-macros = {version = "0.7.10"}
streamlib-plugin-abi = {version = "0.7.10"}

serde = {version = "1.0", features = ["derive"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
