[package]
name = "streamlib-mp4"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "MP4 file writer processors for streamlib."
keywords = ["mp4", "video", "writer", "ffmpeg", "streamlib"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_mp4"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.6.0"}

[dependencies]
streamlib = {version = "0.6.0"}
streamlib-macros = {version = "0.6.0"}
streamlib-plugin-abi = {version = "0.6.0"}

serde = {version = "1.0", features = ["derive"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
