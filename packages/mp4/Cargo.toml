[package]
name = "streamlib-mp4"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "MP4 file writer processors for streamlib."
keywords = ["mp4", "video", "writer", "ffmpeg", "streamlib"]
categories = ["multimedia::video", "multimedia"]

[lib]
name = "streamlib_mp4"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = { path = "../../libs/streamlib-jtd-codegen" }

[dependencies]
streamlib = { path = "../../libs/streamlib-sdk" }
streamlib-macros = { path = "../../libs/streamlib-macros" }
streamlib-plugin-abi = { path = "../../libs/streamlib-plugin-abi" }

serde.workspace = true
tracing.workspace = true

[lints]
workspace = true
