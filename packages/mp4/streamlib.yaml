package:
  org: tatolab
  name: mp4
  version: 1.0.0
  description: MP4 file writer processors
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  ColorInfo:
    package: '@tatolab/core'
  ContentLight:
    package: '@tatolab/core'
  LinuxMp4WriterConfig:
    file: schemas/linux_mp4_writer_config.yaml
  MasteringDisplay:
    package: '@tatolab/core'
  VideoFrame:
    package: '@tatolab/core'
processors:
- name: LinuxMp4Writer
  version: 1.0.0
  description: Writes video frames to MP4 via ffmpeg encode + mux with silent audio track
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling: null
  config:
    name: config
    schema: LinuxMp4WriterConfig
  state: []
  inputs:
  - name: video_in
    schema: VideoFrame
    description: Decoded video frames (raw pixels) to encode and write
    read_mode: read_next_in_order
    overflow: block
    buffer_size: 32
  outputs: []
