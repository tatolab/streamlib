package:
  org: tatolab
  name: mp4
  version: 1.0.0
  description: "MP4 file writer processors"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
  LinuxMp4WriterConfig:
    file: schemas/linux_mp4_writer_config.yaml

processors:
  - name: LinuxMp4Writer
    version: 1.0.0
    description: "Writes video frames to MP4 via ffmpeg encode + mux with silent audio track"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: LinuxMp4WriterConfig
    inputs:
      - name: video_in
        schema: VideoFrame
        description: Decoded video frames (raw pixels) to encode and write
        # MP4 muxers need every frame in order — a silently dropped
        # frame becomes a gap in the encoded file that no playback can
        # recover. `read_next_in_order` + `overflow: block` makes the
        # contract explicit: consumer reads FIFO, and when the
        # subscriber buffer fills (slow disk / encode hiccup), the
        # producer blocks until the writer catches up. `buffer_size`
        # absorbs short hiccups before back-pressure fires upstream.
        read_mode: read_next_in_order
        overflow: block
        buffer_size: 32
