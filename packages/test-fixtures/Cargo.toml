[package]
name = "streamlib-test-fixtures"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
# Never published — test fixture. Also keeps this crate out of the release
# closure (`compute_release_closure` requires a publishable crate).
publish = false
description = "Attribute-macro test fixtures (TestConfiguredProcessor) for streamlib SDK macro contract tests."
keywords = ["streamlib", "test-fixtures", "macros"]
categories = ["development-tools::testing"]

[lib]
name = "streamlib_test_fixtures"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = { path = "../../libs/streamlib-jtd-codegen", version = "0.5.0", registry = "gitea" }

[dependencies]
# Engine substrate — runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__test_fixtures::*`.
streamlib = { path = "../../libs/streamlib-sdk", version = "0.5.0", registry = "gitea" }

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = { path = "../../libs/streamlib-macros", version = "0.5.0", registry = "gitea" }

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = { path = "../../libs/streamlib-plugin-abi", version = "0.5.0", registry = "gitea" }

# Serialization (config dataclass ships as serde-derived).
serde.workspace = true

# `TcpBindTestProcessor` uses the plugin's own tokio runtime to verify
# the dlopen-owns-tokio claim from #885 — the cdylib statically links
# its own tokio crate so `tokio::net::*` has working TLS slots inside
# the plugin's runtime even when the host has its own separate tokio.
tokio = { workspace = true, features = ["rt", "net", "macros"] }

# Surface adapters exercised by the dlopen smoke fixtures. Each fixture
# constructs the host-flavor adapter from inside a cdylib's
# `gpu.escalate(...)` closure to validate the cdylib-side
# adapter-construction chain (the v9 `host_vulkan_device_arc` bridge
# and the v10 `host_vulkan_texture_arc` bridge plus the existing
# `acquire_render_target_dma_buf_image` slot).
[target.'cfg(target_os = "linux")'.dependencies]
streamlib-adapter-abi = { path = "../../libs/streamlib-adapter-abi", version = "0.5.0", registry = "gitea" }
streamlib-adapter-cpu-readback = { path = "../../libs/streamlib-adapter-cpu-readback", version = "0.5.0", registry = "gitea" }
streamlib-adapter-cuda = { path = "../../libs/streamlib-adapter-cuda", version = "0.5.0", registry = "gitea" }
streamlib-adapter-opengl = { path = "../../libs/streamlib-adapter-opengl", version = "0.5.0", registry = "gitea" }
streamlib-adapter-vulkan = { path = "../../libs/streamlib-adapter-vulkan", version = "0.5.0", registry = "gitea" }

[lints]
workspace = true
