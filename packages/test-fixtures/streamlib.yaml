# @tatolab/test-fixtures — test/example fixture processors for streamlib.
#
# - `BgraFileSource` streams raw BGRA frames from disk as `VideoFrame`s —
#   used by `e2e_fixture_psnr.sh`, the polyglot examples that need a
#   deterministic input, and the fixture-PSNR rig.
# - `SimplePassthrough` is a one-port-in, one-port-out processor used by
#   runtime tests exercising graph plumbing and by `api-server-demo` to
#   exercise the dynamic processor registry.
# - `TestConfiguredProcessor` exists only to verify the
#   `#[streamlib::sdk::processor("...")]` attribute macro emits the right
#   schema/processor declarations.
package:
  org: tatolab
  name: test-fixtures
  version: 1.0.0
  description: "Test and example fixture processors for streamlib"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  # Wire types imported from @tatolab/core.
  VideoFrame:
    package: "@tatolab/core"
  # Local config schemas this package owns.
  BgraFileSourceConfig:
    file: schemas/bgra_file_source_config.yaml
  SimplePassthroughConfig:
    file: schemas/simple_passthrough_config.yaml
  TestConfiguredProcessorConfig:
    file: schemas/test_configured_processor_config.yaml

processors:
  - name: SimplePassthrough
    version: 1.0.0
    description: "Passes video frames through unchanged (for testing)"
    execution: manual
    config:
      name: config
      schema: SimplePassthroughConfig
    inputs:
      - name: input
        schema: VideoFrame
        description: Video frame input
        read_mode: skip_to_latest
        buffer_size: 4
    outputs:
      - name: output
        schema: VideoFrame
        description: Video frame output (unchanged)

  - name: BgraFileSource
    version: 1.0.0
    description: "Streams raw BGRA frames from a file as Videoframes"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: BgraFileSourceConfig
    outputs:
      - name: video
        schema: VideoFrame
        description: Video frames read from the BGRA file

  - name: TestConfiguredProcessor
    version: 1.0.0
    description: "Test processor with config for attribute macro tests"
    execution: continuous
    config:
      name: config
      schema: TestConfiguredProcessorConfig
