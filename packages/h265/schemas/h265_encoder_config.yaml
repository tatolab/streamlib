# JSON Type Definition (RFC 8927) schema for H.265 Encoder config.

metadata:
  type: H265EncoderConfig
  description: "Configuration for H.265 video encoding."

optionalProperties:
  width:
    metadata:
      description: "Optional override / guardrail for video width in pixels. Unset = the encoder takes the width from the first VideoFrame it receives. Set values that disagree with the frame width log a warning and the frame still wins, matching the FPS pattern."
    type: uint32
  height:
    metadata:
      description: "Optional override / guardrail for video height in pixels. Unset = the encoder takes the height from the first VideoFrame it receives. Set values that disagree with the frame height log a warning and the frame still wins, matching the FPS pattern."
    type: uint32
  bitrate_bps:
    metadata:
      description: "Target bitrate in bits per second (default: 2000000)."
    type: uint32
  keyframe_interval:
    metadata:
      description: "Frames between keyframes (overrides keyframe_interval_seconds if set)."
    type: uint32
  fps:
    metadata:
      description: "Frames per second for encoder timing (default: 60)."
    type: uint32
  keyframe_interval_seconds:
    metadata:
      description: "Seconds between keyframes (default: 2.0). Converted to frames using the encoder's fps. Ignored if keyframe_interval (frames) is set."
    type: float32
  effort_level:
    metadata:
      description: "Vulkan API encoder-effort index (VkVideoEncodeQualityLevelInfoKHR::quality_level). Higher = more GPU work per frame (mode decision, RD-opt, motion search). NOT an H.265 quality knob — profile, tier, level_idc, QP, and rate-control are configured elsewhere. Valid values are 0..VkVideoEncodeCapabilitiesKHR::maxQualityLevels; the session clamps as a safety floor. Unset = codec default."
    type: uint32
