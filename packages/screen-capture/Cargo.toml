[package]
name = "streamlib-screen-capture"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Screen capture processor for streamlib (macOS / iOS via ScreenCaptureKit)."
keywords = ["screen-capture", "screen-recording", "screencast", "video", "streaming"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_screen_capture"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.43"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — runtime context
# views, processor traits, generated wire types under `crate::_generated_::*`
# (VideoFrame), RHI primitives. Depending on the plugin SDK by its real name
# keeps this cdylib from statically linking a second engine.
streamlib-plugin-sdk = {version = "0.7.43"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.43"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.43"}

# Serialization (config dataclasses ship as serde-derived).

# Logging.
serde = {version = "1.0", features = ["derive"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

# The Apple ScreenCaptureKit processor lives parked under
# `src/_apple_impl_pending_/` behind a never-compile `#[cfg(any())]` gate: it
# names an engine-free Apple RHI / surface-pool surface the plugin SDK does not
# expose yet (`sdk::rhi` is `cfg(linux)`-only). Its Objective-C interop deps
# (objc2-screen-capture-kit / objc2-core-media / objc2 / objc2-core-video /
# block2 / dispatch2 / parking_lot / objc2-foundation) are re-added here
# alongside unparking the module once that surface ships.

[workspace]
