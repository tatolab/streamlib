[package]
name = "streamlib-screen-capture"
version = "0.4.30"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Screen capture processor for streamlib (macOS / iOS via ScreenCaptureKit)."
keywords = ["screen-capture", "screen-recording", "screencast", "video", "streaming"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_screen_capture"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.5.0", registry = "gitea"}

[dependencies]
# Engine substrate — runtime context, processor traits, generated wire
# types under `crate::_generated_::*` (VideoFrame), RHI primitives.
streamlib = {version = "0.5.0", registry = "gitea"}

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.5.0", registry = "gitea"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.5.0", registry = "gitea"}

# Serialization (config dataclasses ship as serde-derived).

# Logging.
serde = {version = "1.0", features = ["derive"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# Objective-C interop and Apple framework bindings for ScreenCaptureKit.
objc2-screen-capture-kit = "0.3.2"
objc2-core-media = "0.3"
objc2 = {version = "0.6.3"}
objc2-core-video = {version = "0.3.2"}
block2 = "0.6"
# GCD wrapper for dispatching ScreenCaptureKit init to the main thread.
dispatch2 = "0.3"
# Lock for async init state shared between the GCD callback and the
# processor thread.
parking_lot = "0.12"
objc2-foundation = {version = "0.3.2"}


[workspace]
