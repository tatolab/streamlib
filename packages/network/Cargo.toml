# Standalone, registry-only package manifest. This package is published
# independently to the Gitea registry and resolves every dependency by
# version from it — no workspace inheritance, no `path` deps. The empty
# `[workspace]` table makes it its own workspace root so it builds off-tree
# (e.g. inside the package cache during `pkg install`) without being mistaken
# for a stray member of an enclosing workspace.
[package]
name = "streamlib-network"
version = "0.4.30"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
license = "BUSL-1.1"
repository = "https://github.com/tato123/streamlib"
description = "Generic UDP source/sink processors for streamlib — byte-level transport. Framing/protocol concerns belong in consumer packages (MAVLink, RTP, etc.)."
keywords = ["udp", "network", "transport", "streamlib"]
categories = ["network-programming", "multimedia"]

[lib]
name = "streamlib_network"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = { version = "0.4.36", registry = "gitea" }

[dependencies]
streamlib-plugin-sdk = { version = "0.4.36", registry = "gitea" }
streamlib-macros = { version = "0.4.36", registry = "gitea" }
streamlib-plugin-abi = { version = "0.4.36", registry = "gitea" }
serde = { version = "1.0", features = ["derive"] }
serde_bytes = "0.11"
tokio = { version = "1.48.0", features = ["full"] }
socket2 = "0.5"
libc = "0.2.177"
tracing = { version = "0.1.41", features = ["release_max_level_debug"] }

[workspace]
