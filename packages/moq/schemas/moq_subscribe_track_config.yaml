# JSON Type Definition (RFC 8927) schema for MoQ Subscribe Track config

metadata:
  type: MoqSubscribeTrackConfig
  description: "Configuration for subscribing to a single track from a MoQ relay"

properties:
  track_name:
    metadata:
      description: "Track name to subscribe to"
    type: string
