# JSON Type Definition (RFC 8927) schema for MoQ Publish Track config

metadata:
  type: MoqPublishTrackConfig
  description: "Configuration for publishing a single track to a MoQ relay"

optionalProperties:
  track_name:
    metadata:
      description: "Track name (auto-generated from processor ID if not set)"
    type: string
