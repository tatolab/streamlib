[package]
name = "streamlib-moq-processors"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "MoQ (Media over QUIC) publish/subscribe track processors for streamlib — the @tatolab/moq package, built on the streamlib-moq transport library."
keywords = ["moq", "media-over-quic", "streaming", "streamlib", "webtransport"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_moq_processors"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.16"}

[dependencies]
# Transport library half of @tatolab/moq (publish/subscribe sessions + catalog).
streamlib-moq = {version = "0.7.16"}
streamlib-plugin-sdk = {version = "0.7.16"}
streamlib-macros = {version = "0.7.16"}
streamlib-plugin-abi = {version = "0.7.16"}

# Generated `EncodedVideoFrame.data` rides msgpack `bin` instead of array.
serde = {version = "1.0", features = ["derive"]}
serde_bytes = {version = "0.11"}
serde_json = {version = "1.0", features = ["preserve_order"]}
parking_lot = "0.12"
bytes = "1.5"
rmp-serde = "1.3"
tokio = {version = "1.48.0", features = ["full", "rt-multi-thread", "sync", "macros", "time"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
