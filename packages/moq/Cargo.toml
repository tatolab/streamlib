[package]
name = "streamlib-moq"
version = "0.4.30"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "MoQ (Media over QUIC) publish/subscribe track processors for streamlib."
keywords = ["moq", "media-over-quic", "streaming", "streamlib", "webtransport"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_moq"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.4.30", registry = "gitea"}

[dependencies]
streamlib = {version = "0.4.30", registry = "gitea"}
streamlib-macros = {version = "0.4.30", registry = "gitea"}
streamlib-plugin-abi = {version = "0.4.30", registry = "gitea"}

# Generated `EncodedVideoFrame.data` rides msgpack `bin` instead of array.
serde = {version = "1.0", features = ["derive"]}
serde_bytes = {version = "0.11"}
serde_json = {version = "1.0", features = ["preserve_order"]}
parking_lot = "0.12"
bytes = "1.5"
rmp-serde = "1.3"
tokio = {version = "1.48.0", features = ["full", "rt-multi-thread", "sync", "macros", "time"]}

moq-transport = {version = "0.14.1"}
web-transport = {version = "0.10"}
quinn = {version = "0.11"}
url = "2"
rustls = { version = "0.23", features = ["ring"] }
rustls-native-certs = {version = "0.8"}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
