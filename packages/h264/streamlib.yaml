# @tatolab/h264 — H.264 encoder + decoder carved out of the streamlib
# engine substrate. Owns the encoder/decoder config schemas and the two
# processor declarations. Linux-only today (Vulkan Video extensions);
# macOS VideoToolbox is a future cross-platform addition.
package:
  org: tatolab
  name: h264
  version: 1.0.0
  description: "H.264 encoder + decoder processors via Vulkan Video"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  # Wire types imported from @tatolab/core.
  ColorInfo:
    package: "@tatolab/core"
  ContentLight:
    package: "@tatolab/core"
  EncodedVideoFrame:
    package: "@tatolab/core"
  MasteringDisplay:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
  # Local config schemas this package owns.
  H264DecoderConfig:
    file: schemas/h264_decoder_config.yaml
  H264EncoderConfig:
    file: schemas/h264_encoder_config.yaml

processors:
  - name: H264Encoder
    version: 1.0.0
    description: "Encodes VideoFrame to EncodedVideoFrame (H.264) via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: H264EncoderConfig
    inputs:
      - name: video_in
        schema: VideoFrame
        description: Raw video frames to encode
        read_mode: read_next_in_order
        buffer_size: 8
    outputs:
      - name: encoded_video_out
        schema: EncodedVideoFrame
        description: H.264 encoded video frames

  - name: H264Decoder
    version: 1.0.0
    description: "Decodes EncodedVideoFrame (H.264) to VideoFrame via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: H264DecoderConfig
    inputs:
      - name: encoded_video_in
        schema: EncodedVideoFrame
        description: H.264 encoded video frames to decode
        read_mode: read_next_in_order
        buffer_size: 16
    outputs:
      - name: video_out
        schema: VideoFrame
        description: Decoded video frames
