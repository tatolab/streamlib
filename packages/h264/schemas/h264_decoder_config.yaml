# JSON Type Definition (RFC 8927) schema for H.264 Decoder config.

metadata:
  type: H264DecoderConfig
  description: "Configuration for H.264 video decoding."

# Empty struct body — JTD requires *some* shape declaration; without it, the
# schema is interpreted as "any value" and codegen emits a `pub type X =
# Option<Value>` alias instead of an empty struct. The decoder takes no
# user-tunable knobs today, so the empty `optionalProperties` block is the
# faithful representation.
optionalProperties: {}
