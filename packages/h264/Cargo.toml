[package]
name = "streamlib-h264"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "H.264 encoder + decoder via Vulkan Video — carved out of the streamlib engine. Linux-only today; macOS VideoToolbox is a future addition."
keywords = ["h264", "video", "encoder", "decoder", "vulkan-video"]
categories = ["multimedia::video", "multimedia"]

[lib]
name = "streamlib_h264"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = { path = "../../libs/streamlib-jtd-codegen" }

[dependencies]
# Engine substrate — runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__h264::*`, EncodedVideoFrame /
# VideoFrame wire types, host RHI bridge for queue handles + allocator.
streamlib = { path = "../../libs/streamlib-sdk" }

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = { path = "../../libs/streamlib-macros" }

# Serialization (config dataclasses ship as serde-derived).
serde.workspace = true
# Generated `EncodedVideoFrame.data` carries `#[serde(with = "serde_bytes")]`
# so msgpack encoder/decoder I/O writes `bin` (1× wire) instead of array.
serde_bytes.workspace = true

# Logging.
tracing.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
# Vulkan Video encoder/decoder primitives — H.264/H.265 via the
# VK_KHR_video_{encode,decode}_h264 extensions. The crate exposes the
# `RhiQueueSubmitter` trait the host's `HostVulkanDevice` implements,
# so the encoder/decoder use the engine's queue mutex + allocator.
vulkan-video = { path = "../../libs/vulkan-video" }

[lints]
workspace = true
