# JSON Type Definition (RFC 8927) schema for ApiServer config

metadata:
  type: ApiServerConfig
  description: "Configuration for the runtime API server"

properties:
  host:
    metadata:
      description: "Host address to bind to"
    type: string
  port:
    metadata:
      description: "Port number to listen on"
    type: uint16
optionalProperties:
  name:
    metadata:
      description: "Runtime name for surface-share registration (auto-generated if not provided)"
    type: string
  log_path:
    metadata:
      description: "Log file path for surface-share registration"
    type: string
  allow_remote_bind:
    metadata:
      description: "Permit binding a non-loopback host. Absent / false restricts the listener to loopback (127.0.0.1 / ::1 / localhost); a remote bind exposes the graph-mutation control plane and must be opted into explicitly."
    type: boolean
