# @tatolab/api-server — HTTP control-plane processor for streamlib
# runtimes. Exposes graph mutation, registry browsing, schema catalog,
# WebSocket event streaming, and an auto-generated OpenAPI spec. Pure
# cross-platform Rust.
package:
  org: tatolab
  name: api-server
  version: 1.0.0
  description: "HTTP control-plane processor for streamlib runtimes"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  # Local config schemas this package owns.
  ApiServerConfig:
    file: schemas/api_server_config.yaml

processors:
  - name: ApiServer
    version: 1.0.0
    description: "Runtime API server — exposes graph + registry + schema catalog over HTTP and a WebSocket event stream"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: ApiServerConfig
