# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: api-server
  version: 1.0.0
  description: HTTP control-plane processor for streamlib runtimes
dependencies:
  '@tatolab/core':
    version: ^1.0.0
# Dev-time path override; `streamlib pack` rejects this. The api-server is a
# host-side, non-distributable package (statically linked into
# streamlib-runtime), so its schema deps resolve from the local checkout
# rather than a registry.
patch:
  '@tatolab/core':
    path: ../core
schemas:
  ApiServerConfig:
    file: schemas/api_server_config.yaml
processors:
- name: ApiServer
  description: Runtime API server — HTTP + WebSocket control plane
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling: null
  config:
    name: config
    schema: ApiServerConfig
  state: []
  inputs: []
  outputs: []
