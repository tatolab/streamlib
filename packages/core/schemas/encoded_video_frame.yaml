# JSON Type Definition (RFC 8927) schema for encoded video frames.

imports:
  ColorInfo:
    org: tatolab
    package: core
    type: ColorInfo
    version: "1.0.0"
  MasteringDisplay:
    org: tatolab
    package: core
    type: MasteringDisplay
    version: "1.0.0"
  ContentLight:
    org: tatolab
    package: core
    type: ContentLight
    version: "1.0.0"

metadata:
  type: EncodedVideoFrame
  description: "Encoded video frame with H.264/H.265 NAL unit data"
  read_mode: read_next_in_order
  max_queued_messages: 16
  # 16 MiB per slot accommodates a 4K H.264/H.265 IDR with prepended SPS+PPS
  # under default rate control (uncapped CQP IDR at 1920x1080 ≈ 2–3 MiB; 4K
  # ≈ 8–12 MiB). iceoryx2 pre-allocates max_queued_messages * max_payload_bytes
  # of shared memory per publisher, so this commits ~256 MiB per encoder; that
  # cost is the price of supporting up to 4K real-time encode end-to-end
  # without dropping the first IDR (which carries SPS/PPS and is the only
  # entry point for the decoder). Lower bitrate-capped streams stay well
  # under this cap; the schema-level limit just bounds the worst case.
  max_payload_bytes: 16777216

properties:
  data:
    metadata:
      description: "Encoded NAL units (H.264/H.265 bitstream data)"
    elements:
      type: uint8
  timestamp_ns:
    metadata:
      description: "Monotonic timestamp in nanoseconds (int64 as string)"
    type: string
  is_keyframe:
    metadata:
      description: "Whether this is a keyframe (I-frame)"
    type: boolean
  frame_number:
    metadata:
      description: "Sequential frame number (uint64 as string)"
    type: string

optionalProperties:
  fps:
    metadata:
      description: "Source frame rate in frames per second (pass-through from capture device)"
    type: uint32
  color_info:
    metadata:
      description: "H.273 / ITU-T VUI four-tuple describing this frame's color. Encoder writes this so muxers / downstream consumers can populate VUI / colr boxes without re-deriving from the bitstream."
    ref: ColorInfo
  mastering_display:
    metadata:
      description: "SMPTE ST.2086 mastering display color volume (HDR10 static metadata). Absent for SDR streams."
    ref: MasteringDisplay
  content_light:
    metadata:
      description: "HDR10 content light level info (MaxCLL / MaxFALL). Absent for SDR streams or when not measured."
    ref: ContentLight
