# JSON Type Definition (RFC 8927) schema for encoded video frames.

imports:
  ColorInfo:
    org: tatolab
    package: core
    type: ColorInfo
    version: "1.0.0"
  MasteringDisplay:
    org: tatolab
    package: core
    type: MasteringDisplay
    version: "1.0.0"
  ContentLight:
    org: tatolab
    package: core
    type: ContentLight
    version: "1.0.0"

metadata:
  type: EncodedVideoFrame
  description: "Encoded video frame with H.264/H.265 NAL unit data"
  flow_class: sample_stream
  # Slot-priming HINT, never a cap: the publisher opens under PowerOfTwo growth
  # and grows the segment on the first oversized loan (a 4K IDR ≈ 8–12 MiB), so
  # a keyframe past this hint delivers instead of crashing. 4 MiB covers the
  # common 1080p CQP IDR (≈ 2–3 MiB) without a first-frame regrow while keeping
  # the primed commitment (ring depth * hint) an order of magnitude
  # below the old fixed 16 MiB slot.
  expected_payload_bytes: 4194304

properties:
  data:
    metadata:
      description: "Encoded NAL units (H.264/H.265 bitstream data)"
    elements:
      type: uint8
  timestamp_ns:
    metadata:
      description: "Monotonic timestamp in nanoseconds (int64 as string)"
    type: string
  is_keyframe:
    metadata:
      description: "Whether this is a keyframe (I-frame)"
    type: boolean
  frame_number:
    metadata:
      description: "Sequential frame number (uint64 as string)"
    type: string

optionalProperties:
  fps:
    metadata:
      description: "Source frame rate in frames per second (pass-through from capture device)"
    type: uint32
  color_info:
    metadata:
      description: "H.273 / ITU-T VUI four-tuple describing this frame's color. Encoder writes this so muxers / downstream consumers can populate VUI / colr boxes without re-deriving from the bitstream."
    ref: ColorInfo
  mastering_display:
    metadata:
      description: "SMPTE ST.2086 mastering display color volume (HDR10 static metadata). Absent for SDR streams."
    ref: MasteringDisplay
  content_light:
    metadata:
      description: "HDR10 content light level info (MaxCLL / MaxFALL). Absent for SDR streams or when not measured."
    ref: ContentLight
