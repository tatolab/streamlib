# JSON Type Definition (RFC 8927) schema for video frames.

imports:
  ColorInfo:
    org: tatolab
    package: core
    type: ColorInfo
    version: "1.0.0"
  MasteringDisplay:
    org: tatolab
    package: core
    type: MasteringDisplay
    version: "1.0.0"
  ContentLight:
    org: tatolab
    package: core
    type: ContentLight
    version: "1.0.0"

metadata:
  type: VideoFrame
  description: "Video frame for IPC - references GPU surface by ID"
  read_mode: skip_to_latest
  max_queued_messages: 4
  max_payload_bytes: 65536

properties:
  surface_id:
    metadata:
      description: "GPU surface ID (IOSurface on macOS)"
    type: string
  width:
    metadata:
      description: "Frame width in pixels"
    type: uint32
  height:
    metadata:
      description: "Frame height in pixels"
    type: uint32
  timestamp_ns:
    metadata:
      description: "Monotonic timestamp in nanoseconds (int64 as string - parse to native int64). The single ordering primitive in this schema — consumers that need 'frame N' semantics derive it from timestamps, never from a cross-processor counter. Cameras carry the source timecode here; downstream processors propagate. NOTE: a prior revision of this schema carried a `frame_index: string` field; it was removed because no legitimate cross-processor use case existed and every observed read of it was either diagnostic-only (replaceable by a processor-internal counter) or actively misused as a sync primitive (the camera→display timeline-wait path that caused #1085's residual wedge). Surface_id is the handoff contract; timestamp_ns is the ordering primitive; nothing else."
    type: string

optionalProperties:
  fps:
    metadata:
      description: "Source frame rate in frames per second (set by capture device)"
    type: uint32
  texture_layout:
    metadata:
      description: "Producer's published VkImageLayout for this frame's texture. Per-frame override of the per-surface current_image_layout published via surface-share register/update_layout. Encoded as the raw int32 VkImageLayout enumerant. Absent when the producer relies on the per-surface default."
    type: int32
  color_info:
    metadata:
      description: "H.273 / ITU-T VUI four-tuple describing this frame's color. Absent means unknown — every consumer treats absent the same as all-`unspecified`. Producers fill from V4L2 (camera), VUI (decoder), application config, or leave absent."
    ref: ColorInfo
  mastering_display:
    metadata:
      description: "SMPTE ST.2086 mastering display color volume (HDR10 static metadata). Absent for SDR streams."
    ref: MasteringDisplay
  content_light:
    metadata:
      description: "HDR10 content light level info (MaxCLL / MaxFALL). Absent for SDR streams or when not measured."
    ref: ContentLight
