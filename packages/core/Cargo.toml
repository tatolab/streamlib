[package]
name = "streamlib-core-schema-tests"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "Test-only Cargo crate that codegens @tatolab/core's wire schemas and exercises their Rust serialization. The wire vocabulary itself lives in streamlib.yaml + schemas/; nothing in this crate is shipped — slpkg pack ignores the Cargo files."
publish = false

[lib]
name = "streamlib_core_schema_tests"
path = "src/lib.rs"

[build-dependencies]
streamlib-jtd-codegen = { version = "0.7.42" }

[dependencies]
serde.workspace = true
# Generated `EncodedVideoFrame.data` / `EncodedAudioFrame.data` carry
# `#[serde(with = "serde_bytes")]` so msgpack publish writes `bin` instead
# of array (~33% wire reduction on binary payloads).
serde_bytes.workspace = true

[dev-dependencies]
serde_json.workspace = true
# Wire-shape integration test serializes generated schemas through
# `rmp_serde::to_vec_named` to assert binary fields land as msgpack `bin`.
rmp-serde.workspace = true

[lints]
workspace = true
