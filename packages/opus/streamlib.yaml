# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: opus
  version: 1.0.0
  description: Opus audio encoder + decoder processors via libopus
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  AudioFrame:
    package: '@tatolab/core'
  EncodedAudioFrame:
    package: '@tatolab/core'
  OpusDecoderConfig:
    file: schemas/opus_decoder_config.yaml
  OpusEncoderConfig:
    file: schemas/opus_encoder_config.yaml
processors:
- name: OpusEncoder
  description: Encodes AudioFrame to EncodedAudioFrame (Opus)
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: OpusEncoderConfig
  state: []
  inputs:
  - name: audio_in
    schema: AudioFrame
    description: Raw audio frames to encode
    delivery_profile: null
  outputs:
  - name: encoded_audio_out
    schema: EncodedAudioFrame
    description: Opus encoded audio frames
    delivery_profile: null
- name: OpusDecoder
  description: Decodes EncodedAudioFrame (Opus) to AudioFrame
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: OpusDecoderConfig
  state: []
  inputs:
  - name: encoded_audio_in
    schema: EncodedAudioFrame
    description: Opus encoded audio frames to decode
    delivery_profile: null
  outputs:
  - name: audio_out
    schema: AudioFrame
    description: Decoded audio frames
    delivery_profile: null
