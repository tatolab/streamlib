# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: clap
  version: 1.0.0
  description: CLAP audio plugin host processor for streamlib (macOS / iOS)
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  AudioFrame:
    package: '@tatolab/core'
  ClapEffectConfig:
    file: schemas/clap_effect_config.yaml
processors:
- name: ClapEffect
  description: CLAP audio plugin processor with parameter control and automation
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling: null
  config:
    name: config
    schema: ClapEffectConfig
  state: []
  inputs:
  - name: audio_in
    schema: AudioFrame
    description: Stereo audio frame to process through CLAP plugin (2 channels)
    delivery_profile: null
  outputs:
  - name: audio_out
    schema: AudioFrame
    description: Processed stereo audio frame from CLAP plugin (2 channels)
    delivery_profile: null
