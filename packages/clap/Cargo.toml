[package]
name = "streamlib-clap"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "CLAP audio plugin host processor for streamlib (macOS / iOS)."
keywords = ["clap", "audio", "plugin", "effect", "vst"]
categories = ["multimedia::audio", "multimedia"]

[lib]
name = "streamlib_clap"
crate-type = ["rlib", "cdylib"]

[features]
# Gates the `export_plugin!` invocation so the `STREAMLIB_PLUGIN` symbol
# only ends up in the cdylib output (multiple Rust-impl rlibs sharing
# the same unmangled static collide at link time). `streamlib pack`
# invokes `cargo build --features plugin` when packing.
default = []
plugin = []

[build-dependencies]
streamlib-jtd-codegen = { path = "../../libs/streamlib-jtd-codegen" }

[dependencies]
# Engine substrate — runtime context, processor traits, generated wire
# types under `crate::_generated_::*` (AudioFrame).
streamlib = { path = "../../libs/streamlib-sdk" }

# Audio domain package — owns `ProcessorAudioConverter` + `AudioResampler`
# (carved out of the engine in #734). Consumers that need channel /
# sample-rate / rechunk conversion reach for them here.
streamlib-audio = { path = "../audio" }

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = { path = "../../libs/streamlib-macros" }

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = { path = "../../libs/streamlib-plugin-abi" }

# Serialization (config dataclasses ship as serde-derived).
serde.workspace = true

# Logging.
tracing.workspace = true

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# CLAP plugin host bindings — not available on Linux/Windows in this
# package; Linux CLAP support is a future ticket.
clack-host = { git = "https://github.com/prokopyl/clack", rev = "f53f8fc132c001a332c0a7221267812dfb654e92" }
clack-extensions = { git = "https://github.com/prokopyl/clack", rev = "f53f8fc132c001a332c0a7221267812dfb654e92", features = ["clack-host", "params"] }

# Parameter mutex on the audio path.
parking_lot = "0.12"

[lints]
workspace = true
