[package]
name = "streamlib-clap"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "CLAP audio plugin host processor for streamlib (macOS / iOS)."
keywords = ["clap", "audio", "plugin", "effect", "vst"]
categories = ["multimedia::audio", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_clap"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.40"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — runtime context, processor traits, generated wire
# types under `crate::_generated_::*` (AudioFrame).
streamlib-plugin-sdk = {version = "0.7.40"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.40"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.40"}

# Serialization (config dataclasses ship as serde-derived).

# Logging.
serde = {version = "1.0", features = ["derive"]}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# Path dep on the audio domain package (owns `ProcessorAudioConverter`, used by
# the macOS/iOS-gated `clap_effect`) ⇒ this package is non-distributable via the
# shared `non_distributable_path_offenders` predicate. Re-enabled when
# `ProcessorAudioConverter` moves to the authoring SDK and resolves by version.
streamlib-audio = { path = "../audio" }

# CLAP plugin host bindings — not available on Linux/Windows in this
# package; Linux CLAP support is a future ticket.
clack-host = { git = "https://github.com/prokopyl/clack", rev = "f53f8fc132c001a332c0a7221267812dfb654e92" }
clack-extensions = { git = "https://github.com/prokopyl/clack", rev = "f53f8fc132c001a332c0a7221267812dfb654e92", features = ["clack-host", "params"] }

# Parameter mutex on the audio path.
parking_lot = "0.12"


[workspace]
