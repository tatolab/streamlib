[package]
name = "streamlib-camera"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Camera capture processor — V4L2 on Linux, AVFoundation on macOS/iOS — carved out of the streamlib engine."
keywords = ["camera", "v4l2", "avfoundation", "video", "streaming"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_camera"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.22"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — capability-typed
# runtime/GPU context views, the cdylib-safe RHI PluginAbiObjects the camera
# drives (`StorageBuffer`, `PixelBuffer`, `Texture`, `RhiColorConverter`,
# `RhiCommandRecorder`, `HostTimelineSemaphore`, `SurfaceStore`) plus the
# `VulkanLayout` / `PixelFormat` / `TextureFormat` primitives, generated config
# types under `crate::_generated_::*`, and the `VideoFrame` wire type. Every GPU
# resource comes through `GpuContextFullAccess`, never the raw host device.
streamlib-plugin-sdk = {version = "0.7.22"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.22"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.22"}

tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

# UUID generation for ring texture / pixel-buffer surface_ids.
uuid = { version = "1.11", features = ["v4"] }
# Serialization (generated config dataclasses ship as serde-derived).
serde = {version = "1.0", features = ["derive"]}

[target.'cfg(target_os = "linux")'.dependencies]
# V4L2 capture (Video for Linux 2).
v4l = "0.14"
# Raw ioctl + close fd plumbing for VIDIOC_EXPBUF / VIDIOC_QBUF / VIDIOC_STREAMON
# (V4L2's stream type doesn't expose enough for the DMA-BUF zero-copy path).
libc = {version = "0.2.177"}

# NOTE: the Apple (AVFoundation) camera arm is parked under
# `src/_apple_impl_pending_/` (never compiled — see `src/lib.rs`); its
# objc2 / dispatch2 interop deps are removed until the plugin SDK ships an
# engine-free Apple RHI surface and the arm is unparked.

[workspace]
