[package]
name = "streamlib-camera"
version = "0.4.30"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Camera capture processor ‚Äî V4L2 on Linux, AVFoundation on macOS/iOS ‚Äî carved out of the streamlib engine."
keywords = ["camera", "v4l2", "avfoundation", "video", "streaming"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_camera"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.4.30", registry = "gitea"}

[dependencies]
# Engine substrate ‚Äî runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__camera::*`, VideoFrame
# wire type, RHI primitives.
streamlib = {version = "0.4.30", registry = "gitea"}

# Procedural macros ‚Äî `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.4.30", registry = "gitea"}

# Plugin ABI ‚Äî `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.4.30", registry = "gitea"}

# Cross-platform deps used by the camera processor.
parking_lot = "0.12"

# Serialization (config dataclass ships as serde-derived).
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

# UUID generation for ring texture / pixel-buffer surface_ids.
uuid = { version = "1.11", features = ["v4"] }
serde = {version = "1.0", features = ["derive"]}

[target.'cfg(target_os = "linux")'.dependencies]
# V4L2 capture (Video for Linux 2).
v4l = "0.14"
# Raw ioctl + close fd plumbing for VIDIOC_EXPBUF / VIDIOC_QBUF / VIDIOC_STREAMON
# (V4L2's stream type doesn't expose enough for the DMA-BUF zero-copy path).
# Consumer-side RHI carve-out ‚Äî typed `VulkanLayout` enum used in
# surface-share registrations + recorder barriers. Camera does NOT use
# anything else from consumer-rhi (no `ConsumerVulkanDevice`, no imports);
# this is the typed-layout interop type shared between the host RHI's
# `RhiCommandRecorder` and the cross-process surface-share schema.
streamlib-consumer-rhi = {version = "0.4.30", registry = "gitea"}
# CUDA host-side surface adapter ‚Äî the `CameraToCudaCopy` processor
# allocates a DEVICE_LOCAL OPAQUE_FD VkBuffer + exportable timeline
# and runs the host-side `vkCmdCopyImageToBuffer` per frame for
# cross-API CUDA interop. The adapter crate itself stays cudarc-free
# (`cudarc` integration happens in the cdylib consumer); this dep
# does NOT pull `libcuda.so` into the camera package's link surface.
streamlib-adapter-cuda = {version = "0.4.30", registry = "gitea"}
# Adapter ABI ‚Äî provides `SurfaceId` and `AdapterError` types the
# CUDA adapter surface uses in its public API.
streamlib-adapter-abi = {version = "0.4.30", registry = "gitea"}
libc = {version = "0.2.177"}

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
# Objective-C interop and Apple framework bindings.
objc2-av-foundation = {version = "0.3.2", features = ["objc2-core-media", "objc2-core-video"]}
objc2 = {version = "0.6.3"}
objc2-core-video = {version = "0.3.2"}
objc2-foundation = {version = "0.3.2"}
# GCD wrapper for dispatching AVFoundation init to the main thread.
dispatch2 = "0.3"
libc = {version = "0.2.177"}


[workspace]
