package:
  org: tatolab
  name: camera
  version: 1.0.0
  description: Camera capture processor — V4L2 on Linux, AVFoundation on macOS/iOS
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  CameraConfig:
    file: schemas/camera_config.yaml
  CameraToCudaCopyConfig:
    file: schemas/camera_to_cuda_copy_config.yaml
  ColorInfo:
    package: '@tatolab/core'
  ContentLight:
    package: '@tatolab/core'
  MasteringDisplay:
    package: '@tatolab/core'
  VideoFrame:
    package: '@tatolab/core'
processors:
- name: Camera
  version: 1.0.0
  description: Captures video from cameras (V4L2 on Linux, AVFoundation on macOS/iOS)
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling:
    priority: high
  config:
    name: config
    schema: CameraConfig
  state: []
  inputs: []
  outputs:
  - name: video
    schema: VideoFrame
    description: Live video frames from the camera
    read_mode: null
    overflow: null
    buffer_size: null
- name: CameraToCudaCopy
  version: 1.0.0
  description: 'Host-pipeline producer: camera VkImage -> cuda OPAQUE_FD VkBuffer with timeline signal for cross-API CUDA interop. Linux-only (CUDA is Linux-only on the in-tree adapter set).'
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: high
  config:
    name: config
    schema: CameraToCudaCopyConfig
  state: []
  inputs:
  - name: video_in
    schema: VideoFrame
    description: Camera ring texture (RGBA8 DMA-BUF) frame metadata
    read_mode: null
    overflow: null
    buffer_size: null
  outputs:
  - name: video_out
    schema: VideoFrame
    description: Camera frame forwarded verbatim; cuda surface side-effect happens during process()
    read_mode: null
    overflow: null
    buffer_size: null
