# @tatolab/camera — camera capture processor cluster carved out of the
# streamlib engine substrate. Owns the camera config schema and the
# Camera processor declaration (Linux V4L2 + macOS AVFoundation behind
# a single platform-aliased name).
package:
  org: tatolab
  name: camera
  version: 1.0.0
  description: "Camera capture processor — V4L2 on Linux, AVFoundation on macOS/iOS"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  # Wire types imported from @tatolab/core (#767).
  VideoFrame:
    package: "@tatolab/core"
  # Local config schemas this package owns.
  CameraConfig:
    file: schemas/camera_config.yaml

processors:
  - name: Camera
    version: 1.0.0
    description: "Captures video from cameras (V4L2 on Linux, AVFoundation on macOS/iOS)"
    execution: manual
    scheduling:
      priority: high
    config:
      name: config
      schema: CameraConfig
    outputs:
      - name: video
        schema: VideoFrame
        description: Live video frames from the camera
