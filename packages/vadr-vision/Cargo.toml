[package]
name = "streamlib-vadr-vision"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "VADR-TS-002 §4.6 vision-stream depayloader — parses the 24-byte AGP chunk header, reassembles JPEG frames, drops incomplete frames on timeout, emits EncodedJpegFrame to @tatolab/jpeg."
keywords = ["agp", "vadr", "drone", "jpeg", "streamlib"]
categories = ["aerospace::drones", "encoding", "multimedia"]

[lib]
name = "streamlib_vadr_vision"
crate-type = ["rlib", "cdylib"]

[features]
# Gates the `export_plugin!` invocation so the `STREAMLIB_PLUGIN` symbol
# only ends up in the cdylib output (multiple Rust-impl rlibs sharing
# the same unmangled static collide at link time). `streamlib pack`
# invokes `cargo build --features plugin` when packing.
default = []
plugin = []

[build-dependencies]
streamlib-jtd-codegen = { path = "../../libs/streamlib-jtd-codegen" }

[dependencies]
# Engine substrate — runtime context, processor traits, generated wire
# types under `crate::_generated_::*` (NetworkPacket imported from
# @tatolab/network; EncodedJpegFrame imported from @tatolab/jpeg;
# VadrVisionDepayloaderConfig defined locally).
streamlib = { path = "../../libs/streamlib-sdk" }

# Procedural macros — `#[streamlib::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = { path = "../../libs/streamlib-macros" }

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = { path = "../../libs/streamlib-plugin-abi" }

# Serialization (config dataclasses ship as serde-derived).
serde.workspace = true
# Generated `NetworkPacket.payload` / `EncodedJpegFrame.data` ride msgpack
# `bin` (1× wire) instead of array.
serde_bytes.workspace = true

# Logging.
tracing.workspace = true

[dev-dependencies]
# Integration tests spin up a Runner and exercise the full vision
# pipeline: UdpSource → VadrVisionDepayloader → JpegDecoder →
# VideoFrameCounter. force-link the upstream / downstream crates so
# their `inventory::submit!` factory registrations are present in
# the test binary.
streamlib = { path = "../../libs/streamlib-sdk" }
streamlib-network = { path = "../network" }
streamlib-jpeg = { path = "../jpeg" }
streamlib-debug-utilities = { path = "../debug-utilities" }
# Example-only: `examples/jpeg_pipeline_demo.rs` wires the depayloader
# all the way to a winit-backed display window that owns the PNG
# sampler hooks (STREAMLIB_DISPLAY_PNG_SAMPLE_*). Display isn't part
# of the depayloader's normal runtime dependency graph; it's a
# downstream consumer the demo binary uses to validate the full
# pipeline emits a recognizable image.
streamlib-display = { path = "../display" }
serde_json.workspace = true
serial_test = "3.1"

[lints]
workspace = true
