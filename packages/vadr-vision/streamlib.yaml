package:
  org: tatolab
  name: vadr-vision
  version: 1.0.2
  description: VADR-TS-002 §4.6 vision-stream depayloader — UDP chunk reassembly for AGP simulator vision
dependencies:
  '@tatolab/jpeg':
    version: ^1.0.0
  '@tatolab/network':
    version: ^1.0.0
schemas:
  EncodedJpegFrame:
    package: '@tatolab/jpeg'
  NetworkPacket:
    package: '@tatolab/network'
  VadrVisionDepayloaderConfig:
    file: schemas/vadr_vision_depayloader_config.yaml
processors:
- name: VadrVisionDepayloader
  version: 1.0.0
  description: Parses VADR-TS-002 §4.6 24-byte LE headers, reassembles JPEG frames from NetworkPacket chunks, drops incomplete frames on timeout.
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: high
  config:
    name: config
    schema: VadrVisionDepayloaderConfig
  state: []
  inputs:
  - name: chunks_in
    schema: NetworkPacket
    description: Inbound UDP datagrams carrying VADR-TS-002 §4.6 chunked-JPEG frames
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 64
  outputs:
  - name: jpeg_out
    schema: EncodedJpegFrame
    description: Reassembled JPEG byte blobs — one per complete frame, in arrival-completion order
    read_mode: null
    overflow: null
    buffer_size: null
