# JSON Type Definition (RFC 8927) schema for VadrVisionDepayloader
# config.

metadata:
  type: VadrVisionDepayloaderConfig
  description: "Configuration for the VADR-TS-002 §4.6 vision-stream depayloader"

optionalProperties:
  reassembly_timeout_ms:
    metadata:
      description: |
        Drop pending frames whose first chunk arrived more than this many
        milliseconds ago. VADR-TS-002 §4.6 streams are loss-tolerant by
        design — incomplete frames are dropped and the next frame proceeds.
        Default: 200 ms (covers ~6 frame periods at the spec's 30 Hz rate,
        wide enough for jitter without leaking pending state).
    type: uint32
  max_pending_frames:
    metadata:
      description: |
        Cap on simultaneously-in-flight frames in the reassembly table.
        When the cap is reached and a new frame_id arrives, the oldest
        pending frame is evicted (incomplete → dropped). The spec rate is
        30 Hz and chunks for a single frame arrive within one MTU-RTT
        window, so steady-state in-flight count is 1–2; the cap is a
        belt-and-braces leak guard against pathological producers, not a
        steady-state throttle. Default: 8.
    type: uint32
  warn_on_drop:
    metadata:
      description: |
        When true, log frame drops (malformed header, timeout-evicted,
        capacity-evicted) via tracing::warn on first occurrence + powers
        of two thereafter. When false, drops are counted silently.
        Default: true.
    type: boolean
