[package]
name = "streamlib-test-fixtures-abi-mismatch"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
# Never published — test fixture. Also keeps this crate out of the release
# closure (`compute_release_closure` requires a publishable crate).
publish = false
description = "Test-only cdylib emitting STREAMLIB_PLUGIN with a tampered abi_version — drives the load_project rejection-path integration test."
keywords = ["streamlib", "test-fixtures", "abi"]
categories = ["development-tools::testing"]

[lib]
name = "streamlib_test_fixtures_abi_mismatch"
crate-type = ["cdylib"]

[features]
# Pick which mismatch direction to tamper with. The integration test
# builds the crate once per feature and asserts the load-path rejection
# for each. Default is `tamper-too-low` so a bare
# `cargo build -p streamlib-test-fixtures-abi-mismatch` produces a
# usable fixture without extra flags.
default = ["tamper-too-low"]
# abi_version = 0 (below the runtime's expected version) →
# PluginAbiVersionMismatch.
tamper-too-low = []
# abi_version = u32::MAX (above the runtime's expected version) →
# PluginAbiVersionMismatch.
tamper-too-high = []
# Correct abi_version + a bit-flipped abi_layout_fingerprint →
# PluginBuildMismatch.
tamper-abi-layout-fingerprint = []

[dependencies]
streamlib-plugin-abi = { path = "../../runtime/streamlib-plugin-abi", version = "0.7.45" }

[lints]
workspace = true
