# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: debug-utilities
  version: 1.0.0
  description: Utility processors for development, demos, and rigorous-input testing
dependencies:
  '@tatolab/core':
    version: ^1.0.0
  '@tatolab/jpeg':
    version: ^1.0.0
schemas:
  BgraFileSourceConfig:
    file: schemas/bgra_file_source_config.yaml
  ColorInfo:
    package: '@tatolab/core'
  ContentLight:
    package: '@tatolab/core'
  EncodedJpegFrame:
    package: '@tatolab/jpeg'
  JpegBytesSourceConfig:
    file: schemas/jpeg_bytes_source_config.yaml
  MasteringDisplay:
    package: '@tatolab/core'
  SimplePassthroughConfig:
    file: schemas/simple_passthrough_config.yaml
  VideoFrame:
    package: '@tatolab/core'
  VideoFrameCounterConfig:
    file: schemas/video_frame_counter_config.yaml
processors:
- name: SimplePassthrough
  description: Passes video frames through unchanged (for testing)
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling: null
  config:
    name: config
    schema: SimplePassthroughConfig
  state: []
  inputs:
  - name: input
    schema: VideoFrame
    description: Video frame input
    delivery_profile: null
  outputs:
  - name: output
    schema: VideoFrame
    description: Video frame output (unchanged)
    delivery_profile: null
- name: BgraFileSource
  description: Streams raw BGRA frames from a file as Videoframes
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling: null
  config:
    name: config
    schema: BgraFileSourceConfig
  state: []
  inputs: []
  outputs:
  - name: video
    schema: VideoFrame
    description: Video frames read from the BGRA file
    delivery_profile: null
- name: JpegBytesSource
  description: Loads a JPEG file from disk at setup time and republishes it as EncodedJpegFrame on a paced background thread (for testing the JPEG decoder pipeline)
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling: null
  config:
    name: config
    schema: JpegBytesSourceConfig
  state: []
  inputs: []
  outputs:
  - name: encoded_jpeg
    schema: EncodedJpegFrame
    description: JPEG-encoded bytes wrapped in an EncodedJpegFrame
    delivery_profile: null
- name: VideoFrameCounter
  description: Counts incoming VideoFrames into process-global atomics so integration tests can assert on frame count + first-frame dimensions after runtime.stop()
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling: null
  config:
    name: config
    schema: VideoFrameCounterConfig
  state: []
  inputs:
  - name: input
    schema: VideoFrame
    description: VideoFrame stream to observe
    delivery_profile: every_sample
  outputs: []
