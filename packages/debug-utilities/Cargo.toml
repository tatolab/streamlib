[package]
name = "streamlib-debug-utilities"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Utility processors for development, demos, and rigorous-input testing (BgraFileSource, SimplePassthrough)."
keywords = ["streamlib", "debug", "demo"]
categories = ["development-tools"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_debug_utilities"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.16"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__debug_utilities::*`, the
# VideoFrame wire type, RHI primitives.
streamlib-plugin-sdk = {version = "0.7.16"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.16"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.16"}

# Serialization (config dataclasses ship as serde-derived).
# Generated `EncodedJpegFrame.data` rides msgpack `bin` (1× wire) instead of array.
serde = {version = "1.0", features = ["derive"]}

# tracing for processor lifecycle logs.
serde_bytes = {version = "0.11"}
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

[workspace]
