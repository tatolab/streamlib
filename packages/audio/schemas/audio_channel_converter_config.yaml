# JSON Type Definition (RFC 8927) schema for AudioChannelConverter config.

metadata:
  type: AudioChannelConverterConfig
  description: "Configuration for mono to N-channel conversion"

properties:
  mode:
    metadata:
      description: "Channel conversion mode"
    enum:
      - Duplicate
      - LeftOnly
      - RightOnly
optionalProperties:
  output_channels:
    metadata:
      description: "Number of output channels (default: 2)"
    type: uint8
