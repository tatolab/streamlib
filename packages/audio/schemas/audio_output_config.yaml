# JSON Type Definition (RFC 8927) schema for AudioOutput config.

metadata:
  type: AudioOutputConfig
  description: "Configuration for audio output (CoreAudio on macOS, ALSA on Linux)"

optionalProperties:
  device_id:
    metadata:
      description: "Audio output device ID. If None, uses default device"
    type: string
