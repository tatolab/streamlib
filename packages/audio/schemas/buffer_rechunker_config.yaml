# JSON Type Definition (RFC 8927) schema for BufferRechunker config.

metadata:
  type: BufferRechunkerConfig
  description: "Configuration for rechunking audio buffers to fixed size"

properties:
  target_buffer_size:
    metadata:
      description: "Target buffer size in samples per channel"
    type: uint32
