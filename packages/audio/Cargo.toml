[package]
name = "streamlib-audio"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Audio processors carved out of the streamlib engine — capture, output, mixer, channel converter, resampler, buffer rechunker, chord generator"
keywords = ["audio", "streaming", "real-time"]
categories = ["multimedia::audio", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_audio"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.10"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — runtime context, processor traits, generated config
# types under `crate::_generated_::tatolab__audio::*`, AudioFrame
# wire type, audio utilities (resample, channel/format conversion).
streamlib-plugin-sdk = {version = "0.7.10"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.10"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.10"}

# Cross-platform deps used by every audio processor.
parking_lot = "0.12"
rtrb = "0.3.2"
rubato = "0.16"  # SincFixedIn resampler powering ProcessorAudioConverter / AudioResamplerProcessor

# Serialization (config dataclasses ship as serde-derived).
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}
serde = {version = "1.0", features = ["derive"]}

[target.'cfg(target_os = "linux")'.dependencies]
cpal = "0.15"  # ALSA backend on Linux

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
cpal = "0.15"  # CoreAudio backend on macOS


[workspace]
