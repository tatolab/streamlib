# @tatolab/audio — audio processor cluster carved out of the streamlib
# engine substrate. Owns the seven processor configs and seven
# processor declarations.
package:
  org: tatolab
  name: audio
  version: 1.0.0
  description: "Audio processors — capture, output, mixer, channel converter, resampler, buffer rechunker, chord generator"

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../core

schemas:
  - schemas/audio_capture_config.yaml
  - schemas/audio_channel_converter_config.yaml
  - schemas/audio_mixer_config.yaml
  - schemas/audio_output_config.yaml
  - schemas/audio_resampler_config.yaml
  - schemas/buffer_rechunker_config.yaml
  - schemas/chord_generator_config.yaml

processors:
  - name: AudioCapture
    version: 1.0.0
    description: "Captures mono audio from microphones in device-native format (CoreAudio on macOS, ALSA on Linux)"
    execution: manual
    runtime:
      language: rust
      options:
        unsafe_send: true
    config:
      name: config
      schema: "@tatolab/audio/AudioCaptureConfig@1.0.0"
    outputs:
      - name: audio
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Captured mono audio frames in device-native sample rate

  - name: AudioOutput
    version: 1.0.0
    description: "Plays audio through speakers/headphones (CoreAudio on macOS, ALSA on Linux)"
    execution: manual
    runtime:
      language: rust
      options:
        unsafe_send: true
    config:
      name: config
      schema: "@tatolab/audio/AudioOutputConfig@1.0.0"
    inputs:
      - name: audio
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Stereo audio frame to play through speakers
        read_mode: read_next_in_order
        buffer_size: 32

  - name: AudioMixer
    version: 1.0.0
    description: "Mixes two mono audio signals into a single stereo signal"
    execution: reactive
    config:
      name: config
      schema: "@tatolab/audio/AudioMixerConfig@1.0.0"
    inputs:
      - name: left
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Left channel mono audio frame
        read_mode: read_next_in_order
        buffer_size: 32
      - name: right
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Right channel mono audio frame
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Mixed stereo audio frame

  - name: AudioChannelConverter
    version: 1.0.0
    description: "Converts mono audio to N-channel audio according to the configured mode"
    execution: reactive
    config:
      name: config
      schema: "@tatolab/audio/AudioChannelConverterConfig@1.0.0"
    inputs:
      - name: audio_in
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Mono audio frame
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio_out
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Multi-channel audio frame

  - name: AudioResampler
    version: 1.0.0
    description: "Resamples audio between sample rates"
    execution: reactive
    config:
      name: config
      schema: "@tatolab/audio/AudioResamplerConfig@1.0.0"
    inputs:
      - name: audio_in
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Audio frame to resample
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio_out
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Resampled audio frame

  - name: BufferRechunker
    version: 1.0.0
    description: "Rechunks audio buffers to a fixed sample count"
    execution: reactive
    config:
      name: config
      schema: "@tatolab/audio/BufferRechunkerConfig@1.0.0"
    inputs:
      - name: audio_in
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Variable-size audio frame
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio_out
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Fixed-size audio frame

  - name: ChordGenerator
    version: 1.0.0
    description: "Generates a C major chord (C4 + E4 + G4) driven by the runtime audio clock"
    execution: manual
    config:
      name: config
      schema: "@tatolab/audio/ChordGeneratorConfig@1.0.0"
    outputs:
      - name: chord
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Stereo chord audio frame
