# yaml-language-server: $schema=../../schemas/streamlib.schema.json
package:
  org: tatolab
  name: audio
  version: 1.0.0
  description: Audio processors — capture, output, mixer, channel converter, resampler, buffer rechunker, chord generator
dependencies:
  '@tatolab/core':
    version: ^1.0.0
schemas:
  AudioCaptureConfig:
    file: schemas/audio_capture_config.yaml
  AudioChannelConverterConfig:
    file: schemas/audio_channel_converter_config.yaml
  AudioFrame:
    package: '@tatolab/core'
  AudioMixerConfig:
    file: schemas/audio_mixer_config.yaml
  AudioOutputConfig:
    file: schemas/audio_output_config.yaml
  AudioResamplerConfig:
    file: schemas/audio_resampler_config.yaml
  BufferRechunkerConfig:
    file: schemas/buffer_rechunker_config.yaml
  ChordGeneratorConfig:
    file: schemas/chord_generator_config.yaml
processors:
- name: AudioCapture
  description: Captures mono audio from microphones in device-native format (CoreAudio on macOS, ALSA on Linux)
  runtime:
    language: rust
    options:
      unsafe_send: true
      python_version: null
    env: {}
  entrypoint: null
  execution: manual
  scheduling:
    priority: realtime
  config:
    name: config
    schema: AudioCaptureConfig
  state: []
  inputs: []
  outputs:
  - name: audio
    schema: AudioFrame
    description: Captured mono audio frames in device-native sample rate
    read_mode: null
    overflow: null
    buffer_size: null
- name: AudioOutput
  description: Plays audio through speakers/headphones (CoreAudio on macOS, ALSA on Linux)
  runtime:
    language: rust
    options:
      unsafe_send: true
      python_version: null
    env: {}
  entrypoint: null
  execution: manual
  scheduling:
    priority: realtime
  config:
    name: config
    schema: AudioOutputConfig
  state: []
  inputs:
  - name: audio
    schema: AudioFrame
    description: Stereo audio frame to play through speakers
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  outputs: []
- name: AudioMixer
  description: Mixes two mono audio signals into a single stereo signal
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: AudioMixerConfig
  state: []
  inputs:
  - name: left
    schema: AudioFrame
    description: Left channel mono audio frame
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  - name: right
    schema: AudioFrame
    description: Right channel mono audio frame
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  outputs:
  - name: audio
    schema: AudioFrame
    description: Mixed stereo audio frame
    read_mode: null
    overflow: null
    buffer_size: null
- name: AudioChannelConverter
  description: Converts mono audio to N-channel audio according to the configured mode
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: AudioChannelConverterConfig
  state: []
  inputs:
  - name: audio_in
    schema: AudioFrame
    description: Mono audio frame
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  outputs:
  - name: audio_out
    schema: AudioFrame
    description: Multi-channel audio frame
    read_mode: null
    overflow: null
    buffer_size: null
- name: AudioResampler
  description: Resamples audio between sample rates
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: AudioResamplerConfig
  state: []
  inputs:
  - name: audio_in
    schema: AudioFrame
    description: Audio frame to resample
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  outputs:
  - name: audio_out
    schema: AudioFrame
    description: Resampled audio frame
    read_mode: null
    overflow: null
    buffer_size: null
- name: BufferRechunker
  description: Rechunks audio buffers to a fixed sample count
  runtime: rust
  entrypoint: null
  execution: reactive
  scheduling:
    priority: realtime
  config:
    name: config
    schema: BufferRechunkerConfig
  state: []
  inputs:
  - name: audio_in
    schema: AudioFrame
    description: Variable-size audio frame
    read_mode: read_next_in_order
    overflow: null
    buffer_size: 32
  outputs:
  - name: audio_out
    schema: AudioFrame
    description: Fixed-size audio frame
    read_mode: null
    overflow: null
    buffer_size: null
- name: ChordGenerator
  description: Generates a C major chord (C4 + E4 + G4) driven by the runtime audio clock
  runtime: rust
  entrypoint: null
  execution: manual
  scheduling:
    priority: realtime
  config:
    name: config
    schema: ChordGeneratorConfig
  state: []
  inputs: []
  outputs:
  - name: chord
    schema: AudioFrame
    description: Stereo chord audio frame
    read_mode: null
    overflow: null
    buffer_size: null
