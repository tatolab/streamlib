[package]
name = "streamlib-frame-tap"
version = "1.0.0"
edition = "2024"
authors = ["Jonathan Fontanez <fontanezj1@gmail.com>"]
description = "Frame tap — a sink processor that fans out from any video output and samples frames to disk (JPEG) on a configurable strategy, off the hot path. The seed for streamlib's general tap behavior."
keywords = ["tap", "sampler", "frame", "streamlib", "debug"]
categories = ["multimedia::video", "multimedia"]
repository = "https://github.com/tato123/streamlib"
license = "BUSL-1.1"

[lib]
name = "streamlib_frame_tap"
crate-type = ["rlib", "cdylib"]

[build-dependencies]
streamlib-jtd-codegen = {version = "0.7.35"}

[dependencies]
# Engine-free authoring SDK (never the `streamlib` facade) — capability-typed
# runtime/GPU context views, the cdylib-safe `TextureReadback` PluginAbiObject,
# generated wire types under `crate::_generated_::*`, error/result types. GPU
# resource creation goes through `GpuContextLimitedAccess::escalate` +
# `create_texture_readback`, never the raw host device.
streamlib-plugin-sdk = {version = "0.7.35"}

# Procedural macros — `#[streamlib_plugin_sdk::sdk::processor("...")]` reads the
# crate's own `streamlib.yaml` at `CARGO_MANIFEST_DIR`.
streamlib-macros = {version = "0.7.35"}

# Plugin ABI — `export_plugin!` emits the `STREAMLIB_PLUGIN` symbol the
# runtime dlopens at load time.
streamlib-plugin-abi = {version = "0.7.35"}

serde = {version = "1.0", features = ["derive"]}
serde_json = {version = "1.0", features = ["preserve_order"]}
parking_lot = "0.12"
tracing = {version = "0.1.41", features = ["release_max_level_debug"]}

# Pure-Rust CPU JPEG encoder for the stills sample path (no GPU JPEG encode
# exists in-tree; vulkan-jpeg is decode-only).
jpeg-encoder = "0.6"

[workspace]
