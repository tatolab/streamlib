[package]
name = "vulkan-video"
version.workspace = true
# vulkan-video is a port of NVIDIA nvpro-samples and hasn't completed the
# edition-2024 unsafe cleanup yet (unsafe_op_in_unsafe_fn,
# #[unsafe(no_mangle)] attrs). It stays on 2021 until the ported codec code
# gets its own migration pass — tracked as #352.
edition = "2021"
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "Rust port of NVIDIA nvpro-samples Vulkan Video encoder/decoder libraries"

[features]
clear_bitstream_buffers_on_create = []

[dependencies]
vulkanalia = { workspace = true }
vulkanalia-vma = { workspace = true }
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "encode-test"
path = "src/bin/encode_test.rs"

[[bin]]
name = "decode-test"
path = "src/bin/decode_test.rs"

[[bin]]
name = "pipeline-test"
path = "src/bin/pipeline_test.rs"

[[bin]]
name = "video-demo"
path = "src/bin/video_demo.rs"

[[bin]]
name = "h265-caps"
path = "src/bin/h265_caps.rs"
