[package]
name = "streamlib-telemetry"
description = "Unified OpenTelemetry observability for StreamLib — SQLite-backed traces and logs"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[features]
default = []
broker = ["dep:tonic", "dep:prost", "dep:tonic-build", "dep:prost-build"]
otlp = ["opentelemetry-otlp"]

[dependencies]
# OpenTelemetry core
opentelemetry = "0.31.0"
opentelemetry_sdk = { version = "0.31.0", features = ["trace", "logs"] }
opentelemetry-otlp = { version = "0.31.0", features = ["grpc-tonic", "trace", "logs"], optional = true }

# Tracing bridge
tracing-opentelemetry = "0.32.1"
opentelemetry-appender-tracing = "0.31.1"

# SQLite
rusqlite = { version = "0.38.0", features = ["bundled"] }

# Tracing
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }
tracing-appender = "0.2"

# Async
tokio.workspace = true

# Serialization
serde_json.workspace = true

# Error handling
anyhow.workspace = true

# Home directory
dirs = "6.0"

# gRPC (for broker-based telemetry routing)
tonic = { version = "0.12", optional = true }
prost = { version = "0.13", optional = true }

[build-dependencies]
tonic-build = { version = "0.12", optional = true }
prost-build = { version = "0.13", optional = true }
