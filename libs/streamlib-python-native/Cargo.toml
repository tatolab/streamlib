[package]
name = "streamlib-python-native"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "FFI cdylib for Python subprocess processors to access iceoryx2 directly"

[lib]
name = "streamlib_python_native"
crate-type = ["cdylib"]

[dependencies]
streamlib-ipc-types = { path = "../streamlib-ipc-types" }
iceoryx2 = "0.8.1"
rmp-serde = "1.3"
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
libc.workspace = true
streamlib-surface-client = { path = "../streamlib-surface-client" }
# Vulkan import of DMA-BUF fds from the surface-share service (issue #420).
# Consumer-only — this cdylib never allocates GPU memory, it only imports fds
# the host already exported via escalate IPC. `libloading` feature avoids a
# hard link to libvulkan.so so the cdylib loads on systems without a Vulkan
# driver.
vulkanalia = { workspace = true }
# Subprocess-side OpenGl runtime (#530). Reuses the host adapter crate's
# EglRuntime + OpenGlSurfaceAdapter so subprocess code never re-derives EGL
# bring-up or DMA-BUF → GL_TEXTURE_2D import.
streamlib-adapter-abi = { path = "../streamlib-adapter-abi" }
streamlib-adapter-opengl = { path = "../streamlib-adapter-opengl" }
# Subprocess-side Vulkan runtime (#531). Reuses the host adapter crate's
# `VulkanSurfaceAdapter` against a subprocess-local `VulkanDevice` from the
# RHI: same timeline-wait, same layout-transition, same acquire/release
# state machine. The dual-VkDevice crash on NVIDIA does not apply because
# this VkDevice is created before any other in-process Vulkan device has
# active GPU work — see `docs/learnings/nvidia-dual-vulkan-device-crash.md`.
streamlib-adapter-vulkan = { path = "../streamlib-adapter-vulkan" }
streamlib = { path = "../streamlib" }


[lints]
workspace = true
