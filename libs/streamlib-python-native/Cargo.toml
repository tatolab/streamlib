[package]
name = "streamlib-python-native"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "FFI cdylib for Python subprocess processors to access iceoryx2 directly"

[lib]
name = "streamlib_python_native"
crate-type = ["cdylib"]

[dependencies]
streamlib-ipc-types = { path = "../streamlib-ipc-types" }
iceoryx2 = "0.8.1"
rmp-serde = "1.3"
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
libc.workspace = true
streamlib-broker-client = { path = "../streamlib-broker-client" }
# Vulkan import of DMA-BUF fds from the broker (issue #420). Consumer-only —
# this cdylib never allocates GPU memory, it only imports fds the host already
# exported via escalate IPC. `libloading` feature avoids a hard link to
# libvulkan.so so the cdylib loads on systems without a Vulkan driver.
vulkanalia = { workspace = true }


[lints]
workspace = true
