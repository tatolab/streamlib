[package]
name = "streamlib"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
description = "streamlib — public authoring API surface (StreamRuntime, ProcessorSpec, port markers, processor traits, error types, descriptors). Engine internals live in a private streamlib-engine dep."
keywords = ["video", "streaming", "gpu", "real-time", "ai"]
categories = ["multimedia::video", "multimedia", "api-bindings"]

[lib]
name = "streamlib"
crate-type = ["rlib"]

[features]
# `auto-build` is on by default: it pulls in `PolyglotBuildOrchestrator`
# so build-requiring module loads (`Strategy::Path`/`Git` +
# `IfStale`/`AlwaysBuild`) can materialize from source at runtime — the
# dev / runtime-authoring posture. A frozen `.slpkg`-only deployment
# builds with `--no-default-features`, which physically excludes the
# build tooling from the dependency graph (provably compiler-free).
default = ["auto-build"]
auto-build = ["dep:streamlib-build-orchestrator"]
# Forwarded engine features. Customer apps that need a non-default engine
# configuration enable the matching SDK feature; the SDK forwards it to
# the engine dep.
backend-metal = ["streamlib-engine/backend-metal"]
backend-vulkan = ["streamlib-engine/backend-vulkan"]
strip_debug_logging = ["streamlib-engine/strip_debug_logging"]
hardware-tests = ["streamlib-engine/hardware-tests"]

[dependencies]
streamlib-engine = { path = "../streamlib-engine", version = "0.5.0", registry = "gitea" }
streamlib-build-orchestrator = { path = "../streamlib-build-orchestrator", version = "0.5.0", registry = "gitea", optional = true }
