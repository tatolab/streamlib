[package]
name = "streamlib-consumer-rhi"
description = "Consumer-side carve-out of the StreamLib Vulkan RHI: DMA-BUF FD import + bind + map and the trait machinery surface adapters use to abstract over device flavors. Cdylibs depend on this crate (NOT the full streamlib) so the FullAccess capability boundary is type-system enforced."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[lib]
name = "streamlib_consumer_rhi"
path = "src/lib.rs"

[dependencies]
thiserror.workspace = true
tracing.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
streamlib-surface-client = { path = "../streamlib-surface-client" }
vulkanalia.workspace = true
libc.workspace = true

[lints]
workspace = true
