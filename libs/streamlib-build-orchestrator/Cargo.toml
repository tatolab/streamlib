[package]
name = "streamlib-build-orchestrator"
description = "Default polyglot BuildOrchestrator impl — runtime materialization of source packages (Rust cdylib via cargo, Python/Deno/schemas via staging) into the streamlib build cache. Depends on streamlib-engine for the BuildOrchestrator trait and streamlib-cargo-build for the build/stage primitives."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[dependencies]
anyhow = { workspace = true }
tracing = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
streamlib-engine = { path = "../streamlib-engine" }
streamlib-cargo-build = { path = "../streamlib-cargo-build" }
streamlib-idents = { path = "../streamlib-idents" }
streamlib-processor-schema = { path = "../streamlib-processor-schema" }
streamlib-plugin-abi = { path = "../streamlib-plugin-abi" }

[dev-dependencies]
tempfile = "3.14"
serial_test = "3.2"

[lints]
workspace = true
