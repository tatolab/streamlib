# MoQ Subscribe Processor specification (standalone reference)

- name: com.streamlib.moq_subscribe
  version: 1.0.0
  description: "Receives data from a MoQ relay via subscription"
  execution: manual
  runtime:
    language: rust
  config:
    name: config
    schema: com.streamlib.moq_subscribe.config@1.0.0
  outputs:
    - name: data_out
      schema: com.tatolab.videoframe@1.0.0
      moq_fanout: false
