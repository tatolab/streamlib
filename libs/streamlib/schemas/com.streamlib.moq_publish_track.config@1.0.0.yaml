# JSON Type Definition (RFC 8927) schema for MoQ Publish Track config

metadata:
  name: com.streamlib.moq_publish_track.config
  version: 1.0.0
  description: "Configuration for publishing a single track to a MoQ relay"

properties:
  url:
    metadata:
      description: "MoQ relay URL including broadcast path (e.g., https://relay.example.com/my-broadcast)"
    type: string
optionalProperties:
  track_name:
    metadata:
      description: "Track name (auto-generated from processor ID if not set)"
    type: string
