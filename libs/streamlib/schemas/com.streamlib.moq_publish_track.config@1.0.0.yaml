# JSON Type Definition (RFC 8927) schema for MoQ Publish Track config

metadata:
  name: com.streamlib.moq_publish_track.config
  version: 1.0.0
  description: "Configuration for publishing a single track to a MoQ relay"

properties:
  relay_endpoint_url:
    metadata:
      description: "MoQ relay endpoint URL"
    type: string
  broadcast_path:
    metadata:
      description: "MoQ broadcast namespace path"
    type: string
  track_name:
    metadata:
      description: "MoQ track name to publish to"
    type: string
optionalProperties:
  tls_disable_verify:
    metadata:
      description: "Disable TLS certificate verification (development only)"
    type: boolean
