# JSON Type Definition (RFC 8927) schema for MoQ Decode Subscribe config

metadata:
  name: com.streamlib.moq_decode_subscribe.config
  version: 1.0.0
  description: "Configuration for MoQ A/V subscription with H.264+Opus decoding"

properties:
  relay_endpoint_url:
    metadata:
      description: "MoQ relay endpoint URL (e.g., https://relay.example.com)"
    type: string
  broadcast_path:
    metadata:
      description: "Broadcast namespace path to subscribe to"
    type: string
optionalProperties:
  tls_disable_verify:
    metadata:
      description: "Disable TLS certificate verification (development only)"
    type: boolean
  audio_sample_rate:
    metadata:
      description: "Opus audio sample rate in Hz (default: 48000)"
    type: uint32
  audio_channels:
    metadata:
      description: "Number of audio channels (default: 2 for stereo)"
    type: uint8
