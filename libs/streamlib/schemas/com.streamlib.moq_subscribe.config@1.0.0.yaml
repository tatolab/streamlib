# JSON Type Definition (RFC 8927) schema for MoQ Subscribe config

metadata:
  name: com.streamlib.moq_subscribe.config
  version: 1.0.0
  description: "Configuration for MoQ relay subscription"

properties:
  relay_endpoint_url:
    metadata:
      description: "MoQ relay endpoint URL (e.g., https://relay.example.com)"
    type: string
  broadcast_path:
    metadata:
      description: "Broadcast namespace path to subscribe to"
    type: string
  track_names:
    metadata:
      description: "Track names to subscribe to within the broadcast"
    elements:
      type: string
optionalProperties:
  tls_disable_verify:
    metadata:
      description: "Disable TLS certificate verification (development only)"
    type: boolean
