#
# JSON Type Definition (RFC 8927) schema for polyglot GPU escalation responses.
#
# Sent from the Rust host processor over the subprocess's stdin in reply to an
# [`EscalateRequest`]. Correlated by `request_id`.
#
# See the sibling escalate_request schema for the rationale behind keeping
# this file out of the `cargo xtask generate-schemas` pipeline; the
# hand-authored types live in
# `libs/streamlib/src/core/compiler/compiler_ops/subprocess_escalate.rs`.

metadata:
  name: com.streamlib.escalate_response
  version: 1.0.0
  description: "Polyglot subprocess escalate-on-behalf response (host → subprocess)"

discriminator: result
mapping:
  ok:
    properties:
      request_id:
        metadata:
          description: "Correlates response with request. Matches request_id in EscalateRequest."
        type: string
      handle_id:
        metadata:
          description: >
            Opaque handle returned by the host. For acquire_pixel_buffer this
            is the PixelBufferPoolId the host registered with its
            pixel-buffer pool and SurfaceStore. For acquire_texture this is
            a host-side UUID keying the EscalateHandleRegistry's texture
            slot. For release_handle this echoes the released id.
        type: string
    optionalProperties:
      width:
        metadata:
          description: "Width in pixels (set on acquire_pixel_buffer and acquire_texture responses)."
        type: uint32
      height:
        metadata:
          description: "Height in pixels (set on acquire_pixel_buffer and acquire_texture responses)."
        type: uint32
      format:
        metadata:
          description: "Resolved pixel or texture format identifier."
        type: string
      usage:
        metadata:
          description: >
            Resolved usage tokens (set on acquire_texture responses). Array
            reflects the exact flags the host honored.
        elements:
          type: string
      cpu_readback_planes:
        metadata:
          description: >
            Per-plane staging-buffer descriptors set on `acquire_cpu_readback`
            responses. Length equals `SurfaceFormat::plane_count` for the
            target surface (1 for BGRA8/RGBA8, 2 for NV12). Each entry's
            `staging_surface_id` can be `check_out`ed from the surface-share
            service to obtain a DMA-BUF FD over the host-allocated staging
            `VulkanPixelBuffer` for that plane; mmap that FD to read or
            write the plane's tightly-packed bytes (`width * height *
            bytes_per_pixel` per plane).
        elements:
          properties:
            staging_surface_id:
              metadata:
                description: "Surface-share UUID for this plane's staging buffer."
              type: string
            width:
              metadata:
                description: "Plane width in texels."
              type: uint32
            height:
              metadata:
                description: "Plane height in texels."
              type: uint32
            bytes_per_pixel:
              metadata:
                description: >
                  Plane bytes-per-pixel. BGRA/RGBA: 4. NV12 plane 0 (Y): 1.
                  NV12 plane 1 (UV interleaved): 2.
              type: uint32
  err:
    properties:
      request_id:
        metadata:
          description: "Correlates response with request."
        type: string
      message:
        metadata:
          description: "Human-readable error message from the host side."
        type: string
