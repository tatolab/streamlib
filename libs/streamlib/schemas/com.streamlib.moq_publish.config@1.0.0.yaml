# JSON Type Definition (RFC 8927) schema for MoQ Publish config

metadata:
  name: com.streamlib.moq_publish.config
  version: 1.0.0
  description: "Configuration for MoQ A/V publishing (encode + relay)"

properties:
  relay:
    metadata:
      description: "MoQ relay connection configuration"
    properties:
      endpoint_url:
        metadata:
          description: "MoQ relay endpoint URL (e.g., https://relay.example.com)"
        type: string
      broadcast_path:
        metadata:
          description: "Broadcast namespace path for publishing"
        type: string
    optionalProperties:
      tls_disable_verify:
        metadata:
          description: "Disable TLS certificate verification (development only)"
        type: boolean
  video:
    metadata:
      description: "Video encoder configuration"
    properties:
      width:
        metadata:
          description: "Video width in pixels"
        type: uint32
      height:
        metadata:
          description: "Video height in pixels"
        type: uint32
      fps:
        metadata:
          description: "Frames per second"
        type: uint32
      bitrate_bps:
        metadata:
          description: "Target bitrate in bits per second"
        type: uint32
  audio:
    metadata:
      description: "Audio encoder configuration"
    properties:
      sample_rate:
        metadata:
          description: "Sample rate in Hz"
        type: uint32
      channels:
        metadata:
          description: "Number of audio channels"
        type: uint32
      bitrate_bps:
        metadata:
          description: "Target bitrate in bits per second"
        type: uint32
