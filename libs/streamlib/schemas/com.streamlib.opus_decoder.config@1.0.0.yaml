# JSON Type Definition (RFC 8927) schema for Opus Decoder config

metadata:
  name: com.streamlib.opus_decoder.config
  version: 1.0.0
  description: "Configuration for Opus audio decoding"

optionalProperties:
  sample_rate:
    metadata:
      description: "Output sample rate in Hz (default: 48000)"
    type: uint32
  channels:
    metadata:
      description: "Output channel count (default: 2)"
    type: uint32
