[package]
name = "streamlib-runtime"
description = "StreamLib runtime binary — hosts processors and the API server"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[[bin]]
name = "streamlib-runtime"
path = "src/main.rs"

[dependencies]
# Engine + SDK. The API server (and every other processor) is loaded at
# runtime through the all-dynamic module loader, not linked here.
streamlib = { path = "../streamlib-sdk", version = "0.5.0", registry = "tatolab" }

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# JSON config for module-loaded processors (ProcessorSpec)
serde_json = "1"

# Async runtime
tokio.workspace = true

# Logging
tracing.workspace = true

# Runtime ID generation
cuid2 = "0.1"

# Error handling
anyhow.workspace = true
