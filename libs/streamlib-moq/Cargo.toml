[package]
name = "streamlib-moq"
description = "MoQ (Media over QUIC) transport for StreamLib: publish/subscribe sessions over WebTransport/QUIC plus the broadcast catalog. The reusable library half of @tatolab/moq — the loadable track processors live in the package."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
keywords = ["moq", "media-over-quic", "streaming", "streamlib", "webtransport"]
categories = ["multimedia::video", "multimedia"]

[lib]
name = "streamlib_moq"
path = "src/lib.rs"

[dependencies]
streamlib = { path = "../streamlib-sdk", version = "0.4.30", registry = "gitea" }

# MoQ-over-QUIC transport stack.
moq-transport = "0.14.1"
web-transport = "0.10"
quinn = "0.11"
url = "2"
rustls = { version = "0.23", features = ["ring"] }
rustls-native-certs = "0.8"

bytes = "1.5"
parking_lot = "0.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
tokio = { version = "1.48.0", features = ["full", "rt-multi-thread", "sync", "macros", "time"] }
tracing = { version = "0.1.41", features = ["release_max_level_debug"] }
