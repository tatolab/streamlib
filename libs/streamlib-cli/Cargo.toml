[package]
name = "streamlib-cli"
description = "Command-line interface for StreamLib runtime"
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
build = "build.rs"

[[bin]]
name = "streamlib"
path = "src/main.rs"

[dependencies]
# Core library (bundles all Rust processors)
streamlib = { path = "../streamlib-sdk" }

# Schema types (processor YAML parsing)
streamlib-processor-schema = { path = "../streamlib-processor-schema" }

# Manifest + workspace + dependency-spec types for `streamlib pack` /
# `pkg install` / `pkg remove` — typed PackageRef, Manifest schema, etc.
streamlib-idents = { path = "../streamlib-idents" }

# JTD-codegen pipeline (drives `streamlib generate`)
streamlib-jtd-codegen = { path = "../streamlib-jtd-codegen" }

# CLI framework
clap = { version = "4.5", features = ["derive"] }

# Async runtime
tokio.workspace = true

# HTTP client (used by `streamlib pkg install` for HTTP URL sources)
reqwest = { version = "0.12", features = ["json"] }

# Serialization
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
toml.workspace = true

# Error handling
anyhow.workspace = true

# Load .env files for development environment
dotenvy = "0.15"

# Logging
tracing.workspace = true

# Timestamp parsing for log filtering
chrono = "0.4"

# Home directory detection
dirs = "6.0"

# ZIP archive creation
zip = "2.2"

[dev-dependencies]
tempfile = "3.14"  # Temporary directories for logs subcommand tests
tokio = { workspace = true, features = ["full"] }
