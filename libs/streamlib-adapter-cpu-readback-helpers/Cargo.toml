# Test-helper binaries for `streamlib-adapter-cpu-readback`. Held in a
# dedicated crate so the `streamlib` runtime dep these helpers need
# does NOT propagate into the adapter's runtime dep graph (and from
# there into `streamlib-python-native` / `-deno-native`, which must
# stay `streamlib`-free per #560 / #562).
#
# `streamlib-adapter-cpu-readback/tests/*` reach the bin via
# `env!("CARGO_BIN_EXE_<name>")`, set automatically when the helpers
# crate is referenced as a dev-dependency.

[package]
name = "streamlib-adapter-cpu-readback-helpers"
description = "Test-helper binaries for streamlib-adapter-cpu-readback. Internal — not published; the helpers exist solely so adapter-cpu-readback tests and a carve-out semantic test can spawn a subprocess that brings up a real ConsumerVulkanDevice without forcing streamlib onto adapter-cpu-readback's runtime dep graph."
version.workspace = true
edition.workspace = true
authors.workspace = true
license-file.workspace = true
repository.workspace = true
publish = false

[lib]
# Empty lib to satisfy Cargo's bin-target requirement of having
# either a lib or another target. The bin is the actual deliverable.
path = "src/lib.rs"

[target.'cfg(target_os = "linux")'.dependencies]
streamlib = { path = "../streamlib" }
streamlib-adapter-abi = { path = "../streamlib-adapter-abi" }
streamlib-adapter-cpu-readback = { path = "../streamlib-adapter-cpu-readback" }
streamlib-consumer-rhi = { path = "../streamlib-consumer-rhi" }
streamlib-surface-client = { path = "../streamlib-surface-client" }
vulkanalia.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
libc.workspace = true

[target.'cfg(target_os = "linux")'.dev-dependencies]
# Serialize Vulkan-device-touching tests; concurrent `VkDevice` /
# `VkInstance` creation on NVIDIA Linux trips the dual-device crash
# documented in `docs/learnings/nvidia-dual-vulkan-device-crash.md`.
serial_test = "3.2"

[[bin]]
name = "cpu_readback_adapter_subprocess_helper"
path = "src/bin/cpu_readback_adapter_subprocess_helper.rs"

[lints]
workspace = true
