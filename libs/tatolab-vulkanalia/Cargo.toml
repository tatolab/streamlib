[package]

edition = "2024"

name = "tatolab-vulkanalia"
authors = ["Kyle Mayes <kyle@mayeses.com>"]

version = "0.35.0"

readme = "README.md"
license = "Apache-2.0"

description = "Vulkan bindings for Rust."

documentation = "https://docs.rs/vulkanalia"
repository = "https://github.com/KyleMayes/vulkanalia"

keywords = ["graphics", "vulkan"]
categories = ["graphics"]

[lib]

name = "vulkanalia"
# The bytecode.rs doctests include_bytes! shader fixtures from the fork
# repo's tutorial/ + examples/ dirs, which are deliberately not vendored
# (see docs/architecture/vendored-vulkanalia.md — the trim rule). The
# crate's behavior is locked by its unit tests (tests/builders.rs) instead.
doctest = false

[features]

default = ["std"]

std = ["vulkanalia-sys/std"]
no_std_error = ["vulkanalia-sys/no_std_error"]

provisional = ["vulkanalia-sys/provisional"]
window = ["raw-window-handle", "cocoa", "metal", "objc"]

[dependencies]

libloading = { version = "0.8.5", optional = true }
raw-window-handle = { version = "0.6", optional = true }
vulkanalia-sys = { package = "tatolab-vulkanalia-sys", version = "0.35", path = "../tatolab-vulkanalia-sys", registry = "tatolab", default-features = false }

[target.'cfg(target_os = "macos")'.dependencies]

cocoa = { version = "0.26", optional = true }
metal = { version = "0.32", optional = true }
objc = { version = "0.2", optional = true }

[package.metadata.docs.rs]

features = ["libloading", "provisional", "window"]
