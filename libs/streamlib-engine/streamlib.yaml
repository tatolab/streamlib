package:
  org: tatolab
  name: streamlib-engine
  version: 0.4.28
  description: "Engine internals for streamlib (RHI, IPC, surface-share, runtime executor). Customer apps depend on `streamlib` (the SDK), not on this manifest directly."

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/core":
    path: ../../packages/core

# Schema YAML files this package owns + bare-name imports from declared
# dependencies. Drives the JTD-codegen pipeline
# (`cargo xtask generate-schemas --project-dir libs/streamlib`) and the
# build-script-generated embedded-schemas lookup.
#
# `Local { file }` — schema this package owns; the file ships in the
# slpkg archive. `External { package }` — bare type-name imported from
# the named dep; resolution walks the dep's own `schemas:` map.
schemas:
  # Wire types imported from @tatolab/core.
  AudioFrame:
    package: "@tatolab/core"
  EncodedAudioFrame:
    package: "@tatolab/core"
  EncodedVideoFrame:
    package: "@tatolab/core"
  VideoFrame:
    package: "@tatolab/core"
  # Processor config schemas. Map keys are PascalCase aliases for the
  # reverse-DNS schema file names.
  BgraFileSourceConfig:
    file: schemas/com.streamlib.bgra_file_source.config@1.0.0.yaml
  ClapEffectConfig:
    file: schemas/com.streamlib.clap.effect.config@1.0.0.yaml
  MoqPublishTrackConfig:
    file: schemas/com.streamlib.moq_publish_track.config@1.0.0.yaml
  MoqSubscribeTrackConfig:
    file: schemas/com.streamlib.moq_subscribe_track.config@1.0.0.yaml
  WebrtcWhepConfig:
    file: schemas/com.streamlib.webrtc_whep.config@1.0.0.yaml
  WebrtcWhipConfig:
    file: schemas/com.streamlib.webrtc_whip.config@1.0.0.yaml
  ScreenCaptureConfig:
    file: schemas/com.tatolab.screen_capture.config@1.0.0.yaml
  SimplePassthroughConfig:
    file: schemas/com.tatolab.simple_passthrough.config@1.0.0.yaml
  # Polyglot escalate IPC wire schemas (discriminator form).
  EscalateRequest:
    file: schemas/com.streamlib.escalate_request@1.0.0.yaml
  EscalateResponse:
    file: schemas/com.streamlib.escalate_response@1.0.0.yaml
  # Test-only config schema for the attribute macro tests.
  TestConfiguredProcessorConfig:
    file: schemas/com.streamlib.test.configured_processor.config@1.0.0.yaml

processors:
  # === Apple platform processors ===

  - name: ScreenCapture
    version: 1.0.0
    description: "Captures display, window, or application content using ScreenCaptureKit (macOS 12.3+)"
    execution: manual
    runtime:
      options:
        unsafe_send: true
    config:
      name: config
      schema: ScreenCaptureConfig
    outputs:
      - name: video
        schema: VideoFrame
        description: Captured video frames from screen content

  # === Core processors ===

  - name: SimplePassthrough
    version: 1.0.0
    description: "Passes video frames through unchanged (for testing)"
    execution: manual
    config:
      name: config
      schema: SimplePassthroughConfig
    inputs:
      - name: input
        schema: VideoFrame
        description: Video frame input
        read_mode: skip_to_latest
        buffer_size: 4
    outputs:
      - name: output
        schema: VideoFrame
        description: Video frame output (unchanged)

  - name: ClapEffect
    version: 1.0.0
    description: "CLAP audio plugin processor with parameter control and automation"
    execution: manual
    config:
      name: config
      schema: ClapEffectConfig
    inputs:
      - name: audio_in
        schema: AudioFrame
        description: Stereo audio frame to process through CLAP plugin (2 channels)
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio_out
        schema: AudioFrame
        description: Processed stereo audio frame from CLAP plugin (2 channels)

  - name: WebrtcWhep
    version: 1.0.0
    description: "Receives video and audio from WHEP endpoint (WebRTC egress)"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: WebrtcWhepConfig
    outputs:
      - name: encoded_video_out
        schema: EncodedVideoFrame
        description: H.264 encoded video frames from WHEP stream
      - name: encoded_audio_out
        schema: EncodedAudioFrame
        description: Opus encoded audio frames from WHEP stream

  - name: WebrtcWhip
    version: 1.0.0
    description: "Streams pre-encoded video and audio via WebRTC WHIP"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: WebrtcWhipConfig
    inputs:
      - name: encoded_video_in
        schema: EncodedVideoFrame
        description: H.264 encoded video frames to stream
        read_mode: read_next_in_order
        buffer_size: 16
      - name: encoded_audio_in
        schema: EncodedAudioFrame
        description: Opus encoded audio frames to stream
        read_mode: skip_to_latest
        buffer_size: 8

  # === Linux File Source ===

  - name: BgraFileSource
    version: 1.0.0
    description: "Streams raw BGRA frames from a file as Videoframes"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: BgraFileSourceConfig
    outputs:
      - name: video
        schema: VideoFrame
        description: Video frames read from the BGRA file

  # === MoQ Streaming ===

  - name: MoqPublishTrack
    version: 1.0.0
    description: "Publishes raw bytes from a single graph input to a named MoQ track"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: MoqPublishTrackConfig
    inputs:
      - name: data_in
        schema: any
        description: Input data to publish to MoQ track (any serialized type)

  - name: MoqSubscribeTrack
    version: 1.0.0
    description: "Subscribes to a named MoQ track and outputs raw bytes to the graph"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: MoqSubscribeTrackConfig
    outputs:
      - name: data_out
        schema: any
        description: Received data from MoQ track subscription (any serialized type)

  # === Test mock processors ===

  - name: TestMockProcessor
    version: 1.0.0
    description: "Mock processor for testing graph operations"
    execution: manual
    inputs:
      - name: in1
        schema: VideoFrame
        description: Test input port 1
      - name: in2
        schema: VideoFrame
        description: Test input port 2
    outputs:
      - name: out1
        schema: VideoFrame
        description: Test output port 1
      - name: out2
        schema: VideoFrame
        description: Test output port 2

  - name: TestMockInputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only input ports for testing"
    execution: manual
    inputs:
      - name: in1
        schema: VideoFrame
        description: Test input port 1
      - name: in2
        schema: VideoFrame
        description: Test input port 2

  - name: TestMockOutputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only output ports for testing"
    execution: manual
    outputs:
      - name: out1
        schema: VideoFrame
        description: Test output port 1
      - name: out2
        schema: VideoFrame
        description: Test output port 2

  # === Test attribute macro processors ===

  - name: TestProcessor
    version: 1.0.0
    description: "Test processor for attribute macro tests"
    execution: manual
    inputs:
      - name: video_in
        schema: VideoFrame
    outputs:
      - name: video_out
        schema: VideoFrame

  - name: TestConfiguredProcessor
    version: 1.0.0
    description: "Test processor with config for attribute macro tests"
    execution: continuous
    config:
      name: config
      schema: TestConfiguredProcessorConfig
