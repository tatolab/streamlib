package:
  org: tatolab
  name: streamlib-engine
  version: 0.4.28
  description: "Engine internals for streamlib (RHI, IPC, surface-share, runtime executor). Customer apps depend on `streamlib` (the SDK), not on this manifest directly."

# Engine is schema-free for wire data by design — `@tatolab/core` lives in
# packages that actually speak it on the wire, never here. iceoryx2 carries
# bytes; each package brings its own JTD-codegen output for the messages
# it speaks. Engine's attribute-macro + graph-compiler test fixtures
# declare `schema: any` on their ports so the codebase exercises engine
# logic without coupling to any wire schema.
#
# `@tatolab/escalate` is a different shape — it's the polyglot escalate IPC
# protocol the engine itself implements (cdylib subprocesses on one side,
# host runtime on the other). Engine owns this protocol, so it carries
# the dep + codegen.

dependencies:
  "@tatolab/escalate": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this.
patch:
  "@tatolab/escalate":
    path: ../../packages/escalate

schemas:
  EscalateRequest:
    package: "@tatolab/escalate"
  EscalateResponse:
    package: "@tatolab/escalate"

processors:
  # === Test mock processors ===

  - name: TestMockProcessor
    version: 1.0.0
    description: "Mock processor for testing graph operations"
    execution: manual
    inputs:
      - name: in1
        schema: any
        description: Test input port 1
      - name: in2
        schema: any
        description: Test input port 2
    outputs:
      - name: out1
        schema: any
        description: Test output port 1
      - name: out2
        schema: any
        description: Test output port 2

  - name: TestMockInputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only input ports for testing"
    execution: manual
    inputs:
      - name: in1
        schema: any
        description: Test input port 1
      - name: in2
        schema: any
        description: Test input port 2

  - name: TestMockOutputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only output ports for testing"
    execution: manual
    outputs:
      - name: out1
        schema: any
        description: Test output port 1
      - name: out2
        schema: any
        description: Test output port 2

  # === Test attribute macro processors ===

  - name: TestProcessor
    version: 1.0.0
    description: "Test processor for attribute macro tests"
    execution: manual
    inputs:
      - name: video_in
        schema: any
    outputs:
      - name: video_out
        schema: any
