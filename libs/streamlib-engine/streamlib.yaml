# Wire vocabulary now lives in @tatolab/core (#401). The four canonical
# wire types (VideoFrame, AudioFrame, EncodedVideoFrame, EncodedAudioFrame)
# are pulled in via this dependency rather than declared inline.
package:
  org: tatolab
  name: streamlib-engine
  version: 0.4.28
  description: "Engine internals for streamlib (RHI, IPC, surface-share, runtime executor). Customer apps depend on `streamlib` (the SDK), not on this manifest directly."

dependencies:
  "@tatolab/core": "^1.0.0"

# Dev-time path override; `streamlib pack` rejects this (#717).
patch:
  "@tatolab/core":
    path: ../../packages/core

# Schema YAML files this package owns. Drives the JTD-codegen pipeline
# (`cargo xtask generate-schemas --project-dir libs/streamlib`) and the
# build-script-generated embedded-schemas lookup. Replaces the legacy
# `[package.metadata.streamlib].schemas` block in Cargo.toml (#402).
schemas:
  # Processor config schemas.
  - schemas/com.streamlib.api_server.config@1.0.0.yaml
  - schemas/com.streamlib.bgra_file_source.config@1.0.0.yaml
  - schemas/com.streamlib.clap.effect.config@1.0.0.yaml
  - schemas/com.streamlib.h264_decoder.config@1.0.0.yaml
  - schemas/com.streamlib.h264_encoder.config@1.0.0.yaml
  - schemas/com.streamlib.h265_decoder.config@1.0.0.yaml
  - schemas/com.streamlib.h265_encoder.config@1.0.0.yaml
  - schemas/com.streamlib.linux_mp4_writer.config@1.0.0.yaml
  - schemas/com.streamlib.moq_publish_track.config@1.0.0.yaml
  - schemas/com.streamlib.moq_subscribe_track.config@1.0.0.yaml
  - schemas/com.streamlib.opus_decoder.config@1.0.0.yaml
  - schemas/com.streamlib.opus_encoder.config@1.0.0.yaml
  - schemas/com.streamlib.webrtc_whep.config@1.0.0.yaml
  - schemas/com.streamlib.webrtc_whip.config@1.0.0.yaml
  - schemas/com.tatolab.display.config@1.0.0.yaml
  - schemas/com.tatolab.mp4_writer.config@1.0.0.yaml
  - schemas/com.tatolab.screen_capture.config@1.0.0.yaml
  - schemas/com.tatolab.simple_passthrough.config@1.0.0.yaml
  # Polyglot escalate IPC wire schemas (discriminator form).
  - schemas/com.streamlib.escalate_request@1.0.0.yaml
  - schemas/com.streamlib.escalate_response@1.0.0.yaml

processors:
  # === Apple platform processors ===

  - name: Display
    version: 1.0.0
    description: "Displays video frames in a window using Metal with vsync"
    execution: manual
    scheduling:
      priority: high
    config:
      name: config
      schema: com.tatolab.display.config@1.0.0
    inputs:
      - name: video
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Video frames to display in the window
        read_mode: skip_to_latest
        buffer_size: 4

  - name: Mp4Writer
    version: 1.0.0
    description: "Writes stereo audio and video to MP4 file with A/V synchronization"
    execution: reactive
    runtime:
      language: rust
      options:
        unsafe_send: true
    config:
      name: config
      schema: com.tatolab.mp4_writer.config@1.0.0
    inputs:
      - name: audio
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Stereo audio frames to write to MP4
        read_mode: read_next_in_order
        buffer_size: 32
      - name: video
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Video frames to write to MP4
        read_mode: skip_to_latest
        buffer_size: 4

  - name: ScreenCapture
    version: 1.0.0
    description: "Captures display, window, or application content using ScreenCaptureKit (macOS 12.3+)"
    execution: manual
    runtime:
      options:
        unsafe_send: true
    config:
      name: config
      schema: com.tatolab.screen_capture.config@1.0.0
    outputs:
      - name: video
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Captured video frames from screen content

  # === Core processors ===

  - name: ApiServer
    version: 1.0.0
    description: "Runtime api server for streamlib"
    execution: manual
    config:
      name: config
      schema: com.streamlib.api_server.config@1.0.0

  - name: SimplePassthrough
    version: 1.0.0
    description: "Passes video frames through unchanged (for testing)"
    execution: manual
    config:
      name: config
      schema: com.tatolab.simple_passthrough.config@1.0.0
    inputs:
      - name: input
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Video frame input
        read_mode: skip_to_latest
        buffer_size: 4
    outputs:
      - name: output
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Video frame output (unchanged)

  - name: ClapEffect
    version: 1.0.0
    description: "CLAP audio plugin processor with parameter control and automation"
    execution: manual
    config:
      name: config
      schema: com.streamlib.clap.effect.config@1.0.0
    inputs:
      - name: audio_in
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Stereo audio frame to process through CLAP plugin (2 channels)
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: audio_out
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Processed stereo audio frame from CLAP plugin (2 channels)

  - name: WebrtcWhep
    version: 1.0.0
    description: "Receives video and audio from WHEP endpoint (WebRTC egress)"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.webrtc_whep.config@1.0.0
    outputs:
      - name: encoded_video_out
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.264 encoded video frames from WHEP stream
      - name: encoded_audio_out
        schema: { org: tatolab, package: core, type: EncodedAudioFrame, version: 1.0.0 }
        description: Opus encoded audio frames from WHEP stream

  - name: WebrtcWhip
    version: 1.0.0
    description: "Streams pre-encoded video and audio via WebRTC WHIP"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.webrtc_whip.config@1.0.0
    inputs:
      - name: encoded_video_in
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.264 encoded video frames to stream
        read_mode: read_next_in_order
        buffer_size: 16
      - name: encoded_audio_in
        schema: { org: tatolab, package: core, type: EncodedAudioFrame, version: 1.0.0 }
        description: Opus encoded audio frames to stream
        read_mode: skip_to_latest
        buffer_size: 8

  # === Linux File Source ===

  - name: BgraFileSource
    version: 1.0.0
    description: "Streams raw BGRA frames from a file as Videoframes"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.bgra_file_source.config@1.0.0
    outputs:
      - name: video
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Video frames read from the BGRA file

  # === Linux MP4 Writer ===

  - name: LinuxMp4Writer
    version: 1.0.0
    description: "Writes video frames to MP4 via ffmpeg encode + mux with silent audio track"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.linux_mp4_writer.config@1.0.0
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Decoded video frames (raw pixels) to encode and write
        read_mode: skip_to_latest
        buffer_size: 4

  # === Codecs ===

  - name: H264Encoder
    version: 1.0.0
    description: "Encodes VideoFrame to EncodedVideoFrame (H.264) via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.h264_encoder.config@1.0.0
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Raw video frames to encode
        read_mode: read_next_in_order
        buffer_size: 8
    outputs:
      - name: encoded_video_out
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.264 encoded video frames

  - name: H264Decoder
    version: 1.0.0
    description: "Decodes EncodedVideoFrame (H.264) to VideoFrame via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.h264_decoder.config@1.0.0
    inputs:
      - name: encoded_video_in
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.264 encoded video frames to decode
        read_mode: read_next_in_order
        buffer_size: 16
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Decoded video frames

  - name: H265Encoder
    version: 1.0.0
    description: "Encodes VideoFrame to EncodedVideoFrame (H.265) via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.h265_encoder.config@1.0.0
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Raw video frames to encode
        read_mode: read_next_in_order
        buffer_size: 8
    outputs:
      - name: encoded_video_out
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.265 encoded video frames

  - name: H265Decoder
    version: 1.0.0
    description: "Decodes EncodedVideoFrame (H.265) to VideoFrame via Vulkan Video"
    execution: reactive
    scheduling:
      priority: high
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.h265_decoder.config@1.0.0
    inputs:
      - name: encoded_video_in
        schema: { org: tatolab, package: core, type: EncodedVideoFrame, version: 1.0.0 }
        description: H.265 encoded video frames to decode
        read_mode: read_next_in_order
        buffer_size: 16
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Decoded video frames

  - name: OpusEncoder
    version: 1.0.0
    description: "Encodes AudioFrame to EncodedAudioFrame (Opus)"
    execution: reactive
    # Opus is a low-latency realtime audio codec (WebRTC, real-time
    # streaming). The pre-#722 heuristic matched `Encoder` first, so
    # this audio codec ran with `high` priority + `video-{id}` thread
    # name — both wrong for an audio realtime path. Migration corrects
    # to `realtime` + `audio` so it groups with the rest of the audio
    # graph (AudioCapture, AudioMixer, etc.).
    scheduling:
      priority: realtime
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.opus_encoder.config@1.0.0
    inputs:
      - name: audio_in
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Raw audio frames to encode
        read_mode: read_next_in_order
        buffer_size: 32
    outputs:
      - name: encoded_audio_out
        schema: { org: tatolab, package: core, type: EncodedAudioFrame, version: 1.0.0 }
        description: Opus encoded audio frames

  - name: OpusDecoder
    version: 1.0.0
    description: "Decodes EncodedAudioFrame (Opus) to AudioFrame"
    execution: reactive
    # See OpusEncoder above — realtime audio codec, audio role.
    scheduling:
      priority: realtime
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.opus_decoder.config@1.0.0
    inputs:
      - name: encoded_audio_in
        schema: { org: tatolab, package: core, type: EncodedAudioFrame, version: 1.0.0 }
        description: Opus encoded audio frames to decode
        read_mode: skip_to_latest
        buffer_size: 8
    outputs:
      - name: audio_out
        schema: { org: tatolab, package: core, type: AudioFrame, version: 1.0.0 }
        description: Decoded audio frames

  # === MoQ Streaming ===

  - name: MoqPublishTrack
    version: 1.0.0
    description: "Publishes raw bytes from a single graph input to a named MoQ track"
    execution: reactive
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.moq_publish_track.config@1.0.0
    inputs:
      - name: data_in
        schema: any
        description: Input data to publish to MoQ track (any serialized type)

  - name: MoqSubscribeTrack
    version: 1.0.0
    description: "Subscribes to a named MoQ track and outputs raw bytes to the graph"
    execution: manual
    runtime:
      language: rust
    config:
      name: config
      schema: com.streamlib.moq_subscribe_track.config@1.0.0
    outputs:
      - name: data_out
        schema: any
        description: Received data from MoQ track subscription (any serialized type)

  # === Test mock processors ===

  - name: TestMockProcessor
    version: 1.0.0
    description: "Mock processor for testing graph operations"
    execution: manual
    inputs:
      - name: in1
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test input port 1
      - name: in2
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test input port 2
    outputs:
      - name: out1
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test output port 1
      - name: out2
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test output port 2

  - name: TestMockInputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only input ports for testing"
    execution: manual
    inputs:
      - name: in1
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test input port 1
      - name: in2
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test input port 2

  - name: TestMockOutputOnlyProcessor
    version: 1.0.0
    description: "Mock processor with only output ports for testing"
    execution: manual
    outputs:
      - name: out1
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test output port 1
      - name: out2
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
        description: Test output port 2

  # === Test attribute macro processors ===

  - name: TestProcessor
    version: 1.0.0
    description: "Test processor for attribute macro tests"
    execution: manual
    inputs:
      - name: video_in
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }
    outputs:
      - name: video_out
        schema: { org: tatolab, package: core, type: VideoFrame, version: 1.0.0 }

  - name: TestConfiguredProcessor
    version: 1.0.0
    description: "Test processor with config for attribute macro tests"
    execution: continuous
    config:
      name: config
      schema: com.streamlib.test.configured_processor.config@1.0.0
