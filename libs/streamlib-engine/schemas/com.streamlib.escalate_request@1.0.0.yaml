# SPDX-License-Identifier: BUSL-1.1
#
# JSON Type Definition (RFC 8927) schema for polyglot escalation requests.
#
# Sent from a Python or Deno subprocess over its stdout to the Rust host
# processor. Acquire/release ops are request/response — the host routes the
# op through `GpuContextLimitedAccess::escalate` and replies with
# [`EscalateResponse`] on the same stdin pipe. The `log` op is fire-and-
# forget: the host enriches the record with an authoritative `host_ts` and
# enqueues it into the unified JSONL pipeline (see parent #430), no reply
# is written back.

metadata:
  name: com.streamlib.escalate_request
  version: 1.0.0
  description: "Polyglot subprocess escalate-on-behalf request (subprocess → host)"

discriminator: op
mapping:
  acquire_pixel_buffer:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      width:
        metadata:
          description: "Pixel width of the buffer."
        type: uint32
      height:
        metadata:
          description: "Pixel height of the buffer."
        type: uint32
      format:
        metadata:
          description: "Pixel format identifier (e.g. bgra32, nv12_video_range, gray8)."
        type: string
  acquire_texture:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      width:
        metadata:
          description: "Pixel width of the texture."
        type: uint32
      height:
        metadata:
          description: "Pixel height of the texture."
        type: uint32
      format:
        metadata:
          description: >
            Texture format identifier. Lowercase snake-case names:
            rgba8_unorm, rgba8_unorm_srgb, bgra8_unorm, bgra8_unorm_srgb,
            rgba16_float, rgba32_float, nv12.
        type: string
      usage:
        metadata:
          description: >
            Usage flags the texture must support. Non-empty array of lowercase
            snake-case tokens drawn from: copy_src, copy_dst, texture_binding,
            storage_binding, render_attachment. Host validates — unknown
            tokens return an error response.
        elements:
          type: string
  acquire_image:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      width:
        metadata:
          description: "Pixel width of the image."
        type: uint32
      height:
        metadata:
          description: "Pixel height of the image."
        type: uint32
      format:
        metadata:
          description: >
            Texture format identifier. Lowercase snake-case names:
            bgra8_unorm, bgra8_unorm_srgb, rgba8_unorm, rgba8_unorm_srgb.
            The host backs this with a render-target-capable VkImage
            allocated via VK_EXT_image_drm_format_modifier and a tiled
            DRM modifier picked from the EGL `external_only=FALSE` list
            — the resulting DMA-BUF can be imported by the consumer as
            a GL_TEXTURE_2D color attachment. Returns an error when the
            EGL probe didn't find an RT-capable modifier for `format`
            (no fallback to LINEAR — sampler-only on NVIDIA, see
            docs/learnings/nvidia-egl-dmabuf-render-target.md).

            Internal host primitive — surface adapters
            (streamlib-adapter-vulkan / -opengl / -skia) use this on
            customers' behalf; customers never invoke acquire_image
            directly.
        type: string
  run_cpu_readback_copy:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      surface_id:
        metadata:
          description: >
            Host-assigned surface id (the u64 carried by `StreamlibSurface::id`)
            of a surface previously registered with the host's cpu-readback
            adapter and whose staging buffer + timeline were registered with
            the surface-share service via `register_pixel_buffer_with_timeline`.
            The subprocess imported them once at registration time through
            `streamlib-consumer-rhi`'s `ConsumerVulkanPixelBuffer` /
            `ConsumerVulkanTimelineSemaphore`. JTD has no native u64 — the
            wire form is the decimal string representation, parsed back into
            u64 by the host before dispatch.
        type: string
      direction:
        metadata:
          description: >
            Which copy direction to run on the host. `image_to_buffer` runs
            `vkCmdCopyImageToBuffer` (image → staging) at acquire time;
            `buffer_to_image` runs the reverse at write release. The host
            signals a new value on the surface's timeline at end-of-submit;
            the subprocess waits on the timeline (through its imported
            `ConsumerVulkanTimelineSemaphore`) before reading or releasing.
            No FDs travel on the wire — only the timeline value the host
            signaled.
        enum:
          - image_to_buffer
          - buffer_to_image
  try_run_cpu_readback_copy:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      surface_id:
        metadata:
          description: >
            Same shape as `run_cpu_readback_copy.surface_id`. The host
            returns a [`contended`] response (no timeline value, no copy
            executed) when its registry would have blocked instead of
            performing the copy. Subprocess customers use this to skip a
            frame instead of stalling their thread runner.
        type: string
      direction:
        metadata:
          description: >
            Same shape as `run_cpu_readback_copy.direction`.
        enum:
          - image_to_buffer
          - buffer_to_image
  register_compute_kernel:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      spv_hex:
        metadata:
          description: >
            Compiled SPIR-V bytecode for the compute shader, encoded as
            lowercase hex (no `0x` prefix, no whitespace). The host parses
            the bytes back, derives the binding shape from
            `rspirv-reflect`, and constructs a `VulkanComputeKernel` via
            `GpuContext::create_compute_kernel`.

            Re-registering identical SPIR-V is a host-side cache hit
            keyed by SHA-256(spv_bytes) — no re-reflection, no fresh
            pipeline. The returned `kernel_id` is the same.

            The host's `VulkanComputeKernel` also persists driver-
            compiled pipeline state to `<XDG_CACHE_HOME>/streamlib/
            pipeline-cache/<spirv_hash>.bin`, so first-inference latency
            after a host process restart is fast on user-registered ML
            kernels.
        type: string
      push_constant_size:
        metadata:
          description: >
            Push-constant range size in bytes. 0 if the shader uses no
            push constants. The host validates this against the
            shader's reflected push-constant range and rejects
            mismatches with an `err` response.
        type: uint32
  run_compute_kernel:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      kernel_id:
        metadata:
          description: >
            Handle returned by a prior `register_compute_kernel`
            response. The host looks up the cached
            `Arc<VulkanComputeKernel>` and dispatches against it.
            Dispatching with an unrecognized kernel_id returns an
            `err` response.
        type: string
      surface_uuid:
        metadata:
          description: >
            UUID string of a render-target surface previously
            registered with the surface-share service via
            `register_texture`. The host bridge holds an
            application-provided UUID→`StreamTexture` map (populated
            in `install_setup_hook`) and binds the looked-up
            `VkImage` as a storage_image at slot 0 (the single-output
            convention enforced for v1 — multi-binding kernels are a
            future extension). UUID rather than u64 so the host can
            resolve the surface without subprocess-side counter
            coordination.
        type: string
      push_constants_hex:
        metadata:
          description: >
            Push-constant payload for this dispatch, encoded as
            lowercase hex. Length in bytes (after hex decoding) must
            equal the kernel's declared `push_constant_size`. Empty
            string when the kernel has no push constants.
        type: string
      group_count_x:
        metadata:
          description: "vkCmdDispatch groupCountX."
        type: uint32
      group_count_y:
        metadata:
          description: "vkCmdDispatch groupCountY."
        type: uint32
      group_count_z:
        metadata:
          description: "vkCmdDispatch groupCountZ."
        type: uint32
  register_graphics_kernel:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      label:
        metadata:
          description: >
            Human-readable label used in error messages and tracing
            on the host. Echoed in `kernel_id` derivation only via
            its bytes — purely diagnostic.
        type: string
      vertex_spv_hex:
        metadata:
          description: >
            Compiled SPIR-V bytecode for the vertex stage, encoded
            as lowercase hex (no `0x` prefix, no whitespace). Today
            exactly one vertex stage is required (the host kernel
            rejects zero or multiple vertex stages). Geometry /
            tessellation / mesh / task stages are not yet supported.
        type: string
      fragment_spv_hex:
        metadata:
          description: >
            Compiled SPIR-V bytecode for the fragment stage, encoded
            as lowercase hex. Today exactly one fragment stage is
            required (matching the host kernel's v1 contract).
        type: string
      vertex_entry_point:
        metadata:
          description: >
            Entry-point name for the vertex stage. Empty string is
            normalized to `"main"` host-side.
        type: string
      fragment_entry_point:
        metadata:
          description: >
            Entry-point name for the fragment stage. Empty string is
            normalized to `"main"` host-side.
        type: string
      bindings:
        metadata:
          description: >
            Descriptor-set-0 bindings the host pipeline declares.
            Validated against `rspirv-reflect` of the supplied
            SPIR-V at register time — mismatches return an `err`
            response. Empty array means no bindings.
        elements:
          properties:
            binding:
              type: uint32
            kind:
              metadata:
                description: >
                  Resource kind for this binding slot.
              enum:
                - sampled_texture
                - storage_buffer
                - uniform_buffer
                - storage_image
            stages:
              metadata:
                description: >
                  Bitmask of stages the binding is visible to.
                  `1 = VERTEX`, `2 = FRAGMENT`, `3 = VERTEX_FRAGMENT`.
              type: uint32
      push_constant_size:
        metadata:
          description: >
            Push-constant range size in bytes, validated against
            the merged shader reflection. Set 0 if the shaders use
            no push constants.
        type: uint32
      push_constant_stages:
        metadata:
          description: >
            Bitmask of stages the push-constant range is visible to.
            `1 = VERTEX`, `2 = FRAGMENT`. Ignored when
            `push_constant_size == 0`.
        type: uint32
      descriptor_sets_in_flight:
        metadata:
          description: >
            Depth of the descriptor-set ring. Render-loop callers
            pass `frame_index ∈ [0, descriptor_sets_in_flight)` per
            draw. Must be ≥ 1.
        type: uint32
      pipeline_state:
        metadata:
          description: >
            Fixed-function pipeline state plus attachment formats
            for the graphics pipeline. Mirrors the host
            `GraphicsPipelineState` shape; unsupported combinations
            (multi-attachment color blend, MSAA samples > 1, etc.)
            are rejected with an `err` response.
        properties:
          topology:
            enum:
              - point_list
              - line_list
              - line_strip
              - triangle_list
              - triangle_strip
              - triangle_fan
          vertex_input_bindings:
            metadata:
              description: >
                Vertex buffer binding slots — stride and step rate
                per binding. Empty array selects the
                `VertexInputState::None` (gl_VertexIndex-driven)
                shape; non-empty selects `VertexInputState::Buffers`
                with the given bindings + attributes.
            elements:
              properties:
                binding:
                  type: uint32
                stride:
                  type: uint32
                input_rate:
                  enum:
                    - vertex
                    - instance
          vertex_input_attributes:
            metadata:
              description: >
                Vertex attributes pulled from the bindings. Must be
                empty when `vertex_input_bindings` is empty.
            elements:
              properties:
                location:
                  type: uint32
                binding:
                  type: uint32
                format:
                  enum:
                    - r32_float
                    - rg32_float
                    - rgb32_float
                    - rgba32_float
                    - r32_uint
                    - rg32_uint
                    - rgb32_uint
                    - rgba32_uint
                    - r32_sint
                    - rg32_sint
                    - rgb32_sint
                    - rgba32_sint
                    - rgba8_unorm
                    - rgba8_snorm
                offset:
                  type: uint32
          rasterization_polygon_mode:
            enum:
              - fill
              - line
              - point
          rasterization_cull_mode:
            enum:
              - none
              - front
              - back
              - front_and_back
          rasterization_front_face:
            enum:
              - counter_clockwise
              - clockwise
          rasterization_line_width:
            type: float32
          multisample_samples:
            metadata:
              description: >
                MSAA sample count. Only `1` is supported in v1; any
                other value returns an `err` response.
            type: uint32
          depth_stencil_enabled:
            type: boolean
          depth_compare_op:
            metadata:
              description: >
                Depth compare op. Ignored when
                `depth_stencil_enabled` is false; the wire field
                must still carry a valid value (use `always` as the
                default placeholder when disabled).
            enum:
              - never
              - less
              - equal
              - less_or_equal
              - greater
              - not_equal
              - greater_or_equal
              - always
          depth_write:
            type: boolean
          color_blend_enabled:
            type: boolean
          color_write_mask:
            metadata:
              description: >
                Color write mask bits — `1=R`, `2=G`, `4=B`, `8=A`.
                `15` (`0b1111`) writes RGBA. Used both when blending
                is disabled and as the blend attachment's
                `color_write_mask` when enabled.
            type: uint32
          color_blend_src_color_factor:
            metadata:
              description: >
                Blend factor. Ignored when `color_blend_enabled` is
                false; carry a valid value (e.g. `one`) regardless.
              ref: "blend_factor_enum"
            enum: &blend_factor
              - zero
              - one
              - src_color
              - one_minus_src_color
              - dst_color
              - one_minus_dst_color
              - src_alpha
              - one_minus_src_alpha
              - dst_alpha
              - one_minus_dst_alpha
              - constant_color
              - one_minus_constant_color
              - constant_alpha
              - one_minus_constant_alpha
              - src_alpha_saturate
          color_blend_dst_color_factor:
            enum: *blend_factor
          color_blend_color_op:
            enum: &blend_op
              - add
              - subtract
              - reverse_subtract
              - min
              - max
          color_blend_src_alpha_factor:
            enum: *blend_factor
          color_blend_dst_alpha_factor:
            enum: *blend_factor
          color_blend_alpha_op:
            enum: *blend_op
          attachment_color_formats:
            metadata:
              description: >
                Color attachment texture formats (lowercase
                snake-case names matching `acquire_texture.format`).
                v1 supports a single color attachment; arrays of
                length other than 1 are rejected.
            elements:
              type: string
          dynamic_state:
            metadata:
              description: >
                Which pipeline state is set dynamically per draw vs
                baked into the pipeline at creation. `none` bakes a
                default 1×1 viewport (offscreen fixed-size only);
                `viewport_scissor` lets the same pipeline serve
                varying extents.
            enum:
              - none
              - viewport_scissor
        optionalProperties:
          attachment_depth_format:
            metadata:
              description: >
                Depth attachment format. Absent disables depth
                attachments — the depth_stencil flags must be
                consistent (`depth_stencil_enabled = false` when
                this is absent).
              ref: "depth_format_enum"
            enum:
              - d16_unorm
              - d32_sfloat
              - d24_unorm_s8_uint
  run_graphics_draw:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      kernel_id:
        metadata:
          description: >
            Handle returned by a prior `register_graphics_kernel`
            response. The host looks up the cached
            `Arc<VulkanGraphicsKernel>` and dispatches against it.
            Dispatching with an unrecognized kernel_id returns an
            `err` response.
        type: string
      frame_index:
        metadata:
          description: >
            Slot in the kernel's descriptor-set ring. Must satisfy
            `frame_index < descriptor_sets_in_flight` declared at
            register time. Render-loop callers cycle this through
            `MAX_FRAMES_IN_FLIGHT` so concurrent frames don't
            scribble each other's bindings.
        type: uint32
      bindings:
        metadata:
          description: >
            Per-draw bindings — each slot's `surface_uuid` must
            resolve through the host bridge's UUID → resource map.
            `kind` must match the binding's declared kind from
            register time.
        elements:
          properties:
            binding:
              type: uint32
            kind:
              enum:
                - sampled_texture
                - storage_buffer
                - uniform_buffer
                - storage_image
            surface_uuid:
              type: string
      vertex_buffers:
        metadata:
          description: >
            Per-draw vertex buffer bindings. Each entry's
            `surface_uuid` must resolve to a host-side
            `RhiPixelBuffer`. `offset` is the byte offset into the
            buffer where vertex data starts (decimal-encoded u64 —
            JTD has no native u64). Empty for vertex-fabricating
            shaders (`gl_VertexIndex` patterns).
        elements:
          properties:
            binding:
              type: uint32
            surface_uuid:
              type: string
            offset:
              type: string
      color_target_uuids:
        metadata:
          description: >
            UUIDs of color attachment textures. v1 requires exactly
            one entry — multi-attachment is a future extension. Each
            UUID must resolve to a host-side `StreamTexture`
            registered as a render target.
        elements:
          type: string
      extent_width:
        metadata:
          description: "Render-area width in pixels."
        type: uint32
      extent_height:
        metadata:
          description: "Render-area height in pixels."
        type: uint32
      push_constants_hex:
        metadata:
          description: >
            Push-constant payload for this draw, lowercase hex. Must
            decode to exactly the kernel's declared
            `push_constant_size` (or empty if zero).
        type: string
      draw:
        metadata:
          description: >
            Draw call. `kind = "draw"` selects non-indexed
            (`vertex_count`-driven), `kind = "draw_indexed"` requires
            `index_buffer` to be set and uses `index_count` /
            `first_index` / `vertex_offset`. Fields not used by the
            selected kind are ignored host-side; subprocesses
            should still send valid placeholder values (zero is
            fine) to keep the wire shape regular.
        properties:
          kind:
            enum:
              - draw
              - draw_indexed
          vertex_count:
            type: uint32
          index_count:
            type: uint32
          instance_count:
            type: uint32
          first_vertex:
            type: uint32
          first_instance:
            type: uint32
          first_index:
            type: uint32
          vertex_offset:
            type: int32
    optionalProperties:
      index_buffer:
        metadata:
          description: >
            Required when `draw.kind == "draw_indexed"`, must be
            absent otherwise. `surface_uuid` resolves to an
            `RhiPixelBuffer`; `offset` is the byte offset into it.
        properties:
          surface_uuid:
            type: string
          offset:
            type: string
          index_type:
            enum:
              - uint16
              - uint32
      depth_target_uuid:
        metadata:
          description: >
            UUID of a depth attachment texture. Reserved for future
            use — v1 rejects depth attachments with an `err`
            response.
        type: string
      viewport:
        metadata:
          description: >
            Dynamic viewport for this draw. Required when the
            kernel's pipeline state declared
            `dynamic_state = "viewport_scissor"`; ignored otherwise.
        properties:
          x:
            type: float32
          y:
            type: float32
          width:
            type: float32
          height:
            type: float32
          min_depth:
            type: float32
          max_depth:
            type: float32
      scissor:
        metadata:
          description: >
            Dynamic scissor rect for this draw. Required when the
            kernel declared `dynamic_state = "viewport_scissor"`;
            ignored otherwise.
        properties:
          x:
            type: int32
          y:
            type: int32
          width:
            type: uint32
          height:
            type: uint32
  register_acceleration_structure_blas:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      label:
        metadata:
          description: >
            Human-readable label used in error messages and tracing on
            the host. Echoed in the returned `as_id` derivation only via
            its bytes — purely diagnostic.
        type: string
      vertices_hex:
        metadata:
          description: >
            Vertex blob, lowercase hex-encoded little-endian f32s
            (`R32G32B32_SFLOAT`, stride 12 bytes — interleaved
            `[x,y,z,x,y,z,...]`). Length in bytes after hex decoding
            must be a multiple of 12; total f32 count must equal
            `3 × vertex_count`.
        type: string
      indices_hex:
        metadata:
          description: >
            Index blob, lowercase hex-encoded little-endian u32s. Must
            be a multiple of 3 — three indices per triangle. The host
            decodes these into a `&[u32]` and forwards to
            `VulkanAccelerationStructure::build_triangles_blas`.
        type: string
  register_acceleration_structure_tlas:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      label:
        metadata:
          description: >
            Human-readable label used in error messages and tracing on
            the host. Diagnostic only.
        type: string
      instances:
        metadata:
          description: >
            One TLAS instance per entry. The host resolves `blas_id` to
            a previously-registered BLAS via the bridge's
            `as_id → Arc<VulkanAccelerationStructure>` map and forwards
            to `VulkanAccelerationStructure::build_tlas`. Empty array
            is rejected (TLAS must have at least one instance).
        elements:
          properties:
            blas_id:
              metadata:
                description: >
                  Handle returned by a prior
                  `register_acceleration_structure_blas` response.
                  Must reference a BLAS, not a TLAS — the host
                  validates kind and rejects mismatches.
              type: string
            transform:
              metadata:
                description: >
                  Row-major 3×4 affine transform applied to the BLAS
                  geometry in world space. Exactly 12 floats — three
                  rows of four — laid out
                  `[m00, m01, m02, m03, m10, ..., m23]`. Matches
                  `VkTransformMatrixKHR` directly.
              elements:
                type: float32
            custom_index:
              metadata:
                description: >
                  24-bit user data exposed to hit shaders as
                  `gl_InstanceCustomIndexEXT`. The high 8 bits must be
                  zero.
              type: uint32
            mask:
              metadata:
                description: >
                  8-bit visibility mask. Rays specify a `cullMask`; the
                  instance is hit only when `(mask & cullMask) != 0`.
                  JTD has no native u8 — the wire form is uint32 and
                  the host rejects values > 0xff.
              type: uint32
            sbt_record_offset:
              metadata:
                description: >
                  Offset added to the SBT hit-group index. Usually 0
                  for single-hit-group RT pipelines.
              type: uint32
            flags:
              metadata:
                description: >
                  `VkGeometryInstanceFlagsKHR` bitmask. The host
                  passes this through to `VkAccelerationStructureInstanceKHR`
                  unchanged. `0` selects the spec default; conventional
                  combinations: `1 = TRIANGLE_FACING_CULL_DISABLE`,
                  `4 = FORCE_OPAQUE`.
              type: uint32
  register_ray_tracing_kernel:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      label:
        metadata:
          description: >
            Human-readable label used in error messages and tracing.
            Diagnostic only.
        type: string
      stages:
        metadata:
          description: >
            Shader stages composing the pipeline. Indices into this
            array are referenced by `groups`. At minimum a RayGen
            stage plus enough hit / miss stages to populate every
            group entry — the host's
            `validate_shader_groups` validates the consistency.
        elements:
          properties:
            stage:
              metadata:
                description: >
                  Which RT stage this SPIR-V blob fills.
              enum:
                - ray_gen
                - miss
                - closest_hit
                - any_hit
                - intersection
                - callable
            spv_hex:
              metadata:
                description: >
                  Compiled SPIR-V bytecode for the stage, lowercase
                  hex (no `0x` prefix, no whitespace).
              type: string
            entry_point:
              metadata:
                description: >
                  Entry-point name. Empty string is normalized to
                  `"main"` host-side.
              type: string
      groups:
        metadata:
          description: >
            Shader-group layout. The order here is the order entries
            appear in the SBT regions (raygen / miss / hit / callable).
            Each variant references stage indices into `stages`.
        elements:
          properties:
            kind:
              metadata:
                description: >
                  - `general`: contributes one ray-gen, miss, or
                    callable stage via `general_stage`.
                  - `triangles_hit`: triangle hit group; sets at least
                    one of `closest_hit_stage` / `any_hit_stage` (use
                    `0xFFFFFFFF` as the absent sentinel — JTD has no
                    `Option<uint32>`).
                  - `procedural_hit`: procedural hit group with custom
                    intersection shader plus optional closest-hit /
                    any-hit (same sentinel for absent).
              enum:
                - general
                - triangles_hit
                - procedural_hit
            general_stage:
              metadata:
                description: >
                  Stage index for `general`. `0xFFFFFFFF` for the
                  other group kinds (ignored host-side).
              type: uint32
            closest_hit_stage:
              metadata:
                description: >
                  Stage index for `triangles_hit` /
                  `procedural_hit`. Use `0xFFFFFFFF` to indicate
                  absent. Ignored for `general`.
              type: uint32
            any_hit_stage:
              metadata:
                description: >
                  Stage index for `triangles_hit` /
                  `procedural_hit`. `0xFFFFFFFF` for absent.
                  Ignored for `general`.
              type: uint32
            intersection_stage:
              metadata:
                description: >
                  Stage index for `procedural_hit`. `0xFFFFFFFF` for
                  the other group kinds. Required for
                  `procedural_hit`.
              type: uint32
      bindings:
        metadata:
          description: >
            Descriptor-set-0 bindings. Validated against
            `rspirv-reflect` of every supplied stage at register
            time — mismatches return an `err` response.
        elements:
          properties:
            binding:
              type: uint32
            kind:
              metadata:
                description: >
                  Resource kind for this binding slot.
              enum:
                - storage_buffer
                - uniform_buffer
                - sampled_texture
                - storage_image
                - acceleration_structure
            stages:
              metadata:
                description: >
                  Bitmask of RT stages the binding is visible to.
                  Bits: `1=RAYGEN`, `2=MISS`, `4=CLOSEST_HIT`,
                  `8=ANY_HIT`, `16=INTERSECTION`, `32=CALLABLE`.
              type: uint32
      push_constant_size:
        metadata:
          description: >
            Push-constant range size in bytes. 0 if the kernel uses
            no push constants. Validated against the merged shader
            reflection.
        type: uint32
      push_constant_stages:
        metadata:
          description: >
            Bitmask of RT stages the push-constant range is visible
            to. Same bit layout as `bindings.stages`. Ignored when
            `push_constant_size == 0`.
        type: uint32
      max_recursion_depth:
        metadata:
          description: >
            Maximum ray recursion depth. Must be ≤ device's
            `maxRayRecursionDepth`. Most scenes (primary rays only)
            use 1; secondary-ray techniques bump this to 2 or more.
        type: uint32
  run_ray_tracing_kernel:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      kernel_id:
        metadata:
          description: >
            Handle returned by a prior `register_ray_tracing_kernel`
            response. The host looks up the cached
            `Arc<VulkanRayTracingKernel>` and dispatches against it.
            Dispatching with an unrecognized kernel_id returns an
            `err` response.
        type: string
      bindings:
        metadata:
          description: >
            Per-trace bindings. `kind` must match the binding's
            declared kind from register time. The host bridge
            resolves `target_id` based on `kind`:
            - `acceleration_structure`: `target_id` is an `as_id`
              from a prior `register_acceleration_structure_tlas`.
            - all other kinds: `target_id` is the surface-share UUID
              of a host-side `RhiPixelBuffer` / `StreamTexture`
              (same convention compute and graphics use).
        elements:
          properties:
            binding:
              type: uint32
            kind:
              enum:
                - storage_buffer
                - uniform_buffer
                - sampled_texture
                - storage_image
                - acceleration_structure
            target_id:
              type: string
      push_constants_hex:
        metadata:
          description: >
            Push-constant payload for this dispatch, lowercase hex.
            Length in bytes (after hex decoding) must equal the
            kernel's declared `push_constant_size`. Empty string
            when the kernel has no push constants.
        type: string
      width:
        metadata:
          description: "vkCmdTraceRaysKHR width."
        type: uint32
      height:
        metadata:
          description: "vkCmdTraceRaysKHR height."
        type: uint32
      depth:
        metadata:
          description: "vkCmdTraceRaysKHR depth (usually 1 for 2D output)."
        type: uint32
  release_handle:
    properties:
      request_id:
        metadata:
          description: "Correlates request with response. UUID string."
        type: string
      handle_id:
        metadata:
          description: "Opaque handle ID previously returned by acquire_*."
        type: string
  log:
    properties:
      source:
        metadata:
          description: >
            Origin runtime of the record. Always "python" or "deno" on the
            wire — Rust never routes through escalate; Rust call sites hit
            `tracing::*!()` directly on the host.
        enum:
          - python
          - deno
      source_seq:
        metadata:
          description: >
            Subprocess-monotonic sequence number (uint64 as string — JTD has
            no native u64). Escape hatch for recovering subprocess-local
            order within a single source. Not authoritative across sources
            — use `host_ts` for merged-stream ordering.
        type: string
      source_ts:
        metadata:
          description: >
            Subprocess wall-clock timestamp ISO8601 (advisory). Never used
            for ordering; the host stamps `host_ts` on receipt as the
            authoritative sort key.
        type: string
      level:
        metadata:
          description: "Severity level of the record. Maps 1:1 onto tracing::Level."
        enum:
          - trace
          - debug
          - info
          - warn
          - error
      message:
        metadata:
          description: "Primary human-readable message."
        type: string
      intercepted:
        metadata:
          description: >
            True when the record was captured from subprocess stdout/stderr,
            console.log, root logging handler, or a raw fd write, rather
            than a direct `streamlib.log.*` call.
        type: boolean
      channel:
        metadata:
          description: >
            Interceptor channel when `intercepted: true`. Conventional
            values: "stdout", "stderr", "console.log", "logging", "fd1",
            "fd2". Null when `intercepted: false`.
        type: string
        nullable: true
      pipeline_id:
        metadata:
          description: "Pipeline identifier. Null for runtime-level records."
        type: string
        nullable: true
      processor_id:
        metadata:
          description: "Processor identifier. Null outside a processor."
        type: string
        nullable: true
      attrs:
        metadata:
          description: >
            User-supplied structured fields. Copied flat onto the emitted
            RuntimeLogEvent's `attrs` map — not nested under an `attrs.key`
            path in the JSONL.
        values: {}
